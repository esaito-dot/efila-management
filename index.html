": "b", "x": "１）部下に、今月の目標を伝えた。目標数字を絶対に達成しましょう、と伝え、それ以上は言わなかった。", "l": 0}, {"t": "h2", "x": "③-6）みんなで目指している目標は自分の言葉で、理念との関係とともに伝える"}, {"t": "p", "x": "自拠点の目標が設定された際、なぜやるか、ということに対して、単に上長から振られたからみんなでやらないといけない、ではやらされているだけにしかなりません。"}, {"t": "p", "x": "組織の目標には理由があります。自拠点の目先の目標が、どういうことにつながっていくのか、リーダーがリーダーの言葉で伝えることで、組織として団結することができ、一丸となって目標に向かうことができるでしょう。"}, {"t": "p", "x": "「道徳」と「経済」の「道徳」(理念や人間性)面から理解してもらう、を自分の言葉で伝えることができるようにしましょう。"}, {"t": "p", "x": "※参照 エフィラグループポリシー"}, {"t": "p", "x": "≪３つの経営方針≫「① 道経一体経営 ＝ 理念と利益の思想」"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）部下に、今月の自拠点の新規パートナー数の目標を伝えた。その際に、パートナー数というのは、エフィラグループのミッション「生ききる」に貢献できている人の数であるし、自身の経験も踏まえ、パートナーからいただいた感謝の言葉とともに社会的意義を併せて伝えた。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）部下に、今月の新規パートナー数の目標を伝えた。目標数字を絶対に達成しましょう、と伝え、それ以上は言わなかった。", "l": 0}, {"t": "h2", "x": "③-7）部下には具体的に指示を行いましょう"}, {"t": "p", "x": "具体的ではない指示は、上長と部下の認識齟齬を生み出し、結果として組織の生産性が低くなってしまうことがあります。"}, {"t": "p", "x": "部下が指示内容を明確に認識できるように、完全結果での指示を行うこと。指示が完全結果ではないがゆえに部下が上長が求めるものと異なることをしたとしてもそれは上長側の責任です。"}, {"t": "p", "x": "※具体的とは・・・何を、いつまでに（具体的な納期）、どうなっている状態にするのか、が明確になっていること"}, {"t": "p", "x": "※「なるべく早く」「できるだけすぐ」「時間があるときに」など、納期が明確ではない表現をしてはいけません。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）指示を受けた部下が迷うことの無いよう、営業件数と期限を明確に指示した。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）拠点長「今週は空いた時間全てを使って訪問営業して下さい」 部下A（今は人員不足で忙しいし、２～３件訪問できればいいかな） 部下B（施設には誰かしら常置しているし、自分は営業中心でいくぞ）", "l": 0}, {"t": "b", "x": "２）拠点長「クレームにならないよう、ご家族への連絡は誠実に行うこと」 部下A（バイタルチェックで異常だった時は連絡しなくちゃ） 部下B（パートナー自身が連絡を望んでいない場合、ご本人の意思を尊重しよう）", "l": 0}, {"t": "b", "x": "３）拠点長「請求書の配布作業をできるだけ早く完了させて下さい」 部下A（パートナーが土日に確認できるように、金曜までに配布するか） 部下B（配布遅延でクレームにならないように、水曜までには配布したいな）", "l": 0}, {"t": "h2", "x": "③-8）新人メンバーに対しては、最初は細かく結果点を区切った目標設定をしましょう"}, {"t": "p", "x": "新人メンバーにどれだけ経験があっても、所属する会社によって価値観は違うため、それを合わせるために、例えば日ごとに目標を設定するなどして、短期間でのフィードバックを繰り返しましょう。そうすることで、早い段階でエフィラの価値観、配属事業・拠点の価値観になじんでいくことができていきます。"}, {"t": "p", "x": "例え、同一の業界経験者で経験を積んだメンバーが入社したとして、経験があるから自由にやっていいですよ、ということはＮＧです。上記のとおり、価値観のずれがあった場合に気づくことができなかったり、マインドのすり合わせができないままポータブルスキルや専門スキルのみで業務を行うことになり、その方の成長にもつながりません。"}, {"t": "p", "x": "短期目標を設定する、ということについても同様、価値観がずれたまま進んでしまうことがあったりすることに加え、組織のメンバーの一員だという認識が生まれにくくなってしまうということがあります。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）経験豊富なメンバーが入社したが、最初の1週間は「毎日17時に、その日覚えた業務と気づきを報告する」という日次目標を設定した。報告の場で、エフィラの価値観（エフィラウェイ）とズレている点があればその都度修正し、フィードバックを行った。", "l": 0}, {"t": "b", "x": "２）新人メンバーに対し、「3か月後に独り立ち」という大きな目標だけでなく、「今週はパートナーの顔と名前を全員一致させる」「来週は入浴介助の手順をマニュアル通りに実施できる」といった、1週間単位の具体的な短期目標を設定し、毎週振り返りを行った。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "他社で10年の経験があるベテランが入社したので、「経験があるから大丈夫でしょう。自由にやってみてください」と伝え、具体的な目標を設定せずに現場を任せた。結果、前職で行っていたやり方（効率重視で雑な対応など）を続けてしまい、エフィラの「感じよくマインド」と乖離してしまった。", "l": 0}, {"t": "b", "x": "同一の業界経験者で経験を積んだメンバーが入社したので、大丈夫だろうと思い結果点を長期的な目標にしていたところ、そのメンバーはすぐに結果を出し認められたい、という気持ちになってしまい、価値観のズレた独自のやり方で突き進んでしまった。", "l": 0}, {"t": "h2", "x": "③-9）シフトは部下の希望休を聞き、平等に作成しましょう"}, {"t": "p", "x": "シフトを決める際は、メンバーに希望休があるか確認し、できるだけ反映させましょう。連休が取れるように調整しましょう。ただし、公平性を担保するため、月３回までなど、一定のルールのもと運営していきましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）シフト作成の際、部下からの希望休を全て叶えることは難しかったので、全員の希望が月に３日は叶えられるように調整した。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）シフト提出期限内であるにもかかわらず、既にシフトを作成してしまったという理由で希望休を考慮しない。また希望休有無の確認忘れや反映忘れをする。", "l": 0}, {"t": "b", "x": "２）パートナー状況や全体のバランスを考慮せず、特定のメンバーの希望を聞き入れる。特定のメンバーだけ連休が組み込まれるシフトになっている。", "l": 0}, {"t": "b", "x": "３）毎月同じようなシフトにすれば問題が起きないと考え、早番や遅番を長期間にわたり、いつも同じ職員にしている。", "l": 0}, {"t": "h2", "x": "③-10）部下のシフト変更はなるべくしないようにしましょう"}, {"t": "p", "x": "シフトを組む時は、繁忙期や閑散期の業務量に応じて計画性をもって作成すること。\u000b\u000bシフト変更を頻繁に行うと、メンバーの勤務予定が不規則になったり、残業過多になる恐れがある。突発的な事案が無い限り、極力、シフト変更はしないこと。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）繁忙期のシフトは早めにヘルプなどを募り、期日までに作成を完了させている。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）上長Aは「後でシフト変更すればいいから、とりあえず適当に入れておけばいいか」という考えで、パートナーの通所スケジュールを考えずにシフト作成した。\u000b当月になって、やはり人員が足りない日が３日間でてきたので、シフト変更して対応した。", "l": 0}, {"t": "b", "x": "２）部下B「ぼく明日休みなので、今日は遅くまでやっていきます。」", "l": 0}, {"t": "p", "x": "上長A「それではお願いします（急ぎの仕事じゃないけど、いいか）」"}, {"t": "p", "x": "※部下からの申告により、だらだら仕事をさせてしまう。"}, {"t": "h2", "x": "③-11）部下に持ち帰り仕事をさせないようにしましょう"}, {"t": "p", "x": "部下に就業時間外の持ち帰り仕事をさせないようにしましょう。部下の心身に負担が掛かるうえ、情報漏洩や労働問題に発展するリスクがあります。"}, {"t": "p", "x": "上長は部下の業務量を把握し、割り当てや効率化を工夫することで、持ち帰り仕事をさせないようにしましょう。"}, {"t": "p", "x": "また、同様に部下が休みの日に、当日中に対応が必要な指示はしないようにしましょう。（緊急時、どうしても必要な場合を除く）"}, {"t": "p", "x": "※部下本人にやる気があり、自主的に行う場合でも避けましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）部下A「この仕事が終わらなかったので、家に持ち帰って完成させてきてもいいでしょうか」", "l": 0}, {"t": "p", "x": "拠点長「業務は業務時間中に行ってください。明日午前中の２時間あればできますか？」"}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）部下Bは卒園式で使う小道具を家で作成してきた。自宅で作業したほうがはかどるのだろうと思い、上長Aも黙認した。", "l": 0}, {"t": "b", "x": "2）上長A「明後日はおやつ作りだよね。材料を購入して、当日持ってきてください」", "l": 0}, {"t": "p", "x": "部下B「わかりました（買い物なら勤務中に行かせてほしいな）」"}, {"t": "p", "x": "※雑務的な仕事を部下のプライベートに行わせる。"}, {"t": "h2", "x": "③-12）部下の仕事は細かくチェックしましょう"}, {"t": "p", "x": "大事なことは細かく確認（神は細部に宿る）しましょう。大きなことを成し遂げるためには、細かいことであっても徹底することが大切です。"}, {"t": "p", "x": "部下に任せた仕事も、まかせっきりにせず、部下はできていないものと思って細かくチェックするのも上長の仕事です。「部下に任せたのにできていない！」と苛立つなどは問題外です。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）部下A「今朝任された仕事が終わりました！」", "l": 0}, {"t": "p", "x": "拠点長「ありがとうございます！完成したものを確認させてください！」"}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）部下A「今朝任された仕事が終わりました！」", "l": 0}, {"t": "p", "x": "拠点長「ありがとうございました！」（終わったと言っているし確認しなくていいや）"}, {"t": "h2", "x": "③-13）評価の上下をちらつかせて部下を動かそうとしないようにしましょう"}, {"t": "p", "x": "これをやったら評価が上がる/下がる、成果給が増える/減る、顛末書を書いてもらうことになる、などといった外的コントロールを使って報酬と罰をちらつかせながら部下をコントロールしようとしないようにしましょう。これを手段にして部下をコントロールしようとすると、「評価が下がってもいいからやらない」という考えが成立してしまいます。\u000b評価上、下がる上がる事実はありますが、メンバーが動いたあとに結果として評価があるため、評価で釣ってはいけません。どうしたら評価されるかを事前に伝えておくことは必要ですが、指示の際に評価をちらつかせて部下に行動を起こさせるようにすることは望ましくありません。\u000b例）野球の試合で例えると、試合をする前から「この試合で打てなかったらスタメンから外します」と選手を脅す監督の指導は不適切な指導といえるでしょう。スタメンから外すのであれば、本来は試合後に打てなかった=結果を出せなかったという事実を踏まえて判断するべきです。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）特定の業務を嫌がる部下がいたが、「この業務が嫌かもしれませんが、仕事なので嫌でもやっていただかなければならないものもあります。実施してくださいね。」と言った。", "l": 0}, {"t": "b", "x": "２）パートナー獲得のために行うビラ配りの業務を嫌がる部下に対して、「パートナーを増やす取り組みとして必要な業務なので、実施してください」", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）特定の業務を嫌がる部下がいるので、「その仕事をやったら、個人評価を高くしますよ」と言った。", "l": 0}, {"t": "b", "x": "２）新しい業務を依頼する際に、「手当がでるから、この業務をやってもらえますか？」と指示した。", "l": 0}], "subsections": ["③-1）部下には目的を理解した上で伝えましょう", "③-2）部下に対して言うべきことは言いましょう", "③-3）毎日朝礼や終礼を行う、毎月カンファを行いましょう", "③-4）部下には目標を設定し、達成度に対するフィードバックを行いましょう", "③-5）部下に目標を課す際は、目標達成にどういう意味があるのかを併せて伝えましょう", "③-6）みんなで目指している目標は自分の言葉で、理念との関係とともに伝える", "③-7）部下には具体的に指示を行いましょう", "③-8）新人メンバーに対しては、最初は細かく結果点を区切った目標設定をしましょう", "③-9）シフトは部下の希望休を聞き、平等に作成しましょう", "③-10）部下のシフト変更はなるべくしないようにしましょう", "③-11）部下に持ち帰り仕事をさせないようにしましょう", "③-12）部下の仕事は細かくチェックしましょう", "③-13）評価の上下をちらつかせて部下を動かそうとしないようにしましょう"], "text": "③-1）部下には目的を理解した上で伝えましょう 業務指示や制度について、エフィラグループの価値観について、管理職自身がまずメンバー以上に理解し、「なぜこの業務をするのか」「なぜこの目標があるのか」などという目的を説明できるようにした上で、目的も合わせて部下に伝えましょう。 目的を知っている方が部下側も受け入れやすく、疑念も生まれづらいためです。 よくあるOK事例 １）上長から、会議の場で新しい制度の情報共有があった。理解が不十分な点があったので、質問し、部下の懸念が生まれないように説明する準備をした。 よくあるNG事例 １）上長から、会議の場で新しい制度の情報共有があった。背景はよくわからなかった。部下には、「決まったからやってください」と伝えた。 ③-2）部下に対して言うべきことは言いましょう ルール違反があった際だけでなく、上長が求める結果に対して部下ができていないことなど、本人のために伝えないといけないことはしっかり本人に伝えましょう。 これを言ってしまったら部下との関係が悪化するかもしれない、などと思ったとしても、それが組織（チーム）のため、または部下のために必要であるなら伝えないといけません。 よくあるOK事例 １）言葉遣いが気になるメンバーがいる。ルール違反ではないし、本人に悪気がないのはわかっているが、パートナーにとって良くない印象を与えてしまったり、そのメンバーが悪気なく不利益を被ってしまうのはよくないので、本人に改善するよう伝えた。 よくあるNG事例 １）言葉遣いが気になるメンバーがいる。ルール違反ではないし、本人に悪気がないのはわかっているので、パートナーからご指摘があったが、本人がショックを受けないように、本人へは言わなかった。 ③-3）毎日朝礼や終礼を行う、毎月カンファを行いましょう 日毎の朝礼や終礼、毎月のカンファレンスなど、組織のメンバーが複数出席するミーティングの機会を開催しましょう。 定例会により、各メンバーへの情報共有と、各メンバーからの情報収集を行うことで、拠点として対応するべき課題を抽出することができます。 また会に参加することで、自身が組織の一員であるという認識を持つことができるようになります。 ※基本的には３つ以上の階層で同時に行わないこと（上長、部下、部下の部下。などのこと）。位置ずれが発生する懸念があるため。ただし１層目がオブザーバーとしての参加なら可。 よくあるOK事例 １）当日利用するパートナーの申し送り事項や、直近で起きたヒヤリハット事例などを、朝礼で必ず読み合わせている。 よくあるNG事例 １）パートナーから「入浴時に背中を洗うのを手伝ってほしい」と要望されたが、その場にいた職員だけで情報をとめてしまった。後日、事情を知らない職員が従来どおりの介護をしたため、パートナーからクレームを受けてしまった。 ２）定例会で利用児童の支援内容についてレギュラーメンバーへ周知した。だが、不参加のパート職員に対しては、シフトが同じ日になったレギュラーメンバーが伝えてくれるだろうと思い、拠点長としては何もフォローしなかった。 ③-4）部下には目標を設定し、達成度に対するフィードバックを行いましょう 部下には上長が目標を設定してください。 そのうえで目標に対する達成度を定期的に明確にし、部下にフィードバックをすること。（週に１回１５分程度部下との１対１のフィードバックミーティングを行う） ●フィードバックが必要な理由 ・目標を設定することによって、部下が成長することにことにつながるため。 ・達成のためのモニタリング、必要に応じて、目標・行動の修正を行うため ・定期的な１対１（上司と部下）のコミュニケーションをとることによって、メンバーの長期的な定着に繋がる ●留意事項 ・目標を設定する際は「いつまでに」「どの状態か」の具体的な結果を示すようにして、後々ずれがないもので行いましょう。部下を迷わせてしまわないために大切です。 （○月○日までに○件獲得、○月○日までに○が完了している状態など） ※「～を～状態でできるようにする」などでもいいが、状態の目標設定だと完全結果にならないことが多いので、その状態がお互いの認識ずれないように設定する必要がある。 例：○月末日までに請求業務をできるようになる →× 何をもってできるといえるのかが曖昧。 例：○月○日までに入浴介助が一人でできるようになり上長OKをもらっている状態にする（できているかどうかの判断は上長が行う） →○ 理想ではないが、最低限判断が本人ではなく上長になるので設定の仕方としてはOK。 ・入社して間もない部下については、目標を「簡単/小さく/少なく」（結果点を下げる）して、短期間に区切って設定することが望ましい。 目標設定と達成のサイクルを数多く回すことで、部下が迷うことや放置されていると感じることがなくなり、日々の成長を感じやすくなる。 例：今日一日で、パートナーの名前と顔を１０名一致させる。 よくあるOK事例 １）部下とは毎週１対１の面談を設定し、目標の達成度合いの確認や、次の目標設定などをしているので、部下が行動に迷うことはない。 よくあるNG事例 １）「できるだけ早いうちに、送迎をできるようにして下さい」「この資料はすべて読んでおいて」「リストに載っているパートナーに電話しておいて」 （納期あいまい、達成度があいまい） ２）拠点長Aは部下Bにフィードバックした際に「文章がヘタなのでやり直し」とだけ伝えた。部下Bは何をどのように改善したらよいか理解できなかった。 ３）拠点長Aは新入メンバーBに「３か月後の〇月〇日までに施設長業務を全部おぼえる」という目標設定をした。Bは「３ヵ月も時間があるが、今日はまず何をしよう？」「施設長が何をしているかも分からないの」と途方にくれた。（目標が難しい/大きい/長納期） ③-5）部下に目標を課す際は、目標達成にどういう意味があるのかを併せて伝えましょう 部下への目標設定は必要ですが、ただただ目標を追うだけになると、達成の仕方が目的とずれてしまうことがあります。日々の業務の目的は、例えば目の前の数値目標を追うことではないはずですので、その目標をまず達成することでどんな未来を作ろうとしているのか、を理解してもらうようにしましょう。設定された目標がミッション・ビジョンなどの私たちエフィラグループが目指す方向にどうつながっているのか、を理解できると、より力を発揮しやすくなります。 「道徳」と「経済」の「道徳」(理念や人間性)面から理解してもらうようにしましょう。 ※参照 エフィラグループポリシー ≪３つの経営方針≫「① 道経一体経営 ＝ 理念と利益の思想」 よくあるOK事例 １）部下に、今月の目標「○月○日までに入浴介助が一人でできるようになり上長OKをもらっている状態にする」を伝えた。その際に、入浴介助という業務の社会的意義や、エフィラグループのビジョン「誰ひとり取り残さない街をつくる。」につながっている、ということも併せて伝えた。 よくあるNG事例 １）部下に、今月の目標を伝えた。目標数字を絶対に達成しましょう、と伝え、それ以上は言わなかった。 ③-6）みんなで目指している目標は自分の言葉で、理念との関係とともに伝える 自拠点の目標が設定された際、なぜやるか、ということに対して、単に上長から振られたからみんなでやらないといけない、ではやらされているだけにしかなりません。 組織の目標には理由があります。自拠点の目先の目標が、どういうことにつながっていくのか、リーダーがリーダーの言葉で伝えることで、組織として団結することができ、一丸となって目標に向かうことができるでしょう。 「道徳」と「経済」の「道徳」(理念や人間性)面から理解してもらう、を自分の言葉で伝えることができるようにしましょう。 ※参照 エフィラグループポリシー ≪３つの経営方針≫「① 道経一体経営 ＝ 理念と利益の思想」 よくあるOK事例 １）部下に、今月の自拠点の新規パートナー数の目標を伝えた。その際に、パートナー数というのは、エフィラグループのミッション「生ききる」に貢献できている人の数であるし、自身の経験も踏まえ、パートナーからいただいた感謝の言葉とともに社会的意義を併せて伝えた。 よくあるNG事例 １）部下に、今月の新規パートナー数の目標を伝えた。目標数字を絶対に達成しましょう、と伝え、それ以上は言わなかった。 ③-7）部下には具体的に指示を行いましょう 具体的ではない指示は、上長と部下の認識齟齬を生み出し、結果として組織の生産性が低くなってしまうことがあります。 部下が指示内容を明確に認識できるように、完全結果での指示を行うこと。指示が完全結果ではないがゆえに部下が上長が求めるものと異なることをしたとしてもそれは上長側の責任です。 ※具体的とは・・・何を、いつまでに（具体的な納期）、どうなっている状態にするのか、が明確になっていること ※「なるべく早く」「できるだけすぐ」「時間があるときに」など、納期が明確ではない表現をしてはいけません。 よくあるOK事例 １）指示を受けた部下が迷うことの無いよう、営業件数と期限を明確に指示した。 よくあるNG事例 １）拠点長「今週は空いた時間全てを使って訪問営業して下さい」 部下A（今は人員不足で忙しいし、２～３件訪問できればいいかな） 部下B（施設には誰かしら常置しているし、自分は営業中心でいくぞ） ２）拠点長「クレームにならないよう、ご家族への連絡は誠実に行うこと」 部下A（バイタルチェックで異常だった時は連絡しなくちゃ） 部下B（パートナー自身が連絡を望んでいない場合、ご本人の意思を尊重しよう） ３）拠点長「請求書の配布作業をできるだけ早く完了させて下さい」 部下A（パートナーが土日に確認できるように、金曜までに配布するか） 部下B（配布遅延でクレームにならないように、水曜までには配布したいな） ③-8）新人メンバーに対しては、最初は細かく結果点を区切った目標設定をしましょう 新人メンバーにどれだけ経験があっても、所属する会社によって価値観は違うため、それを合わせるために、例えば日ごとに目標を設定するなどして、短期間でのフィードバックを繰り返しましょう。そうすることで、早い段階でエフィラの価値観、配属事業・拠点の価値観になじんでいくことができていきます。 例え、同一の業界経験者で経験を積んだメンバーが入社したとして、経験があるから自由にやっていいですよ、ということはＮＧです。上記のとおり、価値観のずれがあった場合に気づくことができなかったり、マインドのすり合わせができないままポータブルスキルや専門スキルのみで業務を行うことになり、その方の成長にもつながりません。 短期目標を設定する、ということについても同様、価値観がずれたまま進んでしまうことがあったりすることに加え、組織のメンバーの一員だという認識が生まれにくくなってしまうということがあります。 よくあるOK事例 １）経験豊富なメンバーが入社したが、最初の1週間は「毎日17時に、その日覚えた業務と気づきを報告する」という日次目標を設定した。報告の場で、エフィラの価値観（エフィラウェイ）とズレている点があればその都度修正し、フィードバックを行った。 ２）新人メンバーに対し、「3か月後に独り立ち」という大きな目標だけでなく、「今週はパートナーの顔と名前を全員一致させる」「来週は入浴介助の手順をマニュアル通りに実施できる」といった、1週間単位の具体的な短期目標を設定し、毎週振り返りを行った。 よくあるNG事例 他社で10年の経験があるベテランが入社したので、「経験があるから大丈夫でしょう。自由にやってみてください」と伝え、具体的な目標を設定せずに現場を任せた。結果、前職で行っていたやり方（効率重視で雑な対応など）を続けてしまい、エフィラの「感じよくマインド」と乖離してしまった。 同一の業界経験者で経験を積んだメンバーが入社したので、大丈夫だろうと思い結果点を長期的な目標にしていたところ、そのメンバーはすぐに結果を出し認められたい、という気持ちになってしまい、価値観のズレた独自のやり方で突き進んでしまった。 ③-9）シフトは部下の希望休を聞き、平等に作成しましょう シフトを決める際は、メンバーに希望休があるか確認し、できるだけ反映させましょう。連休が取れるように調整しましょう。ただし、公平性を担保するため、月３回までなど、一定のルールのもと運営していきましょう。 よくあるOK事例 １）シフト作成の際、部下からの希望休を全て叶えることは難しかったので、全員の希望が月に３日は叶えられるように調整した。 よくあるNG事例 １）シフト提出期限内であるにもかかわらず、既にシフトを作成してしまったという理由で希望休を考慮しない。また希望休有無の確認忘れや反映忘れをする。 ２）パートナー状況や全体のバランスを考慮せず、特定のメンバーの希望を聞き入れる。特定のメンバーだけ連休が組み込まれるシフトになっている。 ３）毎月同じようなシフトにすれば問題が起きないと考え、早番や遅番を長期間にわたり、いつも同じ職員にしている。 ③-10）部下のシフト変更はなるべくしないようにしましょう シフトを組む時は、繁忙期や閑散期の業務量に応じて計画性をもって作成すること。 シフト変更を頻繁に行うと、メンバーの勤務予定が不規則になったり、残業過多になる恐れがある。突発的な事案が無い限り、極力、シフト変更はしないこと。 よくあるOK事例 １）繁忙期のシフトは早めにヘルプなどを募り、期日までに作成を完了させている。 よくあるNG事例 １）上長Aは「後でシフト変更すればいいから、とりあえず適当に入れておけばいいか」という考えで、パートナーの通所スケジュールを考えずにシフト作成した。 当月になって、やはり人員が足りない日が３日間でてきたので、シフト変更して対応した。 ２）部下B「ぼく明日休みなので、今日は遅くまでやっていきます。」 上長A「それではお願いします（急ぎの仕事じゃないけど、いいか）」 ※部下からの申告により、だらだら仕事をさせてしまう。 ③-11）部下に持ち帰り仕事をさせないようにしましょう 部下に就業時間外の持ち帰り仕事をさせないようにしましょう。部下の心身に負担が掛かるうえ、情報漏洩や労働問題に発展するリスクがあります。 上長は部下の業務量を把握し、割り当てや効率化を工夫することで、持ち帰り仕事をさせないようにしましょう。 また、同様に部下が休みの日に、当日中に対応が必要な指示はしないようにしましょう。（緊急時、どうしても必要な場合を除く） ※部下本人にやる気があり、自主的に行う場合でも避けましょう。 よくあるOK事例 １）部下A「この仕事が終わらなかったので、家に持ち帰って完成させてきてもいいでしょうか」 拠点長「業務は業務時間中に行ってください。明日午前中の２時間あればできますか？」 よくあるNG事例 １）部下Bは卒園式で使う小道具を家で作成してきた。自宅で作業したほうがはかどるのだろうと思い、上長Aも黙認した。 2）上長A「明後日はおやつ作りだよね。材料を購入して、当日持ってきてください」 部下B「わかりました（買い物なら勤務中に行かせてほしいな）」 ※雑務的な仕事を部下のプライベートに行わせる。 ③-12）部下の仕事は細かくチェックしましょう 大事なことは細かく確認（神は細部に宿る）しましょう。大きなことを成し遂げるためには、細かいことであっても徹底することが大切です。 部下に任せた仕事も、まかせっきりにせず、部下はできていないものと思って細かくチェックするのも上長の仕事です。「部下に任せたのにできていない！」と苛立つなどは問題外です。 よくあるOK事例 １）部下A「今朝任された仕事が終わりました！」 拠点長「ありがとうございます！完成したものを確認させてください！」 よくあるNG事例 １）部下A「今朝任された仕事が終わりました！」 拠点長「ありがとうございました！」（終わったと言っているし確認しなくていいや） ③-13）評価の上下をちらつかせて部下を動かそうとしないようにしましょう これをやったら評価が上がる/下がる、成果給が増える/減る、顛末書を書いてもらうことになる、などといった外的コントロールを使って報酬と罰をちらつかせながら部下をコントロールしようとしないようにしましょう。これを手段にして部下をコントロールしようとすると、「評価が下がってもいいからやらない」という考えが成立してしまいます。 評価上、下がる上がる事実はありますが、メンバーが動いたあとに結果として評価があるため、評価で釣ってはいけません。どうしたら評価されるかを事前に伝えておくことは必要ですが、指示の際に評価をちらつかせて部下に行動を起こさせるようにすることは望ましくありません。 例）野球の試合で例えると、試合をする前から「この試合で打てなかったらスタメンから外します」と選手を脅す監督の指導は不適切な指導といえるでしょう。スタメンから外すのであれば、本来は試合後に打てなかった=結果を出せなかったという事実を踏まえて判断するべきです。 よくあるOK事例 １）特定の業務を嫌がる部下がいたが、「この業務が嫌かもしれませんが、仕事なので嫌でもやっていただかなければならないものもあります。実施してくださいね。」と言った。 ２）パートナー獲得のために行うビラ配りの業務を嫌がる部下に対して、「パートナーを増やす取り組みとして必要な業務なので、実施してください」 よくあるNG事例 １）特定の業務を嫌がる部下がいるので、「その仕事をやったら、個人評価を高くしますよ」と言った。 ２）新しい業務を依頼する際に、「手当がでるから、この業務をやってもらえますか？」と指示した。"}, {"title": "④部下との接し方", "blocks": [{"t": "h2", "x": "④-1）部下との信頼関係を大事にしましょう"}, {"t": "p", "x": "信頼関係がないと、部下が定着せず、離職も生まれてしまうでしょう。部下に上長を評価する権限はありませんが、部下との信頼関係を構築することは重要なことですので、信頼関係を大事にしましょう。"}, {"t": "p", "x": "以下のような行動を大事にしましょう"}, {"t": "p", "x": "・部下との約束を守る"}, {"t": "p", "x": "・ルールを守る"}, {"t": "p", "x": "・部下に責任を押し付けない"}, {"t": "p", "x": "・自身の言動を一致させる"}, {"t": "p", "x": "・話を聞く"}, {"t": "p", "x": "・ちゃんと説明する"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）部下から相談をされたが、見学対応のためしっかり話が聞けなかったので、翌日13時に話をする約束をして、予定通り翌日13時に話を聞いた。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）部下から質問をされたが、自分もよくわからないことだったので、「わからないです。手順書を探して読んでください。」と言った。", "l": 0}, {"t": "h2", "x": "④-2）全員に好かれようとしなくていい"}, {"t": "p", "x": "部下との本当の信頼関係は仕事でしか作れません。"}, {"t": "p", "x": "部下に好かれようと、小手先で何とかしようとして、どうにかなるものではありません。部下の成長にコミットし、仕事に対して誠実に真摯に向き合うことでしか本当の信頼は得られないものです。部下に好かれるか嫌われるかを考えず、仕事に向き合い、それでも好かれないなら仕方がない、と考えましょう。"}, {"t": "p", "x": "※心得Ⅱの８参照"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）先月ローテして来たメンバーが、「前の拠点の拠点長のほうが好き」と言っているのを聞いた。ショックだったが、今後も変わらずその部下の成長にコミットし、仕事に向き合っていくことで信頼関係を構築していこうと思った。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）自分のことを嫌っていると思われるメンバーがいたので、誕生日にこっそりプレゼントを渡した。", "l": 0}, {"t": "h2", "x": "④-3）感情的なマネジメントをしないようにしましょう"}, {"t": "p", "x": "感情を入れると、部下は上長を１人の人間として見るようになり、同格（同列/同僚）のような錯覚を持ってしまいます。ポジション、役割はルールで決められたものですので、ルールに従って、感情を入れずマネジメントを行いましょう。"}, {"t": "p", "x": "なお、怒りや悲しみなどと言う感情を自分の中で発生させてはいけない、ということではありません。感情がわいてくることは当然あると思います。ですが、それに対して、自身でその感情をコントロールして、表面に出さないようにしましょう、という意味です。思ってしまうことはありますし、自由ですが、自己を律して表にださないようにしましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）ミスをしてしまった部下に対して、これからどうやって再発防止をしていくかを淡々と話した。", "l": 0}, {"t": "b", "x": "２）ミスをしてしまった部下に対して、怒りの感情がわいたが、表に出さないようにふるまい、今後どうしていくのかを話し合った。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）今月は拠点長自身の勤務時間が長かったため疲労がたまっていた。\u000bそのため、ついつい、いつもより厳しい口調でメンバーに指示してしまった。", "l": 0}, {"t": "b", "x": "２）何回もミスを指摘したが、部下の行動が修正されず、言葉を荒げてしまった。", "l": 0}, {"t": "b", "x": "３）特定の部下の発案が素晴らしかったので、「やる気あってすばらしい」「この部下のように、皆もやる気をだすように」他のメンバーのいるところで言った。", "l": 0}, {"t": "b", "x": "４）ミスをしたメンバーに対して、「気合が足りない。自分だったらもっと注意深くやるのに。」と言った。", "l": 0}, {"t": "h2", "x": "④-4）合言葉は「イライラしてもデメリットしかない」"}, {"t": "p", "x": "④-3）にあるように、感情的なマネジメントは良くない、とわかっていても、ついついイライラしてしまうこともあるでしょう。そんな時は、「イライラしてもデメリットしかない」と自分に言い聞かせることで、自己を律するようにしましょう。"}, {"t": "p", "x": "まずは、感情的にならない、ということが大事なのですが、ついついイライラしてしまった時は、いったん一呼吸おいてこの言葉を思い出し、イライラを表に出して空気を悪くしてしまうことや口調が強くなってしまうことはデメリットしかない、と思い返すようにしましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）ミスをしてしまった部下に対して、ついついイライラしてしまったが、合言葉「イライラしてもデメリットしかない」を思い出し、この感情を出しても何も生まれない、と冷静になった。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）ミスをしてしまった部下に対して、ついついイライラしてしまった。感情的なマネジメントは良くないと思っていたが、感情のコントロールができず、イライラを態度にだして、その部下に冷たくあたってしまった。", "l": 0}, {"t": "h2", "x": "④-5）部下とは一定の距離感を保ちましょう"}, {"t": "p", "x": "部下は友達ではないため、どの部下とも距離が近くなりすぎないように、平等に接しましょう。"}, {"t": "p", "x": "心理上、並列の関係（仲良し、友達、というような感覚）になってしまうと、指示が通りづらくなってしまったり、公平性が保たれなくなるなど、マネジメントに多くの問題が発生する可能性があります。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）共通の趣味を持つ部下がいることを知っているが、特定の部下とばかり話すのはよくないので、平等に話題を振るようにしている。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）日常的に部下と同じ趣味の話をしてしまい、部下が上長に対してなんでも気軽に話せる関係を作ってしまった結果、言い訳を簡単にしてくるようになった。", "l": 0}, {"t": "b", "x": "２）休日の予定などプライベートにまで干渉して、部下との心の距離を近づけようとした。", "l": 0}, {"t": "b", "x": "３）特定の部下に対して、食事に誘ったり、プレゼントを贈ったりする。他の部下は不平等だと感じている。", "l": 0}, {"t": "h2", "x": "④-6）得意な部下と仲良くしすぎない、苦手な部下を放置しない"}, {"t": "p", "x": "④-4）で公平性を保つためにも部下と距離をとるとありますが、とはいえ、公平に接するというのは難しいため、「得意な部下と仲良くしすぎない、苦手な部下を放置しない」を意識するようにすると良いでしょう。"}, {"t": "p", "x": "無意識のうちに、自身にとって、得意な人には仲良くしすぎてしまったり、苦手意識を持っている人に対しては放置してしまったりするものです。"}, {"t": "p", "x": "不公平に見えないようにするため、バランスをとるためにも、この意識をもって行動すると良いでしょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）少し苦手な部下がいる。無意識に関わりを避けてしまうことのないように、積極的に話をするようにしている。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）得意な部下と苦手な部下がいる。平等に接しているつもりだったが、他のメンバーに、「メンバーの〇〇さん(得意な部下)と仲がいいですね」と言われてしまった。", "l": 0}, {"t": "h2", "x": "④-7）部下に対して偉そうな態度をとらないようにしましょう"}, {"t": "p", "x": "上長・部下の関係を自身に都合よく解釈して、部下をぞんざいに扱ったり、威張った態度をとってはいけません。"}, {"t": "p", "x": "役職が高いことは、責任と役割が大きいということを示すだけであり、人間としての価値が優れているわけでもありません。役職がついたからといって自分が偉くなったと勘違いし、部下を見下したり、横柄な態度をとったりしてはいけません。 組織の影響力が増せば増すほど、リーダーは誰よりも腰が低く、謙虚でなければなりません。自分にできない現場の役割を担ってくれている部下や同僚に対し、常に敬意と感謝の念を持って接するようにしましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）他のメンバーを人として尊重するように接している。", "l": 0}, {"t": "b", "x": "２）自分は拠点長であるが、現場で直接パートナー対応をしてくれているメンバーの働きがあってこそ拠点が回っていると理解し、日々の声かけで感謝を伝えている。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）「おまえさぁ」などの発言から始まる上長は指示の口調も乱暴になりがち。それが続いた結果、部下も反抗的になり、指示に対して不満を言うようになった。", "l": 0}, {"t": "b", "x": "２）「上長の指示は絶対だ」というだけで、部下の意見や話を全く聞き入れようとしない。", "l": 0}, {"t": "b", "x": "３）よくメンバーの前で自分の武勇伝などを語ったりしている。", "l": 0}, {"t": "b", "x": "４）役職に就いた途端、自分が偉くなったと錯覚し、部下に対して「自分の言う通りにすればいいんだ」と高圧的な態度を取るようになった。", "l": 0}, {"t": "b", "x": "５）会社の業績が伸びていることを自分の実力だと過信し、取引先や外部の業者に対して横柄な態度をとってしまった。", "l": 0}, {"t": "h2", "x": "④-8）役職は「役」であると考え、理想の上長を演じましょう"}, {"t": "p", "x": "※【心得 Ⅳ 】謙虚であること１．役職があっても偉そうにしない 参照"}, {"t": "p", "x": "※理想の上長像 参照"}, {"t": "p", "x": "上長とは「役職・役目・役割」ですので、本当の自分がどうありたいかとは関係なく、望ましい上長像を演じるくらいの気持ちで役割を果たしましょう。本来の自分とは違う姿かもしれませんが、「役職・役目・役割」を果たすための役を演じるつもりで行動しましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）プライベートでは、大雑把で適当な性格だとよく言われるが、「理想の上長像」を参照し、小さなルール違反でも見逃さず指摘し、ルールを守れる拠点を作れるように行動している。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）プライベートでは、大雑把で適当な性格だとよく言われる。自身の持ち味でもあるので、上長としてどうあるべきかは気にしない。", "l": 0}, {"t": "h2", "x": "④-9）部下に嫌いという感情を出して接しないようにしましょう"}, {"t": "p", "x": "感情の中でも、嫌いという気持ちは特に抑えないといけません。そのような環境では、部下側も疑念をもつようになり、仕事に集中しづらくなってしまいます。嫌いという気持ちは「言葉/表情/リアクション」に出やすいことに注意しましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）実は嫌いな部下がいるが、他のメンバーと変わらない態度で接している。", "l": 0}, {"t": "b", "x": "２）部下や上司に対し、嫌いという感情を持つことはない。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）嫌いな部下が話すときだけ、目を合わせず会話をしてしまう。また、他の部下と態度が異なる。", "l": 0}, {"t": "b", "x": "２）上長「連絡帳の作成は進んでる？」", "l": 0}, {"t": "p", "x": "部下「半分ほど終わりました」"}, {"t": "p", "x": "上長「まだ半分なの？ あとさ、何件終わったのか、数字で言ってよ」"}, {"t": "p", "x": "※嫌味や余計な一言をいってしまう。"}, {"t": "b", "x": "３）部下Aは、私の指示に対して意見してくることが多く、以前から内心鬱陶しく感じていた。\u000b本日、部下Aのミスにより、連絡帳に掲載する写真の撮影漏れが発生した。私は以前からのうっぷんを晴らすために、部下Aに対して、他の部下よりも厳しい態度で、人格否定も交えながら叱責した。", "l": 0}, {"t": "h2", "x": "④-10）部下と約束をしたら守る/守れない約束はしないようにしましょう"}, {"t": "p", "x": "部下と約束をした場合には、小さなことでも必ず守ること。できない約束はしないこと。"}, {"t": "p", "x": "上長が約束を守らないと、部下は上長に対して不信感を抱くようになる。上長が感じているよりも部下側は約束を守られなかった事実を覚えているものである。"}, {"t": "p", "x": "約束を破ってしまう上長の拠点は、拠点としてパートナーとの約束も守れない事業所になってしまいます。（みんなが、守らなくていいんだ、となってしまいます）"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）部下「本日中に確認していただきたい資料があるのですが、確認いただけます か」", "l": 0}, {"t": "p", "x": "拠点長「本日はこれからパートナーの対応（お約束）があるので難しいです。明 日午前中までに確認します。」"}, {"t": "p", "x": "部下「それであれば間に合います。よろしくお願いします。」"}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）部下「指示のあった資料を作成したので、確認していただけますか？」", "l": 0}, {"t": "p", "x": "拠点長「分かりました。夕方までに確認して、終わったら声掛けします」"}, {"t": "p", "x": "（その日に拠点長から声掛けはなく、翌日もこちらから切り出すまで何も言われ なかった。）"}, {"t": "b", "x": "２）レクで必要な備品を今週中に上長に購入してもらうことになっていたが、忘れていたのか購入しておらず、レクの準備が間に合わなかった。過去にも同じようなことが何度かあり、業務に支障が出ている。", "l": 0}, {"t": "img", "src": "images/image11.png", "w": 70, "h": 25}, {"t": "h2", "x": "④-11）相談しやすい（明るい）雰囲気を作りましょう"}, {"t": "p", "x": "他指針を意識するあまり、部下との距離を意識しすぎて、職場が暗い殺伐とした雰囲気になることは本意ではありません。"}, {"t": "p", "x": "組織が円滑に機能するためには、部下と上長が距離が近いことは望ましくないが、明るい雰囲気の職場であることは望ましいことです。"}, {"t": "p", "x": "ここで言う、「明るい雰囲気」というのは、一生懸命笑わせにいったりすることを求めるものではなく、「心に余裕を持って接すること」です。"}, {"t": "p", "x": "自身に余裕がないと、感情的な状態になったり、判断を間違えたりしてしまうことがありますので、心に余裕を持ち、相談しやすい雰囲気を作ることを心がけましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）急なメンバーの欠員が出てしまい、拠点内がバタバタとしているが、何かあった時に部下が相談しやすいよう、明るく、余裕をもってふるまっている。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）拠点長Ａは、部下との距離を保つため、会話をする時は無表情で仕事している。部下たちは「拠点長はいつも機嫌が悪い」と思い込み、びくびくしながら仕事をしている。", "l": 0}, {"t": "b", "x": "２）拠点長Ａは職場の雰囲気を明るくしようと心掛けているが、その思いが空回りして、部下と仲良くすることを最優先してしまった。そのうち、部下が親しい関係に甘えるようになり、「その業務はやりたくないです」などと言うようになった。", "l": 0}, {"t": "h2", "x": "④-12）前向きな態度をとりましょう"}, {"t": "p", "x": "ネガティブな言葉や態度を表に出さないようにしましょう。"}, {"t": "p", "x": "上長が使っている言葉や態度が組織の雰囲気にも影響してしまいます。自身の発言の影響力を考え、メンバーを不安にさせることのないようにしましょう。"}, {"t": "p", "x": "上長が前向きな言動を示すことで、メンバーも前向きになれるものです。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）イレギュラー対応が続き少し疲れがあったが、明日は休めるので疲れを見せないようにふるまった。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）仕事が立て込んで辛くなったので「辞めようかな」「上司が助けてくれない」などと部下に聞こえる場所で言ったり、ため息をついたりした。", "l": 0}, {"t": "h2", "x": "④-13）「忙しい」「大変」と部下の前で言わないようにしましょう"}, {"t": "p", "x": "④-10）にもあるように、ネガティブな言葉や態度を表に出さないようにするのはもちろんですが、例え忙しく大変な時であっても、それを部下の前で口に出さないようにしましょう。上長が「忙しい」「大変」と口に出している時、少なからず、上長に対して気をつかい、相談事があっても口に出しづらい、部下自身が大変であっても伝えづらい空気にさせてしまうことでしょう。"}, {"t": "p", "x": "上長の皆さんの言葉が与える影響は、思った以上に大きいものですので、「忙しい」「大変」という言葉は部下の皆さんの前では口に出さないようにしましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）どんなに忙しい時でも、「忙しい」と口に出すことはしないようにしている。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）拠点長業務が忙しかったので、「拠点長業務が忙しくて大変です。」と部下に話した。", "l": 0}, {"t": "h2", "x": "④-14）失敗したとき「何で」と理由を問い詰めないようにしましょう"}, {"t": "p", "x": "部下が失敗したときに、何でやったのか、と理由や要因を聞くと、防衛の気持ちが働き、理由を作り出してしまうものです。部下も心理的にダメージを受けやすいことでしょう。"}, {"t": "p", "x": "「何でやったのか」と過去の話をするのではなく、「対策をどう考えているのか」など未来の話に集中すると、建設的な意見がでやすいことでしょう。"}, {"t": "p", "x": "部下が失敗してしまったときには、過去の話ではなく、未来の話を中心に行いましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）部下がパートナーからクレームを受けてしまった。今回の件が起きてしまった原因を一緒に考え、次からの対応方針を明確にした。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）部下がパートナーからクレームを受けてしまった。「なんでそんな対応をしたのですか」と問い詰めた。", "l": 0}, {"t": "p", "x": "2"}, {"t": "h2", "x": "④-15）部下に「二度とやらないで」「前にも言った」「早く覚えて」というような表現は禁止"}, {"t": "p", "x": "部下を育成する際に、タイトルにあるような表現をすることは禁止です。こういった表現をするような上司の元で働きたいと思えない人は多いことでしょう。"}, {"t": "p", "x": "育成とは難しいもので、簡単に人は育たないものです。自分が新人の頃はできた、とか、他の方はできている、などと思ってしまうことがあるかと思いますが、一人ひとり習熟のペースは違います。そういうものだと思って接しましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）部下が前日１度教えた業務をやっていなかった。改めて、自分の伝え方を振り返り、再度、業務手順を一緒に確認した。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）部下が前日教えた業務を忘れたので、「昨日いいましたよね。早く覚えてください！」と言った。", "l": 0}, {"t": "h2", "x": "④-16）部下には繰り返し教え、あきらめず付き合う"}, {"t": "p", "x": "④‐11にもあるように、育成とは難しいもので、簡単に人は育たないものです。１回教えてできることはない、できるようになっていなければ、教える側の教え方や伝え方が悪かったかもしれないと思い、繰り返し教え、できるようになるまであきらめずに付き合いましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）新人メンバーが、先日口頭で１回教えたことをまた質問していた。口頭だけだと覚えられない手順だったかもしれないと思い、手順書を作成してみるように伝えた。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）新人メンバーが、先日口頭で１回教えたことをまた質問していた。この人はできない人だ、と決めつけ、教えることを諦めた。", "l": 0}, {"t": "h2", "x": "④-17）価値観はしつこいくらい繰り返し伝える"}, {"t": "p", "x": "④‐13にもあるように、１回教えてできることはない、できるようになっていなければ、教える側の教え方や伝え方が悪かったかもしれないと思い、繰り返し教えることが大切です。ましてや、価値観、考え方については特に、上長側が伝えた、伝わった、と思っていても、なかなか一度で理解して行動に移すことは難しいものです。"}, {"t": "p", "x": "ですので、価値観を伝えていくためには、しつこいと思われるかもしれませんが、何度も伝えましょう。行動は徐々に変わっていくものですので、時間をかけて、伝わった！と思わずに何度も繰り返しましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）拠点会議で「自拠点と事業の存在意義」についてディスカッションした。自分たちの日々の業務がグループのミッション・ビジョン達成に向けて貢献していることを実感する有意義な機会になった。また、２カ月後の拠点会議でも同じことを確認することとした。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）拠点会議で「自拠点と事業の存在意義」についてディスカッションした。自分たちの日々の業務がグループのミッション・ビジョン達成に向けて貢献していることを実感する有意義な機会になったし、メンバーも十分に理解したと思ったので、このテーマを次回から取り上げることはしなかった。", "l": 0}, {"t": "h2", "x": "④-18）改善事項の指摘はゆっくりかつ２分以内に行いましょう"}, {"t": "p", "x": "部下に改善してほしいことを指摘する際は、「ゆっくり」かつ「２分以内」で行いましょう。"}, {"t": "p", "x": "早口になったり、長時間になってしまうと部下は萎縮してしまったり、高圧的だと感じてしまうこともあるでしょう。"}, {"t": "p", "x": "意識的に、「ゆっくり」簡潔に「２分以内」におさめるようにしましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）部下のルール違反について指摘をする際に、伝えたいことを簡潔にまとめ、ゆっくりとした口調で伝えた。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）部下のルール違反について指摘をしたが、納得がいかなそうな表情をしていたので、こんこんと説教をした。", "l": 0}, {"t": "h2", "x": "④-19）部下が求められる役割をこなせていないときの対応"}, {"t": "p", "x": "もし仮に、部下に対して繰り返し伝え、あきらめずに教えたがどうしても求められる役割をこなせない場合、上長及び、人材開発部に相談をしましょう。"}, {"t": "p", "x": "この仕事に向いていないのでは、と考えあきらめるのではなく、エフィラグループ全体で、どこか適性があるかもしれない、と考えて、その方が役割を果たせる方法を探しましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）繰り返し教えた業務がどうしてもできない部下がいたが、あきらめずに教え続けている。ブロック長にそのことを相談し、教育のノウハウをいろいろ試していくとともに、人材開発部にもその部下の良いところが活きる職種がないか相談をした。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）繰り返し教えた業務がどうしてもできない部下がおり、教育することを諦めた。拠点内にも諦めムードが漂っている。", "l": 0}, {"t": "h2", "x": "④-20）飲酒状態での部下への連絡・返信はしないようにしましょう"}, {"t": "p", "x": "アルコールが入った状態で、部下へ連絡や返信をしてはいけません。"}, {"t": "p", "x": "お酒を飲んで理性が低下していると、不用意な発言をしてしまったり、部下に対する指摘が過度になったり、感情的な言葉をぶつけてしまうリスクが上がります。 感情的なマネジメントは、部下との信頼関係を損なう原因となります（※④-3参照）。飲酒時は部下への連絡を控え、翌日など理性が保たれた冷静な状態で対応するようにしましょう。"}, {"t": "p", "x": "ただし、部下からの緊急の連絡など、どうしても何か返信・連絡する必要がある場合は、リスクを鑑みて返信内容には十分注意をはらいましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）夜、自宅でお酒を飲んでいる時に部下から業務上の相談メッセージが来た。今返信すると感情的な言葉になってしまうかもしれないと考え、翌朝の冷静な状態になってから返信をした。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）飲酒中に部下からの業務報告を見たところ、内容にミスがあった。お酒が入っていたこともあり、ついカッとなって、普段より厳しい口調で長文の叱責メッセージを送ってしまった。", "l": 0}, {"t": "h2", "x": "④-21）部下が同席する飲み会では、上長はお酒を飲まないようにしましょう"}, {"t": "p", "x": "拠点主催の決起会や歓送迎会など、部下が同席する場において、上長はお酒を飲んではいけません。"}, {"t": "p", "x": "お酒を飲んで理性が低下し、部下に説教をしてしまったり醜態をさらしたりすることは、上長としての信用を完全に失う行為です。部下との本当の信頼関係は、飲み会ではなく日々の仕事でしか作れないと認識しましょう（※心得Ⅱの8参照）。 部下との飲み会であっても、上長は常に「仕事（マネジメントの場）」であるという意識を持ち、適度な距離感と冷静さを保って参加するようにしましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）拠点の歓送迎会に参加した際、部下たちは楽しくお酒を飲んでいたが、上長である自分はソフトドリンクのみを飲み、マネジメントの場として常に冷静さを保ちながら周囲への気配りを行った。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）「無礼講だから」とお酒を飲みすぎて醜態をさらし、部下に介抱させてしまった。", "l": 0}], "subsections": ["④-1）部下との信頼関係を大事にしましょう", "④-2）全員に好かれようとしなくていい", "④-3）感情的なマネジメントをしないようにしましょう", "④-4）合言葉は「イライラしてもデメリットしかない」", "④-5）部下とは一定の距離感を保ちましょう", "④-6）得意な部下と仲良くしすぎない、苦手な部下を放置しない", "④-7）部下に対して偉そうな態度をとらないようにしましょう", "④-8）役職は「役」であると考え、理想の上長を演じましょう", "④-9）部下に嫌いという感情を出して接しないようにしましょう", "④-10）部下と約束をしたら守る/守れない約束はしないようにしましょう", "④-11）相談しやすい（明るい）雰囲気を作りましょう", "④-12）前向きな態度をとりましょう", "④-13）「忙しい」「大変」と部下の前で言わないようにしましょう", "④-14）失敗したとき「何で」と理由を問い詰めないようにしましょう", "④-15）部下に「二度とやらないで」「前にも言った」「早く覚えて」というような表現は禁止", "④-16）部下には繰り返し教え、あきらめず付き合う", "④-17）価値観はしつこいくらい繰り返し伝える", "④-18）改善事項の指摘はゆっくりかつ２分以内に行いましょう", "④-19）部下が求められる役割をこなせていないときの対応", "④-20）飲酒状態での部下への連絡・返信はしないようにしましょう", "④-21）部下が同席する飲み会では、上長はお酒を飲まないようにしましょう"], "text": "④-1）部下との信頼関係を大事にしましょう 信頼関係がないと、部下が定着せず、離職も生まれてしまうでしょう。部下に上長を評価する権限はありませんが、部下との信頼関係を構築することは重要なことですので、信頼関係を大事にしましょう。 以下のような行動を大事にしましょう ・部下との約束を守る ・ルールを守る ・部下に責任を押し付けない ・自身の言動を一致させる ・話を聞く ・ちゃんと説明する よくあるOK事例 １）部下から相談をされたが、見学対応のためしっかり話が聞けなかったので、翌日13時に話をする約束をして、予定通り翌日13時に話を聞いた。 よくあるNG事例 １）部下から質問をされたが、自分もよくわからないことだったので、「わからないです。手順書を探して読んでください。」と言った。 ④-2）全員に好かれようとしなくていい 部下との本当の信頼関係は仕事でしか作れません。 部下に好かれようと、小手先で何とかしようとして、どうにかなるものではありません。部下の成長にコミットし、仕事に対して誠実に真摯に向き合うことでしか本当の信頼は得られないものです。部下に好かれるか嫌われるかを考えず、仕事に向き合い、それでも好かれないなら仕方がない、と考えましょう。 ※心得Ⅱの８参照 よくあるOK事例 １）先月ローテして来たメンバーが、「前の拠点の拠点長のほうが好き」と言っているのを聞いた。ショックだったが、今後も変わらずその部下の成長にコミットし、仕事に向き合っていくことで信頼関係を構築していこうと思った。 よくあるNG事例 １）自分のことを嫌っていると思われるメンバーがいたので、誕生日にこっそりプレゼントを渡した。 ④-3）感情的なマネジメントをしないようにしましょう 感情を入れると、部下は上長を１人の人間として見るようになり、同格（同列/同僚）のような錯覚を持ってしまいます。ポジション、役割はルールで決められたものですので、ルールに従って、感情を入れずマネジメントを行いましょう。 なお、怒りや悲しみなどと言う感情を自分の中で発生させてはいけない、ということではありません。感情がわいてくることは当然あると思います。ですが、それに対して、自身でその感情をコントロールして、表面に出さないようにしましょう、という意味です。思ってしまうことはありますし、自由ですが、自己を律して表にださないようにしましょう。 よくあるOK事例 １）ミスをしてしまった部下に対して、これからどうやって再発防止をしていくかを淡々と話した。 ２）ミスをしてしまった部下に対して、怒りの感情がわいたが、表に出さないようにふるまい、今後どうしていくのかを話し合った。 よくあるNG事例 １）今月は拠点長自身の勤務時間が長かったため疲労がたまっていた。 そのため、ついつい、いつもより厳しい口調でメンバーに指示してしまった。 ２）何回もミスを指摘したが、部下の行動が修正されず、言葉を荒げてしまった。 ３）特定の部下の発案が素晴らしかったので、「やる気あってすばらしい」「この部下のように、皆もやる気をだすように」他のメンバーのいるところで言った。 ４）ミスをしたメンバーに対して、「気合が足りない。自分だったらもっと注意深くやるのに。」と言った。 ④-4）合言葉は「イライラしてもデメリットしかない」 ④-3）にあるように、感情的なマネジメントは良くない、とわかっていても、ついついイライラしてしまうこともあるでしょう。そんな時は、「イライラしてもデメリットしかない」と自分に言い聞かせることで、自己を律するようにしましょう。 まずは、感情的にならない、ということが大事なのですが、ついついイライラしてしまった時は、いったん一呼吸おいてこの言葉を思い出し、イライラを表に出して空気を悪くしてしまうことや口調が強くなってしまうことはデメリットしかない、と思い返すようにしましょう。 よくあるOK事例 １）ミスをしてしまった部下に対して、ついついイライラしてしまったが、合言葉「イライラしてもデメリットしかない」を思い出し、この感情を出しても何も生まれない、と冷静になった。 よくあるNG事例 １）ミスをしてしまった部下に対して、ついついイライラしてしまった。感情的なマネジメントは良くないと思っていたが、感情のコントロールができず、イライラを態度にだして、その部下に冷たくあたってしまった。 ④-5）部下とは一定の距離感を保ちましょう 部下は友達ではないため、どの部下とも距離が近くなりすぎないように、平等に接しましょう。 心理上、並列の関係（仲良し、友達、というような感覚）になってしまうと、指示が通りづらくなってしまったり、公平性が保たれなくなるなど、マネジメントに多くの問題が発生する可能性があります。 よくあるOK事例 １）共通の趣味を持つ部下がいることを知っているが、特定の部下とばかり話すのはよくないので、平等に話題を振るようにしている。 よくあるNG事例 １）日常的に部下と同じ趣味の話をしてしまい、部下が上長に対してなんでも気軽に話せる関係を作ってしまった結果、言い訳を簡単にしてくるようになった。 ２）休日の予定などプライベートにまで干渉して、部下との心の距離を近づけようとした。 ３）特定の部下に対して、食事に誘ったり、プレゼントを贈ったりする。他の部下は不平等だと感じている。 ④-6）得意な部下と仲良くしすぎない、苦手な部下を放置しない ④-4）で公平性を保つためにも部下と距離をとるとありますが、とはいえ、公平に接するというのは難しいため、「得意な部下と仲良くしすぎない、苦手な部下を放置しない」を意識するようにすると良いでしょう。 無意識のうちに、自身にとって、得意な人には仲良くしすぎてしまったり、苦手意識を持っている人に対しては放置してしまったりするものです。 不公平に見えないようにするため、バランスをとるためにも、この意識をもって行動すると良いでしょう。 よくあるOK事例 １）少し苦手な部下がいる。無意識に関わりを避けてしまうことのないように、積極的に話をするようにしている。 よくあるNG事例 １）得意な部下と苦手な部下がいる。平等に接しているつもりだったが、他のメンバーに、「メンバーの〇〇さん(得意な部下)と仲がいいですね」と言われてしまった。 ④-7）部下に対して偉そうな態度をとらないようにしましょう 上長・部下の関係を自身に都合よく解釈して、部下をぞんざいに扱ったり、威張った態度をとってはいけません。 役職が高いことは、責任と役割が大きいということを示すだけであり、人間としての価値が優れているわけでもありません。役職がついたからといって自分が偉くなったと勘違いし、部下を見下したり、横柄な態度をとったりしてはいけません。 組織の影響力が増せば増すほど、リーダーは誰よりも腰が低く、謙虚でなければなりません。自分にできない現場の役割を担ってくれている部下や同僚に対し、常に敬意と感謝の念を持って接するようにしましょう。 よくあるOK事例 １）他のメンバーを人として尊重するように接している。 ２）自分は拠点長であるが、現場で直接パートナー対応をしてくれているメンバーの働きがあってこそ拠点が回っていると理解し、日々の声かけで感謝を伝えている。 よくあるNG事例 １）「おまえさぁ」などの発言から始まる上長は指示の口調も乱暴になりがち。それが続いた結果、部下も反抗的になり、指示に対して不満を言うようになった。 ２）「上長の指示は絶対だ」というだけで、部下の意見や話を全く聞き入れようとしない。 ３）よくメンバーの前で自分の武勇伝などを語ったりしている。 ４）役職に就いた途端、自分が偉くなったと錯覚し、部下に対して「自分の言う通りにすればいいんだ」と高圧的な態度を取るようになった。 ５）会社の業績が伸びていることを自分の実力だと過信し、取引先や外部の業者に対して横柄な態度をとってしまった。 ④-8）役職は「役」であると考え、理想の上長を演じましょう ※【心得 Ⅳ 】謙虚であること１．役職があっても偉そうにしない 参照 ※理想の上長像 参照 上長とは「役職・役目・役割」ですので、本当の自分がどうありたいかとは関係なく、望ましい上長像を演じるくらいの気持ちで役割を果たしましょう。本来の自分とは違う姿かもしれませんが、「役職・役目・役割」を果たすための役を演じるつもりで行動しましょう。 よくあるOK事例 １）プライベートでは、大雑把で適当な性格だとよく言われるが、「理想の上長像」を参照し、小さなルール違反でも見逃さず指摘し、ルールを守れる拠点を作れるように行動している。 よくあるNG事例 １）プライベートでは、大雑把で適当な性格だとよく言われる。自身の持ち味でもあるので、上長としてどうあるべきかは気にしない。 ④-9）部下に嫌いという感情を出して接しないようにしましょう 感情の中でも、嫌いという気持ちは特に抑えないといけません。そのような環境では、部下側も疑念をもつようになり、仕事に集中しづらくなってしまいます。嫌いという気持ちは「言葉/表情/リアクション」に出やすいことに注意しましょう。 よくあるOK事例 １）実は嫌いな部下がいるが、他のメンバーと変わらない態度で接している。 ２）部下や上司に対し、嫌いという感情を持つことはない。 よくあるNG事例 １）嫌いな部下が話すときだけ、目を合わせず会話をしてしまう。また、他の部下と態度が異なる。 ２）上長「連絡帳の作成は進んでる？」 部下「半分ほど終わりました」 上長「まだ半分なの？ あとさ、何件終わったのか、数字で言ってよ」 ※嫌味や余計な一言をいってしまう。 ３）部下Aは、私の指示に対して意見してくることが多く、以前から内心鬱陶しく感じていた。 本日、部下Aのミスにより、連絡帳に掲載する写真の撮影漏れが発生した。私は以前からのうっぷんを晴らすために、部下Aに対して、他の部下よりも厳しい態度で、人格否定も交えながら叱責した。 ④-10）部下と約束をしたら守る/守れない約束はしないようにしましょう 部下と約束をした場合には、小さなことでも必ず守ること。できない約束はしないこと。 上長が約束を守らないと、部下は上長に対して不信感を抱くようになる。上長が感じているよりも部下側は約束を守られなかった事実を覚えているものである。 約束を破ってしまう上長の拠点は、拠点としてパートナーとの約束も守れない事業所になってしまいます。（みんなが、守らなくていいんだ、となってしまいます） よくあるOK事例 １）部下「本日中に確認していただきたい資料があるのですが、確認いただけます か」 拠点長「本日はこれからパートナーの対応（お約束）があるので難しいです。明 日午前中までに確認します。」 部下「それであれば間に合います。よろしくお願いします。」 よくあるNG事例 １）部下「指示のあった資料を作成したので、確認していただけますか？」 拠点長「分かりました。夕方までに確認して、終わったら声掛けします」 （その日に拠点長から声掛けはなく、翌日もこちらから切り出すまで何も言われ なかった。） ２）レクで必要な備品を今週中に上長に購入してもらうことになっていたが、忘れていたのか購入しておらず、レクの準備が間に合わなかった。過去にも同じようなことが何度かあり、業務に支障が出ている。 ④-11）相談しやすい（明るい）雰囲気を作りましょう 他指針を意識するあまり、部下との距離を意識しすぎて、職場が暗い殺伐とした雰囲気になることは本意ではありません。 組織が円滑に機能するためには、部下と上長が距離が近いことは望ましくないが、明るい雰囲気の職場であることは望ましいことです。 ここで言う、「明るい雰囲気」というのは、一生懸命笑わせにいったりすることを求めるものではなく、「心に余裕を持って接すること」です。 自身に余裕がないと、感情的な状態になったり、判断を間違えたりしてしまうことがありますので、心に余裕を持ち、相談しやすい雰囲気を作ることを心がけましょう。 よくあるOK事例 １）急なメンバーの欠員が出てしまい、拠点内がバタバタとしているが、何かあった時に部下が相談しやすいよう、明るく、余裕をもってふるまっている。 よくあるNG事例 １）拠点長Ａは、部下との距離を保つため、会話をする時は無表情で仕事している。部下たちは「拠点長はいつも機嫌が悪い」と思い込み、びくびくしながら仕事をしている。 ２）拠点長Ａは職場の雰囲気を明るくしようと心掛けているが、その思いが空回りして、部下と仲良くすることを最優先してしまった。そのうち、部下が親しい関係に甘えるようになり、「その業務はやりたくないです」などと言うようになった。 ④-12）前向きな態度をとりましょう ネガティブな言葉や態度を表に出さないようにしましょう。 上長が使っている言葉や態度が組織の雰囲気にも影響してしまいます。自身の発言の影響力を考え、メンバーを不安にさせることのないようにしましょう。 上長が前向きな言動を示すことで、メンバーも前向きになれるものです。 よくあるOK事例 １）イレギュラー対応が続き少し疲れがあったが、明日は休めるので疲れを見せないようにふるまった。 よくあるNG事例 １）仕事が立て込んで辛くなったので「辞めようかな」「上司が助けてくれない」などと部下に聞こえる場所で言ったり、ため息をついたりした。 ④-13）「忙しい」「大変」と部下の前で言わないようにしましょう ④-10）にもあるように、ネガティブな言葉や態度を表に出さないようにするのはもちろんですが、例え忙しく大変な時であっても、それを部下の前で口に出さないようにしましょう。上長が「忙しい」「大変」と口に出している時、少なからず、上長に対して気をつかい、相談事があっても口に出しづらい、部下自身が大変であっても伝えづらい空気にさせてしまうことでしょう。 上長の皆さんの言葉が与える影響は、思った以上に大きいものですので、「忙しい」「大変」という言葉は部下の皆さんの前では口に出さないようにしましょう。 よくあるOK事例 １）どんなに忙しい時でも、「忙しい」と口に出すことはしないようにしている。 よくあるNG事例 １）拠点長業務が忙しかったので、「拠点長業務が忙しくて大変です。」と部下に話した。 ④-14）失敗したとき「何で」と理由を問い詰めないようにしましょう 部下が失敗したときに、何でやったのか、と理由や要因を聞くと、防衛の気持ちが働き、理由を作り出してしまうものです。部下も心理的にダメージを受けやすいことでしょう。 「何でやったのか」と過去の話をするのではなく、「対策をどう考えているのか」など未来の話に集中すると、建設的な意見がでやすいことでしょう。 部下が失敗してしまったときには、過去の話ではなく、未来の話を中心に行いましょう。 よくあるOK事例 １）部下がパートナーからクレームを受けてしまった。今回の件が起きてしまった原因を一緒に考え、次からの対応方針を明確にした。 よくあるNG事例 １）部下がパートナーからクレームを受けてしまった。「なんでそんな対応をしたのですか」と問い詰めた。 2 ④-15）部下に「二度とやらないで」「前にも言った」「早く覚えて」というような表現は禁止 部下を育成する際に、タイトルにあるような表現をすることは禁止です。こういった表現をするような上司の元で働きたいと思えない人は多いことでしょう。 育成とは難しいもので、簡単に人は育たないものです。自分が新人の頃はできた、とか、他の方はできている、などと思ってしまうことがあるかと思いますが、一人ひとり習熟のペースは違います。そういうものだと思って接しましょう。 よくあるOK事例 １）部下が前日１度教えた業務をやっていなかった。改めて、自分の伝え方を振り返り、再度、業務手順を一緒に確認した。 よくあるNG事例 １）部下が前日教えた業務を忘れたので、「昨日いいましたよね。早く覚えてください！」と言った。 ④-16）部下には繰り返し教え、あきらめず付き合う ④‐11にもあるように、育成とは難しいもので、簡単に人は育たないものです。１回教えてできることはない、できるようになっていなければ、教える側の教え方や伝え方が悪かったかもしれないと思い、繰り返し教え、できるようになるまであきらめずに付き合いましょう。 よくあるOK事例 １）新人メンバーが、先日口頭で１回教えたことをまた質問していた。口頭だけだと覚えられない手順だったかもしれないと思い、手順書を作成してみるように伝えた。 よくあるNG事例 １）新人メンバーが、先日口頭で１回教えたことをまた質問していた。この人はできない人だ、と決めつけ、教えることを諦めた。 ④-17）価値観はしつこいくらい繰り返し伝える ④‐13にもあるように、１回教えてできることはない、できるようになっていなければ、教える側の教え方や伝え方が悪かったかもしれないと思い、繰り返し教えることが大切です。ましてや、価値観、考え方については特に、上長側が伝えた、伝わった、と思っていても、なかなか一度で理解して行動に移すことは難しいものです。 ですので、価値観を伝えていくためには、しつこいと思われるかもしれませんが、何度も伝えましょう。行動は徐々に変わっていくものですので、時間をかけて、伝わった！と思わずに何度も繰り返しましょう。 よくあるOK事例 １）拠点会議で「自拠点と事業の存在意義」についてディスカッションした。自分たちの日々の業務がグループのミッション・ビジョン達成に向けて貢献していることを実感する有意義な機会になった。また、２カ月後の拠点会議でも同じことを確認することとした。 よくあるNG事例 １）拠点会議で「自拠点と事業の存在意義」についてディスカッションした。自分たちの日々の業務がグループのミッション・ビジョン達成に向けて貢献していることを実感する有意義な機会になったし、メンバーも十分に理解したと思ったので、このテーマを次回から取り上げることはしなかった。 ④-18）改善事項の指摘はゆっくりかつ２分以内に行いましょう 部下に改善してほしいことを指摘する際は、「ゆっくり」かつ「２分以内」で行いましょう。 早口になったり、長時間になってしまうと部下は萎縮してしまったり、高圧的だと感じてしまうこともあるでしょう。 意識的に、「ゆっくり」簡潔に「２分以内」におさめるようにしましょう。 よくあるOK事例 １）部下のルール違反について指摘をする際に、伝えたいことを簡潔にまとめ、ゆっくりとした口調で伝えた。 よくあるNG事例 １）部下のルール違反について指摘をしたが、納得がいかなそうな表情をしていたので、こんこんと説教をした。 ④-19）部下が求められる役割をこなせていないときの対応 もし仮に、部下に対して繰り返し伝え、あきらめずに教えたがどうしても求められる役割をこなせない場合、上長及び、人材開発部に相談をしましょう。 この仕事に向いていないのでは、と考えあきらめるのではなく、エフィラグループ全体で、どこか適性があるかもしれない、と考えて、その方が役割を果たせる方法を探しましょう。 よくあるOK事例 １）繰り返し教えた業務がどうしてもできない部下がいたが、あきらめずに教え続けている。ブロック長にそのことを相談し、教育のノウハウをいろいろ試していくとともに、人材開発部にもその部下の良いところが活きる職種がないか相談をした。 よくあるNG事例 １）繰り返し教えた業務がどうしてもできない部下がおり、教育することを諦めた。拠点内にも諦めムードが漂っている。 ④-20）飲酒状態での部下への連絡・返信はしないようにしましょう アルコールが入った状態で、部下へ連絡や返信をしてはいけません。 お酒を飲んで理性が低下していると、不用意な発言をしてしまったり、部下に対する指摘が過度になったり、感情的な言葉をぶつけてしまうリスクが上がります。 感情的なマネジメントは、部下との信頼関係を損なう原因となります（※④-3参照）。飲酒時は部下への連絡を控え、翌日など理性が保たれた冷静な状態で対応するようにしましょう。 ただし、部下からの緊急の連絡など、どうしても何か返信・連絡する必要がある場合は、リスクを鑑みて返信内容には十分注意をはらいましょう。 よくあるOK事例 １）夜、自宅でお酒を飲んでいる時に部下から業務上の相談メッセージが来た。今返信すると感情的な言葉になってしまうかもしれないと考え、翌朝の冷静な状態になってから返信をした。 よくあるNG事例 １）飲酒中に部下からの業務報告を見たところ、内容にミスがあった。お酒が入っていたこともあり、ついカッとなって、普段より厳しい口調で長文の叱責メッセージを送ってしまった。 ④-21）部下が同席する飲み会では、上長はお酒を飲まないようにしましょう 拠点主催の決起会や歓送迎会など、部下が同席する場において、上長はお酒を飲んではいけません。 お酒を飲んで理性が低下し、部下に説教をしてしまったり醜態をさらしたりすることは、上長としての信用を完全に失う行為です。部下との本当の信頼関係は、飲み会ではなく日々の仕事でしか作れないと認識しましょう（※心得Ⅱの8参照）。 部下との飲み会であっても、上長は常に「仕事（マネジメントの場）」であるという意識を持ち、適度な距離感と冷静さを保って参加するようにしましょう。 よくあるOK事例 １）拠点の歓送迎会に参加した際、部下たちは楽しくお酒を飲んでいたが、上長である自分はソフトドリンクのみを飲み、マネジメントの場として常に冷静さを保ちながら周囲への気配りを行った。 よくあるNG事例 １）「無礼講だから」とお酒を飲みすぎて醜態をさらし、部下に介抱させてしまった。"}, {"title": "⑤部下の発信への対応", "blocks": [{"t": "h2", "x": "⑤-1）部下からの意見はしっかり聞きましょう"}, {"t": "p", "x": "部下からの意見は放置してはいけません。内容を把握して、対処が必要かを検討し、回答しましょう。"}, {"t": "p", "x": "必ずしも取り入れる必要はないが、上長としての判断をフィードバックすること。フィードバックしないと、部下は意見を述べても意味がないと感じ、意見を言わなくなってしまいます。これにより、組織に希望を持てなくなり、離脱を招く要因となってしまうこともあります。"}, {"t": "p", "x": "上長は、フィードバックを必ず行ってください。またあくまでも意見を聞くという話であり、意志決定は上長自身が行いましょう。"}, {"t": "p", "x": "必ずしも意見どおりにする、ということではなく、ちゃんと聞く、聞いてもらった上で、判断してもらった、ということを感じてもらえるようにしましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "p", "x": "１）部下から、次回イベントはこんなことを取り入れたらよいのではないか、という意見があったので検討し、結果その意見は採用とはしなかったが、別の視点もいれた上で次回も発案してほしいと部下へ伝えた。"}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "p", "x": "１）部下が「パートナーに対する他の職員の対応方法について問題点があるのではないか」と上長に意見を述べたが、「対応しておきますね」の回答後１週間たっても改善されない。"}, {"t": "p", "x": "２）部下「物が多すぎて収納が足りないので、BOXを購入したり、棚を作った方がいいと思うのですがいかがでしょうか」\u000b拠点長「検討しますね」\u000b（その後、拠点長からの返答はなし）"}, {"t": "img", "src": "images/image2.png", "w": 87, "h": 32}, {"t": "h2", "x": "⑤-2）部下の質問には丁寧に対応しましょう"}, {"t": "p", "x": "・メンバーの質問に対して「イントラ読んで」という対応はしてはいけません。メンバーは「あの人に聞いてもムダ」と思うようになってしまいます。"}, {"t": "p", "x": "・メンバーの質問にすぐに答えることができず、拠点長が本社に確認する場合、当日中に対応しましょう。この場合、回答時期の目安を伝えましょう。"}, {"t": "p", "x": "・メンバーの質問に対して「それは前に言った」と責めるべきではありません。当人にとっては「前と違う」可能性があるし、困ったことがあった時に質問しづらい雰囲気を作ってしまいます。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）部下からイントラに掲載されている制度についての質問があったので、イントラを見ることはできるか、見た上で疑問点があるのか、を詳しく確認し、結果イントラに掲載されていないイレギュラーな質問だったので、自身から本日中に本社に問い合わせをする、と伝え、回答は来週月曜日になる、と伝えた。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）成果給についての理解がないまま部下から質問されたことをその場しのぎの回答してしまう。すぐに確認して間違えて伝えた部分の訂正もせずにのちに聞いていた話と違うと不信感を持たれてしまった。", "l": 0}, {"t": "b", "x": "２）部下「以前お伝えした運営備品が不足している件、購入していただけましたか？」\u000b拠点長「ごめん、忘れてました。稟議申請が必要なので近々対応します」\u000b部下(いつになったら対応してくれるのだろう...)", "l": 0}, {"t": "h2", "x": "⑤-3）部下から出てきた上申によって、その部下の評価をしないようにしましょう"}, {"t": "p", "x": "部下からの上申の内容によって、その部下の評価を下げてはいけません。"}, {"t": "p", "x": "評価とは、査定につながる評価だけではなく、個人に対する印象評価を含めての評価である。したがって、内容によって、上申した個人に冷たくするなどはあってはいけません。"}, {"t": "p", "x": "提案や上申の内容により評価が下がることがあると、すばらしい案が出てきにくくなってしまうこともあるでしょう。どんな提案をしようとも、身分が保証されている状況があるから、発展的で斬新な案がでる可能性が生まれます。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）自身の決定に批判的と思われるような提案が部下からされたが、その部下の評価に特に影響させることはなかった。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）拠点運営について部下から改善の提案を受けたが、自分が導入したルールを変えたいという内容で気に食わなかったので、却下した。この件を受けて、個人評価の評価項目「拠点長に積極的に貢献する姿勢」には1（最低点）をつけた。", "l": 0}, {"t": "img", "src": "images/image2.png", "w": 87, "h": 32}, {"t": "h2", "x": "⑤-4）部下の話を聞くだけで解決することはたくさんある"}, {"t": "p", "x": "部下の話(意見や質問、相談など)を聞く必要があるのは前提ですが、必ずしもその場で何か解決しないといけないわけではありません。"}, {"t": "p", "x": "「話をちゃんと聴く」ということだけで、解決することも多いものです。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）部下が自身の今後のキャリアについて相談したい、とのことだった。上長である自分がその部下のキャリアについて解決してあげられる気はしなかったが、話を聴いたところ、「この職場でもっとがんばろうと思います」という言葉をもらった。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）部下が自身の今後のキャリアについて相談したい、とのことだった。上長である自分がその部下のキャリアについて解決してあげられる気はしなかったので、本社に相談してください、と言った。", "l": 0}], "subsections": ["⑤-1）部下からの意見はしっかり聞きましょう", "⑤-2）部下の質問には丁寧に対応しましょう", "⑤-3）部下から出てきた上申によって、その部下の評価をしないようにしましょう", "⑤-4）部下の話を聞くだけで解決することはたくさんある"], "text": "⑤-1）部下からの意見はしっかり聞きましょう 部下からの意見は放置してはいけません。内容を把握して、対処が必要かを検討し、回答しましょう。 必ずしも取り入れる必要はないが、上長としての判断をフィードバックすること。フィードバックしないと、部下は意見を述べても意味がないと感じ、意見を言わなくなってしまいます。これにより、組織に希望を持てなくなり、離脱を招く要因となってしまうこともあります。 上長は、フィードバックを必ず行ってください。またあくまでも意見を聞くという話であり、意志決定は上長自身が行いましょう。 必ずしも意見どおりにする、ということではなく、ちゃんと聞く、聞いてもらった上で、判断してもらった、ということを感じてもらえるようにしましょう。 よくあるOK事例 １）部下から、次回イベントはこんなことを取り入れたらよいのではないか、という意見があったので検討し、結果その意見は採用とはしなかったが、別の視点もいれた上で次回も発案してほしいと部下へ伝えた。 よくあるNG事例 １）部下が「パートナーに対する他の職員の対応方法について問題点があるのではないか」と上長に意見を述べたが、「対応しておきますね」の回答後１週間たっても改善されない。 ２）部下「物が多すぎて収納が足りないので、BOXを購入したり、棚を作った方がいいと思うのですがいかがでしょうか」 拠点長「検討しますね」 （その後、拠点長からの返答はなし） ⑤-2）部下の質問には丁寧に対応しましょう ・メンバーの質問に対して「イントラ読んで」という対応はしてはいけません。メンバーは「あの人に聞いてもムダ」と思うようになってしまいます。 ・メンバーの質問にすぐに答えることができず、拠点長が本社に確認する場合、当日中に対応しましょう。この場合、回答時期の目安を伝えましょう。 ・メンバーの質問に対して「それは前に言った」と責めるべきではありません。当人にとっては「前と違う」可能性があるし、困ったことがあった時に質問しづらい雰囲気を作ってしまいます。 よくあるOK事例 １）部下からイントラに掲載されている制度についての質問があったので、イントラを見ることはできるか、見た上で疑問点があるのか、を詳しく確認し、結果イントラに掲載されていないイレギュラーな質問だったので、自身から本日中に本社に問い合わせをする、と伝え、回答は来週月曜日になる、と伝えた。 よくあるNG事例 １）成果給についての理解がないまま部下から質問されたことをその場しのぎの回答してしまう。すぐに確認して間違えて伝えた部分の訂正もせずにのちに聞いていた話と違うと不信感を持たれてしまった。 ２）部下「以前お伝えした運営備品が不足している件、購入していただけましたか？」 拠点長「ごめん、忘れてました。稟議申請が必要なので近々対応します」 部下(いつになったら対応してくれるのだろう...) ⑤-3）部下から出てきた上申によって、その部下の評価をしないようにしましょう 部下からの上申の内容によって、その部下の評価を下げてはいけません。 評価とは、査定につながる評価だけではなく、個人に対する印象評価を含めての評価である。したがって、内容によって、上申した個人に冷たくするなどはあってはいけません。 提案や上申の内容により評価が下がることがあると、すばらしい案が出てきにくくなってしまうこともあるでしょう。どんな提案をしようとも、身分が保証されている状況があるから、発展的で斬新な案がでる可能性が生まれます。 よくあるOK事例 １）自身の決定に批判的と思われるような提案が部下からされたが、その部下の評価に特に影響させることはなかった。 よくあるNG事例 １）拠点運営について部下から改善の提案を受けたが、自分が導入したルールを変えたいという内容で気に食わなかったので、却下した。この件を受けて、個人評価の評価項目「拠点長に積極的に貢献する姿勢」には1（最低点）をつけた。 ⑤-4）部下の話を聞くだけで解決することはたくさんある 部下の話(意見や質問、相談など)を聞く必要があるのは前提ですが、必ずしもその場で何か解決しないといけないわけではありません。 「話をちゃんと聴く」ということだけで、解決することも多いものです。 よくあるOK事例 １）部下が自身の今後のキャリアについて相談したい、とのことだった。上長である自分がその部下のキャリアについて解決してあげられる気はしなかったが、話を聴いたところ、「この職場でもっとがんばろうと思います」という言葉をもらった。 よくあるNG事例 １）部下が自身の今後のキャリアについて相談したい、とのことだった。上長である自分がその部下のキャリアについて解決してあげられる気はしなかったので、本社に相談してください、と言った。"}, {"title": "⑥上長との接し方", "blocks": [{"t": "h2", "x": "⑥-1）どうしたらいいですか、ではなく、これでいいですか"}, {"t": "p", "x": "上長に相談がある場合は、自分なりの結論を述べたうえで相談しましょう。\u000b自分なりの結論がなく、上長に丸投げする『どうしたらいいですか』という発言は、結果がどうあれ自分には関係ない、上長に言われた通りにしておけばいい、という意識から出る言葉です。\u000b上がった課題の解決策を自分で考えた上で『これでいいですか』という聞き方で上長に確認しましょう。自分で考える癖をつけないと成長することができません。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）パートナーのご家族からクレームの連絡が入った。対応時にご家族が安心できるような提案をしたく、事前に上長に「家族イベントやご家族会などを開催するのはどうでしょうか」と確認した。\u000b\u000b守備範囲外のこと（ルール）に対して、疑問に思った場合は、自分なりの結論があれば上長に相談してもいいというイメージでもある", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）パートナーからのクレームの連絡が入った。今まで受けたことのないクレーム内容だったので、上長に「どうすればいいですか」と確認をした。", "l": 0}, {"t": "img", "src": "images/image2.png", "w": 87, "h": 32}], "subsections": ["⑥-1）どうしたらいいですか、ではなく、これでいいですか"], "text": "⑥-1）どうしたらいいですか、ではなく、これでいいですか 上長に相談がある場合は、自分なりの結論を述べたうえで相談しましょう。 自分なりの結論がなく、上長に丸投げする『どうしたらいいですか』という発言は、結果がどうあれ自分には関係ない、上長に言われた通りにしておけばいい、という意識から出る言葉です。 上がった課題の解決策を自分で考えた上で『これでいいですか』という聞き方で上長に確認しましょう。自分で考える癖をつけないと成長することができません。 よくあるOK事例 １）パートナーのご家族からクレームの連絡が入った。対応時にご家族が安心できるような提案をしたく、事前に上長に「家族イベントやご家族会などを開催するのはどうでしょうか」と確認した。 守備範囲外のこと（ルール）に対して、疑問に思った場合は、自分なりの結論があれば上長に相談してもいいというイメージでもある よくあるNG事例 １）パートナーからのクレームの連絡が入った。今まで受けたことのないクレーム内容だったので、上長に「どうすればいいですか」と確認をした。"}, {"title": "⑦コミュニケーションスキル・手法", "blocks": [{"t": "p", "x": "レギュラーメンバー（対人支援を中心とした業務を行うメンバー）へのマネジメントにおいては、コミュニケーションを重視するマイルドマネジメントを用います。"}, {"t": "p", "x": "コミュニケーションはスキルです。以下の６つのスキルを磨くことで部下との信頼関係を構築していきましょう。"}, {"t": "h2", "x": "⑦-1）聴く力"}, {"t": "p", "x": "・聞く ：耳で聞く。部下が伝えたことを「言葉そのままに理解する」だけの聞き方"}, {"t": "p", "x": "・聴く ：心で聞く。部下が伝えたことの「内容の意図・感情まで受け止める」聴き方"}, {"t": "p", "x": "部下は上司が熱心に聴いてくれていることで、言いたいことを本音で話すことができるようになります。ただし、態度で表現しないと上司が聴いてくれているかどうか、部下には伝わりません。"}, {"t": "p", "x": "「積極的な聴き方（アクティブリスニング）」を実践し、全力で聴いていることを態度で表現し、本音を話せる環境を作りましょう。"}, {"t": "img", "src": "images/image10.png", "w": 452, "h": 205}, {"t": "img", "src": "images/image2.png", "w": 87, "h": 32}, {"t": "h2", "x": "⑦-2）褒める力"}, {"t": "p", "x": "褒める目的は、「メンバーの良い行動を習慣化すること」です。"}, {"t": "p", "x": "何を褒めるかによって、部下への期待を示すことにもなります。大切にしている行動や価値観を共有し、浸透させていきましょう。"}, {"t": "img", "src": "images/image7.png", "w": 452, "h": 219}, {"t": "p", "x": "■褒め方のポイント１■"}, {"t": "p", "x": "その場その場で褒める"}, {"t": "p", "x": "部下の良い行動に気づいたら、その場ですぐに伝えることが重要です。その場ですぐに褒めることができれば、褒められるに至った背景や理由を理解しやすいからです。"}, {"t": "p", "x": "後から思い出して褒める、場合は記憶があいまいになってしまうと、褒める目的である「行動」につながりづらくなってしまいます。"}, {"t": "img", "src": "images/image2.png", "w": 87, "h": 32}, {"t": "p", "x": "■褒め方のポイント２■"}, {"t": "p", "x": "人前で褒める"}, {"t": "p", "x": "人間は多くの人に「認められたい」という欲求をもっているものです。朝礼やミーティングの場で、自然にメンバーの行動を褒める場を作ることにより、本人の欲求を満たし期待を示すと共に、チーム内で好事例を共有することにもつながります。"}, {"t": "p", "x": "■褒め方のポイント３■"}, {"t": "p", "x": "小さなことでも褒める"}, {"t": "p", "x": "大きな事ばかり褒めようとすると、必然的に、褒める言葉をかける機会が少なくなってしまいます。良い行動を習慣化し、より積極的になってもらうとともに、大切にしている行動や価値観を共有し、浸透させていくためには、小さな改善、小さな美点を発見し、褒めましょう。"}, {"t": "p", "x": "その際、上長が部下に対し、「これくらいできて当然」と思うのでなく、小さな進歩を発見してあげようという視点が大切です。「以前よりわずかでも進歩したな」「今までにはなかった良い行動だな」という気持ちで、部下の進歩、美点を探しましょう。部下にとっては、小さな自信の積み重ねが、大きな自信につながります。"}, {"t": "img", "src": "images/image2.png", "w": 87, "h": 32}, {"t": "p", "x": "■褒め方のポイント４■"}, {"t": "p", "x": "プロセスを褒める"}, {"t": "p", "x": "結果が出ないよりは、結果が出た方がもちろん良いのですが、目標設定したことをできた、できなかった、という結果が出た後、いずれにしても次の成功につなげていくことが必要です。"}, {"t": "p", "x": "できた（結果が出た）、というときはもちろん褒めるのですが、できなかった（結果が出なかった）時こそ、部下が次回のチャンスで成功できるよう、今回の仕事の過程での行動・努力の良いところを発見し、褒めることが重要です。"}, {"t": "p", "x": "「プロセスでの行動や努力の面で進歩していた」と褒められることで成長を認められたと感じることができれば、「次こそは結果を出そう」と前向きな姿勢で仕事に向き合うことができるものです。"}, {"t": "img", "src": "images/image2.png", "w": 87, "h": 32}, {"t": "p", "x": "■褒め方のポイント５■"}, {"t": "p", "x": "Ｉメッセージで褒める"}, {"t": "p", "x": "Ｉメッセージとは、「私(Ｉ)は、あなたのことを〇〇だと思う」と、相手の言動に対して「私(Ｉ)はどう感じている」という感想を伝える言い方です。"}, {"t": "p", "x": "「私」を主語にすることで、部下が「自身が他者に良い影響を及ぼしている」と感じられるという意味で、本人の欲求を満たせるメッセージです。また、「相手(上長)の感じたこと」というメッセージなので、否定のしようがなく、相手がそのまま受け入れやすいというメリットがあります。"}, {"t": "p", "x": "一方、ＹＯＵメッセージは、「あなた（ＹＯＵ）は〇〇だ」と相手に伝えることで、相手に判断を下すような言い方になるので、メッセージの受け手がその評価と違う考えを持っている場合には、相手がそのメッセージを受け入れにくい、というデメリットがあります。"}, {"t": "p", "x": "■褒め方のポイント６■"}, {"t": "p", "x": "事実を褒める"}, {"t": "p", "x": "褒める時には、なるべく「事実」をもとにして褒めるようにしましょう。褒め言葉が抽象的で事実の裏付けが薄いと、褒められた側は「なぜ褒められているのか」という根拠がわからず、「ご機嫌をとっているだけ」（お世辞）のような印象を与えてしまいます。"}, {"t": "p", "x": "ですので、「事実」を褒めるために、普段から部下を見守り、褒めるに値する「事実」を見逃さないようにしましょう。悪いところはすぐに目につきますが、小さな良いところ、小さな部下の努力は、上長が気づこうと意識しなければ、なかなか気づくことができないものです。"}, {"t": "img", "src": "images/image2.png", "w": 87, "h": 32}, {"t": "h2", "x": "⑦-3）指摘する力"}, {"t": "p", "x": "指摘する目的も、褒める目的と同じく「メンバーの良い行動を習慣化すること」です。褒めるのと異なる点は、改めてほしい行動を指摘するという否定的な側面があることです。"}, {"t": "p", "x": "ここで注意したいのは「指摘する」ことと「怒る」ことは大きく違うことです。メンバーとの信頼関係を損なうことやメンバーを傷つけてしまうことを恐れて黙認することはせず、改めてほしい行動を見逃さず「指摘する」スキルを身に着けましょう。"}, {"t": "p", "x": "■指摘のポイント１■"}, {"t": "p", "x": "その場その場で指摘する"}, {"t": "p", "x": "改めてほしい行動に気づいた時は、その場ですぐに伝えることが重要です。なぜなら、その場ですぐに指摘することで、指摘されるに至った背景・原因を理解しやすいからです。「褒める」と同様、後から思い出して指摘すると記憶があいまいになってしまい、指摘する目的である「行動」につながりづらくなってしまいます。"}, {"t": "p", "x": "■指摘のポイント２■"}, {"t": "p", "x": "一対一で指摘する"}, {"t": "p", "x": "対象のメンバー以外がいる前で指摘すると「みんなに見られていて恥ずかしい」という気持ちが強くなり、その指摘を冷静に受け止めることができず、自省や次の行動につなげられない可能性が高くなります。指摘する対象のメンバーが素直に話を聞けるような環境づくりをした上で指摘することが大切です。"}, {"t": "img", "src": "images/image2.png", "w": 87, "h": 32}, {"t": "p", "x": "■指摘のポイント３■"}, {"t": "p", "x": "相手の言い分を聴いてから指摘する"}, {"t": "p", "x": "相手の言い分を聴かずに一方的に指摘をすると、たとえ理屈が正しくても反発されてしまうことがあります。"}, {"t": "p", "x": "相手の言い分を聴くことで、改めてほしい行動に至った背景などの事実を知ることができ、指摘するべき点が何なのか、整理した上で指摘をすることができます。事実を確認した上で、一方的に判断するような指摘をしないことが大切です。"}, {"t": "img", "src": "images/image2.png", "w": 87, "h": 32}, {"t": "p", "x": "■指摘のポイント４■"}, {"t": "p", "x": "理由を明確にして指摘する"}, {"t": "p", "x": "間違った行動を「間違っている」と部下に認識してもらうためには、「なぜ、指摘しているのか」という理由を明確にする必要があります。なぜなら、上長が、指摘内容を上長にとっての「当たり前」だと思い理由を説明しないで指摘した場合、部下にとっての「当たり前」ではなかった場合に、なぜ指摘されているかが伝わらず、自省・改めてほしい行動の改善につながらなくなってしまうためです。"}, {"t": "p", "x": "ですので、部下にとってのマイナス点や周囲に及ぼす影響など、指摘の理由を明確にして伝えましょう。"}, {"t": "p", "x": "■指摘のポイント５■"}, {"t": "p", "x": "一つのことだけ指摘する"}, {"t": "p", "x": "一度に複数のことを指摘すると、部下や頭や心の整理ができなくなってしまうことがあります。「あれもこれも」と続けて指摘することはせず、１つのことを都度指摘するようにしましょう。"}, {"t": "img", "src": "images/image2.png", "w": 87, "h": 32}, {"t": "p", "x": "■指摘のポイント６■"}, {"t": "p", "x": "小さなことでも指摘する"}, {"t": "p", "x": "小さなことを指摘することで、部下との関係が悪くなる、嫌われるなどと思ってしまいがちですが、上長の役割として部下に成長してもらうために「指摘する」ことを優先しましょう。"}, {"t": "p", "x": "明らかな失敗や、予期せぬことから起きた事態については、たとえそれが大きなことであっても指摘しないようにしましょう。逆に、良くないことだとわかっていてやっていたり、職務の怠慢によるものだった場合は、小さなことであっても厳しい態度で臨み、見逃さず指摘しましょう。"}, {"t": "p", "x": "■指摘のポイント７■"}, {"t": "p", "x": "言動を指摘する(人格を否定しない)"}, {"t": "p", "x": "行動や言動(何を発言したのか、何をしたか)に焦点を当てて指摘しましょう。人格を否定すると、精神的にショックを受けてしまうことがあり、指摘を受け入れられなくなってしまうことがあります。「本来は〇〇ができるメンバーだと思う」等、人格や能力面で認めていることを話しておくと、指摘が受け入れられやすくなります。"}, {"t": "img", "src": "images/image2.png", "w": 87, "h": 32}, {"t": "p", "x": "■指摘のポイント８■"}, {"t": "p", "x": "激励し、指摘した後を見届ける"}, {"t": "p", "x": "指摘する中で、しっかり今後への期待をセットで伝えると、前向きに今後へつながる行動に取り組めます。"}, {"t": "p", "x": "指摘された側には、少なからず悔しさや後味の悪さは残るものなので、指摘した後のフォローが非常に大切です。指摘した内容が改善されているかどうか、後日確認することも大切です。"}, {"t": "img", "src": "images/image2.png", "w": 87, "h": 32}, {"t": "h2", "x": "⑦-4）質問する力"}, {"t": "p", "x": "人間は本来、自分が外的な力によって操られる存在ではなく、「自分の行動は自分で決定したい」という欲求（＝自己決定感）を持っています。 良い問いかけ（質問）は「考えること」を促し、部下が自ら答えを導き出すことで、実行力や行動力を高める効果があります。悪い問いかけ（質問）は「謝罪や言い訳」を促します。"}, {"t": "p", "x": "大前提として、組織において上長の発言は「指示」であり、部下が「納得」しなくても実行させるのがマネジメントの基本です。しかし、部下が「一方的に圧力をかけられて嫌々やらされている」と感じながら仕事をするよりも、「自分の心の底から納得してやっている」と感じている時の方が、仕事に対する意欲に大きな差が生まれるのも事実です。"}, {"t": "p", "x": "だからこそ、上長はただ数字や指示だけを押し付けるのではなく、社会的意義や目的といった「大義」を自分の言葉で語り、部下が納得して前向きに取り組めるよう導くことが望ましいと言えます。そして、その「大義」を理解させ、行動につなげるプロセスにおいて有効なのが「質問する力」です。"}, {"t": "p", "x": "ただし、ここで注意しなければならないのは、部下に質問して考えを引き出すことは、「部下のやりたいこと」や「部下が自ら決めた低い目標」に上長が合わせたり、従ったりするという意味ではないということです。 目標や果たすべき役割は、あくまで会社や上長が設定します。その「上長が設定した目標（会社が求める結果）」や「大義」に対して、「では、それを達成するために自分たちには何ができると思いますか？」「どうすれば実現できると思いますか？」と質問を投げかけることで、部下に「達成までの道のり」を自ら考えさせるのが、正しい質問の形です。"}, {"t": "p", "x": "質問する力を磨き、組織の目標に向かって部下が自ら考え、行動する力を養いましょう。"}, {"t": "img", "src": "images/image2.png", "w": 87, "h": 32}, {"t": "p", "x": "■質問のポイント１■"}, {"t": "p", "x": "拡大質問（オープン・クエスチョン）"}, {"t": "p", "x": "拡大質問（オープン・クエスチョン）とは、様々な答えが考えられる、自由度の高い質問のことです。反対に、限定質問とは、「YES/NO」で答えられる質問のことです。"}, {"t": "p", "x": "拡大質問（オープン・クエスチョン）は、自由度が高い分、部下の考える余地が大きくなります。ですので、じっくりと考えを深めることができ、自分の頭で考えた答えなので、本人にとっても「自分の心から納得してやっている」状態になります。"}, {"t": "p", "x": "拡大質問と限定質問の例"}, {"t": "p", "x": "１）拠点運営にはコミュニケーションが大事だと思わない？（限定質問）"}, {"t": "p", "x": "⇒ メンバーのコミュニケーションを円滑にするために、何をすればいいと思いますか？（拡大質問）"}, {"t": "p", "x": "２）見学対応時は、丁寧な対応が必要だと思わない？（限定質問）"}, {"t": "p", "x": "⇒ 来客時の印象をよくするには、どんなお出迎えがいいと思いますか？（拡大質問）"}, {"t": "img", "src": "images/image2.png", "w": 87, "h": 32}, {"t": "p", "x": "■質問のポイント２■"}, {"t": "p", "x": "肯定質問（ポジティブ・クエスチョン）"}, {"t": "p", "x": "肯定質問とは、物事の肯定的な側面に焦点を当てる質問です。質問の中に「できる」という肯定系の表現を含み、「前向き・自発的に考える」きっかけとなりやすくなる質問方法です。一方、否定質問は、物事の否定的な側面に焦点を当てる質問であり、質問の中に「ない」という否定形の言葉を含み、「後ろ向き・責められている」気持ちになりやすい質問方法です。"}, {"t": "p", "x": "ですので、部下への質問には、肯定質問（ポジティブ・クエスチョン）を極力使用しましょう。"}, {"t": "p", "x": "肯定・否定質問の例"}, {"t": "p", "x": "１）なぜパートナーに喜んで頂けていないと思いますか？（否定）"}, {"t": "p", "x": "⇒ どうしたらパートナーに喜んでいただけると思いますか？（肯定）"}, {"t": "p", "x": "２）なぜ期限通りにできなかったと思う？（否定）"}, {"t": "p", "x": "⇒ どうしたら期限通りに実行できると思いますか？（肯定）"}, {"t": "img", "src": "images/image2.png", "w": 87, "h": 32}, {"t": "p", "x": "■質問のポイント３■"}, {"t": "p", "x": "資源質問（リソース・クエスチョン）"}, {"t": "p", "x": "資源質問とは、過去の経験から解決策のヒントを探し出すことを助ける質問です。"}, {"t": "p", "x": "何か問題に行き詰った時、本を読むなど、新たな情報を集めてヒントを探そうとするものですが、自身の過去の「成功体験」の中に解決策を発見できる時があります。その「成功体験」にヒントがあることに、部下一人では気づくことが難しい場合、上長の資源質問（リソース・クエスチョン）によって、過去の資源を引き出せるようにしましょう。"}, {"t": "p", "x": "資源質問の例"}, {"t": "p", "x": "１）前回の対応ではスムーズにできていたけど、その時はどのように対応していましたか？"}, {"t": "img", "src": "images/image2.png", "w": 87, "h": 32}, {"t": "p", "x": "■質問のポイント４■"}, {"t": "p", "x": "掘り下げ質問"}, {"t": "p", "x": "部下の考えを、より具体的にするための質問手法です。"}, {"t": "p", "x": "掘り下げ質問の例"}, {"t": "p", "x": "１）具体性を高めたい場合：どうすれば○○できると思いますか？"}, {"t": "p", "x": "２）効果性を高めたい場合：どれくらい○○すれば、目標を達成できると思いますか？"}, {"t": "p", "x": "３）実効性を高めたい場合：いつ／いつまでに○○しようと思いますか？"}, {"t": "p", "x": "■質問のポイント５■"}, {"t": "p", "x": "方向転換質問"}, {"t": "p", "x": "部下に、今までにない視点で考えてほしいときに使う質問手法です。"}, {"t": "p", "x": "方向転換質問の例"}, {"t": "p", "x": "１）会社の目線で考えた場合、○○についてどう思いますか？"}, {"t": "p", "x": "２）部下の目線で考えた場合、○○についてどう思いますか？"}, {"t": "p", "x": "３）お客様の目線で考えた場合、○○についてどう思いますか？"}, {"t": "img", "src": "images/image2.png", "w": 87, "h": 32}, {"t": "h2", "x": "⑦-5）伝える力"}, {"t": "p", "x": "伝える力とは、伝えた結果、伝えたいことが相手に「伝わっている状態を作り出す力」のことです。伝える力が低い人は、「伝える」ことを目的に自分の言葉で一方的に伝える特徴があります。相手に「伝わる」ことを目的として、相手に合わせて理解しやすい言葉を用いながら伝えるようにしましょう。"}, {"t": "img", "src": "images/image12.png", "w": 452, "h": 202}, {"t": "img", "src": "images/image2.png", "w": 87, "h": 32}, {"t": "p", "x": "■伝えるポイント１■"}, {"t": "p", "x": "難しいことを簡単に、簡単なことも簡単に"}, {"t": "p", "x": "「伝わっている状態を作り出す」ためには、相手に合わせて理解しやすい、簡単な言葉を使いましょう。"}, {"t": "p", "x": "そのためには自分の理解度を高めることが重要です。説明したことが伝わりきっていない場合は、そもそも説明する人がその事柄を深く理解できていない、分かったつもりになっている場合が多いです。伝える前に、自分は正しく理解しているか再確認しましょう。"}, {"t": "p", "x": "また、簡単な言葉で伝えるための事前シミュレーション(説明する練習)をすることで、伝わりづらい部分が見つかります。「小学生にも伝わる」レベルを目指し、双方の理解度を高めましょう。"}, {"t": "p", "x": "簡単な言葉で伝えるためのシュミレーションで大事なポイント"}, {"t": "p", "x": "１）伝える際、自分自身に不明な点がないか？"}, {"t": "p", "x": "２）伝える相手がわからない言葉がないか？"}, {"t": "p", "x": "３）伝える相手からどんな質問が来るか、それにこたえられるか？"}, {"t": "img", "src": "images/image2.png", "w": 87, "h": 32}, {"t": "p", "x": "■伝えるポイント２■"}, {"t": "p", "x": "結論から伝える、ナンバリングする"}, {"t": "p", "x": "伝えるときは、先に結論を伝えることで、相手は「この話をするんだな」と話を聞く準備をすることができます。ナンバリングは、「この話のポイントは〇点あります」などと、要点を簡潔に絞ることで、相手の理解を助ける効果があります。"}, {"t": "p", "x": "結論から伝える、ナンバリングする伝え方の例"}, {"t": "p", "x": "１）この拠点は下記3点により、社会的な大きな意義があります。（結論）"}, {"t": "p", "x": "1点目が○○です。"}, {"t": "p", "x": "2点目が○○です。"}, {"t": "p", "x": "3点目が○○です。"}, {"t": "img", "src": "images/image2.png", "w": 87, "h": 32}, {"t": "p", "x": "■伝えるポイント３■"}, {"t": "p", "x": "PNP法"}, {"t": "p", "x": "PNP法とは、肯定（Positive）→否定（Negative）→約束（Promise）の順に伝える方法です。まずは良いところを伝えることで、相手は安心して話を聞きやすくなり、改善点も受け入れやすくなります。"}, {"t": "p", "x": "改善点を伝える際には、「⑦‐3) 指摘する力」を参照しながら、人格を否定することのないよう、感情を出さない伝え方をしましょう"}, {"t": "img", "src": "images/image8.png", "w": 452, "h": 227}, {"t": "p", "x": "部下との会話例（クレームの要因を理解し、次から改善してほしい時）"}, {"t": "p", "x": "１）１）Positive"}, {"t": "p", "x": "「○○様から頂いたご指摘の件で少し時間をもらえますか？いつも多くの指摘をくださるパートナーで、○○さんが普段、きちんと対応してくれていることは知っています。いつもありがとうございます。」"}, {"t": "p", "x": "２）Negative"}, {"t": "p", "x": "「今回○○様から頂いたのは先方からの送迎時間変更の依頼に対して、こちらからの返信が遅くなってしまったことですね。拠点内の状況確認に時間が掛かってしかったかとは思うのですが、先方に一報入れることはできましたよね。〇〇様も連絡があれば安心できたと思います。次からはどうしていったらいいと思いますか？」"}, {"t": "p", "x": "３）Promise"}, {"t": "p", "x": "「対応が遅くなってしまうときは事前にいつ頃になりそうか納期の目安を先方に伝えるようにしていきましょう。」"}, {"t": "img", "src": "images/image2.png", "w": 87, "h": 32}, {"t": "h2", "x": "⑦-6）報告を受ける力"}, {"t": "p", "x": "部下の考えを引き出すために、「報告を受ける」スキルを磨きましょう。「結論」から報告を受けること、報告の「ポイント」を決めることが重要です。"}, {"t": "p", "x": "■報告を受けるポイント１■"}, {"t": "p", "x": "根気強く最後まで聴く"}, {"t": "p", "x": "部下が上司に大切なことを報告する時の気持ちは「何とかしなくては」という状況が多いものです。報告を受ける中で、仮にその気持ちがある場合、多少の整理がついていない状況でも、最後まで根気強く聴いてあげることが大切です。"}, {"t": "p", "x": "■報告を受けるポイント２■"}, {"t": "p", "x": "主観と事実を分ける"}, {"t": "p", "x": "部下が整理がついていない状態で報告している場合、部下が「思っていること」と客観的な「事実」が混ざっていることが多いものです。「数値」で表現できる内容は、「ほとんど」「大体」といった表現ではなくて正確に把握するようにしましょう。"}], "subsections": ["⑦-1）聴く力", "⑦-2）褒める力", "⑦-3）指摘する力", "⑦-4）質問する力", "⑦-5）伝える力", "⑦-6）報告を受ける力"], "text": "レギュラーメンバー（対人支援を中心とした業務を行うメンバー）へのマネジメントにおいては、コミュニケーションを重視するマイルドマネジメントを用います。 コミュニケーションはスキルです。以下の６つのスキルを磨くことで部下との信頼関係を構築していきましょう。 ⑦-1）聴く力 ・聞く ：耳で聞く。部下が伝えたことを「言葉そのままに理解する」だけの聞き方 ・聴く ：心で聞く。部下が伝えたことの「内容の意図・感情まで受け止める」聴き方 部下は上司が熱心に聴いてくれていることで、言いたいことを本音で話すことができるようになります。ただし、態度で表現しないと上司が聴いてくれているかどうか、部下には伝わりません。 「積極的な聴き方（アクティブリスニング）」を実践し、全力で聴いていることを態度で表現し、本音を話せる環境を作りましょう。 ⑦-2）褒める力 褒める目的は、「メンバーの良い行動を習慣化すること」です。 何を褒めるかによって、部下への期待を示すことにもなります。大切にしている行動や価値観を共有し、浸透させていきましょう。 ■褒め方のポイント１■ その場その場で褒める 部下の良い行動に気づいたら、その場ですぐに伝えることが重要です。その場ですぐに褒めることができれば、褒められるに至った背景や理由を理解しやすいからです。 後から思い出して褒める、場合は記憶があいまいになってしまうと、褒める目的である「行動」につながりづらくなってしまいます。 ■褒め方のポイント２■ 人前で褒める 人間は多くの人に「認められたい」という欲求をもっているものです。朝礼やミーティングの場で、自然にメンバーの行動を褒める場を作ることにより、本人の欲求を満たし期待を示すと共に、チーム内で好事例を共有することにもつながります。 ■褒め方のポイント３■ 小さなことでも褒める 大きな事ばかり褒めようとすると、必然的に、褒める言葉をかける機会が少なくなってしまいます。良い行動を習慣化し、より積極的になってもらうとともに、大切にしている行動や価値観を共有し、浸透させていくためには、小さな改善、小さな美点を発見し、褒めましょう。 その際、上長が部下に対し、「これくらいできて当然」と思うのでなく、小さな進歩を発見してあげようという視点が大切です。「以前よりわずかでも進歩したな」「今までにはなかった良い行動だな」という気持ちで、部下の進歩、美点を探しましょう。部下にとっては、小さな自信の積み重ねが、大きな自信につながります。 ■褒め方のポイント４■ プロセスを褒める 結果が出ないよりは、結果が出た方がもちろん良いのですが、目標設定したことをできた、できなかった、という結果が出た後、いずれにしても次の成功につなげていくことが必要です。 できた（結果が出た）、というときはもちろん褒めるのですが、できなかった（結果が出なかった）時こそ、部下が次回のチャンスで成功できるよう、今回の仕事の過程での行動・努力の良いところを発見し、褒めることが重要です。 「プロセスでの行動や努力の面で進歩していた」と褒められることで成長を認められたと感じることができれば、「次こそは結果を出そう」と前向きな姿勢で仕事に向き合うことができるものです。 ■褒め方のポイント５■ Ｉメッセージで褒める Ｉメッセージとは、「私(Ｉ)は、あなたのことを〇〇だと思う」と、相手の言動に対して「私(Ｉ)はどう感じている」という感想を伝える言い方です。 「私」を主語にすることで、部下が「自身が他者に良い影響を及ぼしている」と感じられるという意味で、本人の欲求を満たせるメッセージです。また、「相手(上長)の感じたこと」というメッセージなので、否定のしようがなく、相手がそのまま受け入れやすいというメリットがあります。 一方、ＹＯＵメッセージは、「あなた（ＹＯＵ）は〇〇だ」と相手に伝えることで、相手に判断を下すような言い方になるので、メッセージの受け手がその評価と違う考えを持っている場合には、相手がそのメッセージを受け入れにくい、というデメリットがあります。 ■褒め方のポイント６■ 事実を褒める 褒める時には、なるべく「事実」をもとにして褒めるようにしましょう。褒め言葉が抽象的で事実の裏付けが薄いと、褒められた側は「なぜ褒められているのか」という根拠がわからず、「ご機嫌をとっているだけ」（お世辞）のような印象を与えてしまいます。 ですので、「事実」を褒めるために、普段から部下を見守り、褒めるに値する「事実」を見逃さないようにしましょう。悪いところはすぐに目につきますが、小さな良いところ、小さな部下の努力は、上長が気づこうと意識しなければ、なかなか気づくことができないものです。 ⑦-3）指摘する力 指摘する目的も、褒める目的と同じく「メンバーの良い行動を習慣化すること」です。褒めるのと異なる点は、改めてほしい行動を指摘するという否定的な側面があることです。 ここで注意したいのは「指摘する」ことと「怒る」ことは大きく違うことです。メンバーとの信頼関係を損なうことやメンバーを傷つけてしまうことを恐れて黙認することはせず、改めてほしい行動を見逃さず「指摘する」スキルを身に着けましょう。 ■指摘のポイント１■ その場その場で指摘する 改めてほしい行動に気づいた時は、その場ですぐに伝えることが重要です。なぜなら、その場ですぐに指摘することで、指摘されるに至った背景・原因を理解しやすいからです。「褒める」と同様、後から思い出して指摘すると記憶があいまいになってしまい、指摘する目的である「行動」につながりづらくなってしまいます。 ■指摘のポイント２■ 一対一で指摘する 対象のメンバー以外がいる前で指摘すると「みんなに見られていて恥ずかしい」という気持ちが強くなり、その指摘を冷静に受け止めることができず、自省や次の行動につなげられない可能性が高くなります。指摘する対象のメンバーが素直に話を聞けるような環境づくりをした上で指摘することが大切です。 ■指摘のポイント３■ 相手の言い分を聴いてから指摘する 相手の言い分を聴かずに一方的に指摘をすると、たとえ理屈が正しくても反発されてしまうことがあります。 相手の言い分を聴くことで、改めてほしい行動に至った背景などの事実を知ることができ、指摘するべき点が何なのか、整理した上で指摘をすることができます。事実を確認した上で、一方的に判断するような指摘をしないことが大切です。 ■指摘のポイント４■ 理由を明確にして指摘する 間違った行動を「間違っている」と部下に認識してもらうためには、「なぜ、指摘しているのか」という理由を明確にする必要があります。なぜなら、上長が、指摘内容を上長にとっての「当たり前」だと思い理由を説明しないで指摘した場合、部下にとっての「当たり前」ではなかった場合に、なぜ指摘されているかが伝わらず、自省・改めてほしい行動の改善につながらなくなってしまうためです。 ですので、部下にとってのマイナス点や周囲に及ぼす影響など、指摘の理由を明確にして伝えましょう。 ■指摘のポイント５■ 一つのことだけ指摘する 一度に複数のことを指摘すると、部下や頭や心の整理ができなくなってしまうことがあります。「あれもこれも」と続けて指摘することはせず、１つのことを都度指摘するようにしましょう。 ■指摘のポイント６■ 小さなことでも指摘する 小さなことを指摘することで、部下との関係が悪くなる、嫌われるなどと思ってしまいがちですが、上長の役割として部下に成長してもらうために「指摘する」ことを優先しましょう。 明らかな失敗や、予期せぬことから起きた事態については、たとえそれが大きなことであっても指摘しないようにしましょう。逆に、良くないことだとわかっていてやっていたり、職務の怠慢によるものだった場合は、小さなことであっても厳しい態度で臨み、見逃さず指摘しましょう。 ■指摘のポイント７■ 言動を指摘する(人格を否定しない) 行動や言動(何を発言したのか、何をしたか)に焦点を当てて指摘しましょう。人格を否定すると、精神的にショックを受けてしまうことがあり、指摘を受け入れられなくなってしまうことがあります。「本来は〇〇ができるメンバーだと思う」等、人格や能力面で認めていることを話しておくと、指摘が受け入れられやすくなります。 ■指摘のポイント８■ 激励し、指摘した後を見届ける 指摘する中で、しっかり今後への期待をセットで伝えると、前向きに今後へつながる行動に取り組めます。 指摘された側には、少なからず悔しさや後味の悪さは残るものなので、指摘した後のフォローが非常に大切です。指摘した内容が改善されているかどうか、後日確認することも大切です。 ⑦-4）質問する力 人間は本来、自分が外的な力によって操られる存在ではなく、「自分の行動は自分で決定したい」という欲求（＝自己決定感）を持っています。 良い問いかけ（質問）は「考えること」を促し、部下が自ら答えを導き出すことで、実行力や行動力を高める効果があります。悪い問いかけ（質問）は「謝罪や言い訳」を促します。 大前提として、組織において上長の発言は「指示」であり、部下が「納得」しなくても実行させるのがマネジメントの基本です。しかし、部下が「一方的に圧力をかけられて嫌々やらされている」と感じながら仕事をするよりも、「自分の心の底から納得してやっている」と感じている時の方が、仕事に対する意欲に大きな差が生まれるのも事実です。 だからこそ、上長はただ数字や指示だけを押し付けるのではなく、社会的意義や目的といった「大義」を自分の言葉で語り、部下が納得して前向きに取り組めるよう導くことが望ましいと言えます。そして、その「大義」を理解させ、行動につなげるプロセスにおいて有効なのが「質問する力」です。 ただし、ここで注意しなければならないのは、部下に質問して考えを引き出すことは、「部下のやりたいこと」や「部下が自ら決めた低い目標」に上長が合わせたり、従ったりするという意味ではないということです。 目標や果たすべき役割は、あくまで会社や上長が設定します。その「上長が設定した目標（会社が求める結果）」や「大義」に対して、「では、それを達成するために自分たちには何ができると思いますか？」「どうすれば実現できると思いますか？」と質問を投げかけることで、部下に「達成までの道のり」を自ら考えさせるのが、正しい質問の形です。 質問する力を磨き、組織の目標に向かって部下が自ら考え、行動する力を養いましょう。 ■質問のポイント１■ 拡大質問（オープン・クエスチョン） 拡大質問（オープン・クエスチョン）とは、様々な答えが考えられる、自由度の高い質問のことです。反対に、限定質問とは、「YES/NO」で答えられる質問のことです。 拡大質問（オープン・クエスチョン）は、自由度が高い分、部下の考える余地が大きくなります。ですので、じっくりと考えを深めることができ、自分の頭で考えた答えなので、本人にとっても「自分の心から納得してやっている」状態になります。 拡大質問と限定質問の例 １）拠点運営にはコミュニケーションが大事だと思わない？（限定質問） ⇒ メンバーのコミュニケーションを円滑にするために、何をすればいいと思いますか？（拡大質問） ２）見学対応時は、丁寧な対応が必要だと思わない？（限定質問） ⇒ 来客時の印象をよくするには、どんなお出迎えがいいと思いますか？（拡大質問） ■質問のポイント２■ 肯定質問（ポジティブ・クエスチョン） 肯定質問とは、物事の肯定的な側面に焦点を当てる質問です。質問の中に「できる」という肯定系の表現を含み、「前向き・自発的に考える」きっかけとなりやすくなる質問方法です。一方、否定質問は、物事の否定的な側面に焦点を当てる質問であり、質問の中に「ない」という否定形の言葉を含み、「後ろ向き・責められている」気持ちになりやすい質問方法です。 ですので、部下への質問には、肯定質問（ポジティブ・クエスチョン）を極力使用しましょう。 肯定・否定質問の例 １）なぜパートナーに喜んで頂けていないと思いますか？（否定） ⇒ どうしたらパートナーに喜んでいただけると思いますか？（肯定） ２）なぜ期限通りにできなかったと思う？（否定） ⇒ どうしたら期限通りに実行できると思いますか？（肯定） ■質問のポイント３■ 資源質問（リソース・クエスチョン） 資源質問とは、過去の経験から解決策のヒントを探し出すことを助ける質問です。 何か問題に行き詰った時、本を読むなど、新たな情報を集めてヒントを探そうとするものですが、自身の過去の「成功体験」の中に解決策を発見できる時があります。その「成功体験」にヒントがあることに、部下一人では気づくことが難しい場合、上長の資源質問（リソース・クエスチョン）によって、過去の資源を引き出せるようにしましょう。 資源質問の例 １）前回の対応ではスムーズにできていたけど、その時はどのように対応していましたか？ ■質問のポイント４■ 掘り下げ質問 部下の考えを、より具体的にするための質問手法です。 掘り下げ質問の例 １）具体性を高めたい場合：どうすれば○○できると思いますか？ ２）効果性を高めたい場合：どれくらい○○すれば、目標を達成できると思いますか？ ３）実効性を高めたい場合：いつ／いつまでに○○しようと思いますか？ ■質問のポイント５■ 方向転換質問 部下に、今までにない視点で考えてほしいときに使う質問手法です。 方向転換質問の例 １）会社の目線で考えた場合、○○についてどう思いますか？ ２）部下の目線で考えた場合、○○についてどう思いますか？ ３）お客様の目線で考えた場合、○○についてどう思いますか？ ⑦-5）伝える力 伝える力とは、伝えた結果、伝えたいことが相手に「伝わっている状態を作り出す力」のことです。伝える力が低い人は、「伝える」ことを目的に自分の言葉で一方的に伝える特徴があります。相手に「伝わる」ことを目的として、相手に合わせて理解しやすい言葉を用いながら伝えるようにしましょう。 ■伝えるポイント１■ 難しいことを簡単に、簡単なことも簡単に 「伝わっている状態を作り出す」ためには、相手に合わせて理解しやすい、簡単な言葉を使いましょう。 そのためには自分の理解度を高めることが重要です。説明したことが伝わりきっていない場合は、そもそも説明する人がその事柄を深く理解できていない、分かったつもりになっている場合が多いです。伝える前に、自分は正しく理解しているか再確認しましょう。 また、簡単な言葉で伝えるための事前シミュレーション(説明する練習)をすることで、伝わりづらい部分が見つかります。「小学生にも伝わる」レベルを目指し、双方の理解度を高めましょう。 簡単な言葉で伝えるためのシュミレーションで大事なポイント １）伝える際、自分自身に不明な点がないか？ ２）伝える相手がわからない言葉がないか？ ３）伝える相手からどんな質問が来るか、それにこたえられるか？ ■伝えるポイント２■ 結論から伝える、ナンバリングする 伝えるときは、先に結論を伝えることで、相手は「この話をするんだな」と話を聞く準備をすることができます。ナンバリングは、「この話のポイントは〇点あります」などと、要点を簡潔に絞ることで、相手の理解を助ける効果があります。 結論から伝える、ナンバリングする伝え方の例 １）この拠点は下記3点により、社会的な大きな意義があります。（結論） 1点目が○○です。 2点目が○○です。 3点目が○○です。 ■伝えるポイント３■ PNP法 PNP法とは、肯定（Positive）→否定（Negative）→約束（Promise）の順に伝える方法です。まずは良いところを伝えることで、相手は安心して話を聞きやすくなり、改善点も受け入れやすくなります。 改善点を伝える際には、「⑦‐3) 指摘する力」を参照しながら、人格を否定することのないよう、感情を出さない伝え方をしましょう 部下との会話例（クレームの要因を理解し、次から改善してほしい時） １）１）Positive 「○○様から頂いたご指摘の件で少し時間をもらえますか？いつも多くの指摘をくださるパートナーで、○○さんが普段、きちんと対応してくれていることは知っています。いつもありがとうございます。」 ２）Negative 「今回○○様から頂いたのは先方からの送迎時間変更の依頼に対して、こちらからの返信が遅くなってしまったことですね。拠点内の状況確認に時間が掛かってしかったかとは思うのですが、先方に一報入れることはできましたよね。〇〇様も連絡があれば安心できたと思います。次からはどうしていったらいいと思いますか？」 ３）Promise 「対応が遅くなってしまうときは事前にいつ頃になりそうか納期の目安を先方に伝えるようにしていきましょう。」 ⑦-6）報告を受ける力 部下の考えを引き出すために、「報告を受ける」スキルを磨きましょう。「結論」から報告を受けること、報告の「ポイント」を決めることが重要です。 ■報告を受けるポイント１■ 根気強く最後まで聴く 部下が上司に大切なことを報告する時の気持ちは「何とかしなくては」という状況が多いものです。報告を受ける中で、仮にその気持ちがある場合、多少の整理がついていない状況でも、最後まで根気強く聴いてあげることが大切です。 ■報告を受けるポイント２■ 主観と事実を分ける 部下が整理がついていない状態で報告している場合、部下が「思っていること」と客観的な「事実」が混ざっていることが多いものです。「数値」で表現できる内容は、「ほとんど」「大体」といった表現ではなくて正確に把握するようにしましょう。"}];

// ========== Build Glossary Dictionary from last section (blocks) ==========
var GLOSSARY_TERMS = (function() {
  var glossarySection = POLICY_DATA[POLICY_DATA.length - 1];
  if (!glossarySection || !glossarySection.blocks) return {};
  var terms = {};
  var currentTerm = null;
  var currentCategory = '';
  var currentDefParts = [];
  var termPattern = /^(\d+)[\.\uff0e]\s*(.+)/;

  function saveCurrent() {
    if (currentTerm) {
      var def = currentDefParts.join(' ').replace(/\u000b/g, ' ').trim();
      if (def.length > 220) def = def.substring(0, 220) + '...';
      terms[currentTerm] = { definition: def, category: currentCategory };
    }
  }

  glossarySection.blocks.forEach(function(b) {
    var t = b.t;
    var x = (b.x || '').replace(/\u000b/g, ' ').trim();
    if (!x) return;

    if (t === 'h2' || t === 'h3') {
      // Category boundary (Ⅰ., Ⅱ., etc.)
      saveCurrent();
      currentTerm = null;
      currentDefParts = [];
      currentCategory = x.replace(/^[\u2160-\u216F][\.\uff0e]\s*/, '');
      return;
    }

    var m = termPattern.exec(x);
    if (m) {
      // New term entry like "1．成長"
      saveCurrent();
      currentTerm = m[2];
      currentDefParts = [];
      return;
    }

    // Definition line (only collect a few)
    if (currentTerm && currentDefParts.length < 4) {
      currentDefParts.push(x);
    }
  });
  saveCurrent();
  return terms;
})();

var GLOSSARY_TERM_NAMES = Object.keys(GLOSSARY_TERMS).sort(function(a, b) {
  return b.length - a.length;
});
var GLOSSARY_SECTION_IDX = -1; GLOSSARY_TERM_NAMES = [];

</script>

<script>
(function() {
  'use strict';

  // ========== DOM Elements ==========
  var $ = function(id) { return document.getElementById(id); };
  var navList = $('navList');
  var searchInput = $('searchInput');
  var searchResultsCount = $('searchResultsCount');
  var mainContent = $('mainContent');
  var welcome = $('welcome');
  var contentCard = $('contentCard');
  var contentSectionNum = $('contentSectionNum');
  var contentTitle = $('contentTitle');
  var contentSubNav = $('contentSubNav');
  var contentBody = $('contentBody');
  var allSectionsContainer = $('allSectionsContainer');
  var searchResultsPanel = $('searchResultsPanel');
  var searchResultsSummary = $('searchResultsSummary');
  var searchResultsList = $('searchResultsList');
  var scrollTopBtn = $('scrollTop');
  var menuToggle = $('menuToggle');
  var sidebar = $('sidebar');
  var sidebarOverlay = $('sidebarOverlay');
  var searchShortcut = $('searchShortcut');
  var mobileSidebarFab = $('mobileSidebarFab');

  var activeSection = null;
  var searchTimeout = null;

  // ========== Initialize ==========
  function init() {
    if (typeof POLICY_DATA === 'undefined') {
      welcome.querySelector('p').textContent = 'policy-data.js が読み込めませんでした。';
      return;
    }

    // Set last updated
    if (typeof POLICY_LAST_UPDATED !== 'undefined') {
      $('lastUpdated').textContent = POLICY_LAST_UPDATED;
    }

    // Set doc link
    if (typeof POLICY_DOC_URL !== 'undefined') {
      $('docLink').href = POLICY_DOC_URL;
    }

    // Build navigation
    buildNav();

    // Render all sections continuously
    renderAllSections();

    // Events
    searchInput.addEventListener('input', onSearchInput);
    scrollTopBtn.addEventListener('click', function() {
      mainContent.scrollTo({ top: 0, behavior: 'smooth' });
    });
    mainContent.addEventListener('scroll', onMainScroll);
    menuToggle.addEventListener('click', toggleSidebar);
    sidebarOverlay.addEventListener('click', function() {
      closeSidebar();
      closeMobileSidebarOverlay();
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', onKeyDown);

    // Mac detection for shortcut display
    if (navigator.platform && navigator.platform.indexOf('Mac') > -1) {
      searchShortcut.textContent = '\u2318K';
    }

    // (mobile-back-btn removed)

    // Mobile sidebar FAB
    if (mobileSidebarFab) {
      mobileSidebarFab.addEventListener('click', openMobileSidebarOverlay);
    }

    // Logo click → go home (mobile: back to sidebar, desktop: scroll to top)
    var logoImg = document.querySelector('.header-logo-img');
    if (logoImg) {
      logoImg.style.cursor = 'pointer';
      logoImg.addEventListener('click', function() {
        if (window.innerWidth <= 900) {
          mobileGoBack();
        } else {
          mainContent.scrollTo({ top: 0, behavior: 'smooth' });
        }
      });
    }

    // Check URL hash for direct section link
    handleHash();
    window.addEventListener('hashchange', handleHash);

    // Glossary tooltip click handler
    document.addEventListener('click', function(e) {
      var termEl = e.target.closest('.glossary-term');
      if (termEl) {
        e.preventDefault();
        e.stopPropagation();
        showGlossaryPopup(termEl);
        return;
      }
      // Close popup on outside click
      var popup = document.querySelector('.glossary-popup');
      var overlay = document.querySelector('.glossary-popup-overlay');
      if (overlay && !e.target.closest('.glossary-popup')) {
        closeGlossaryPopup();
      }
    });
  }

  // ========== Glossary Popup ==========
  function showGlossaryPopup(termEl) {
    closeGlossaryPopup();
    var termName = termEl.getAttribute('data-term');
    var termData = GLOSSARY_TERMS[termName];
    if (!termData) return;

    // Create overlay
    var overlay = document.createElement('div');
    overlay.className = 'glossary-popup-overlay';

    // Create popup
    var popup = document.createElement('div');
    popup.className = 'glossary-popup';

    popup.innerHTML =
      '<div class="glossary-popup-header">' +
        '<span class="glossary-popup-title">' + escapeHtml(termName) + '</span>' +
        '<button class="glossary-popup-close" aria-label="\u9589\u3058\u308b">&times;</button>' +
      '</div>' +
      (termData.category ? '<div style="padding:8px 14px 0"><span class="glossary-popup-category">' + escapeHtml(termData.category) + '</span></div>' : '') +
      '<div class="glossary-popup-body">' + escapeHtml(termData.definition) + '</div>' +
      '<div class="glossary-popup-footer"><a class="glossary-popup-link" data-action="goto-glossary">\u7528\u8a9e\u89e3\u8aac\u3067\u8a73\u3057\u304f\u898b\u308b \u2192</a></div>';

    document.body.appendChild(overlay);
    document.body.appendChild(popup);

    // Position popup near the term element
    var rect = termEl.getBoundingClientRect();
    var popupH = popup.offsetHeight;
    var popupW = popup.offsetWidth;
    var viewW = window.innerWidth;
    var viewH = window.innerHeight;

    var top = rect.bottom + 8;
    var left = rect.left;

    // Adjust if goes below viewport
    if (top + popupH > viewH - 16) {
      top = rect.top - popupH - 8;
    }
    // Adjust if goes off right
    if (left + popupW > viewW - 16) {
      left = viewW - popupW - 16;
    }
    // Adjust if goes off left
    if (left < 16) left = 16;

    // Mobile: center horizontally
    if (viewW <= 900) {
      left = (viewW - popupW) / 2;
      if (left < 16) left = 16;
    }

    popup.style.top = Math.max(8, top) + 'px';
    popup.style.left = left + 'px';

    // Close button
    popup.querySelector('.glossary-popup-close').addEventListener('click', function(e) {
      e.stopPropagation();
      closeGlossaryPopup();
    });

    // "Go to glossary" link
    popup.querySelector('.glossary-popup-link').addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      closeGlossaryPopup();
      showSection(GLOSSARY_SECTION_IDX);
    });
  }

  function closeGlossaryPopup() {
    var existing = document.querySelectorAll('.glossary-popup, .glossary-popup-overlay');
    existing.forEach(function(el) { el.remove(); });
  }

  // ========== Mobile: back to home ==========
  function mobileGoBack() {
    document.body.classList.remove('mobile-content-open');
    document.body.classList.remove('mobile-sidebar-overlay');
    mainContent.scrollTo({ top: 0 });
  }

  // ========== Mobile: open sidebar as overlay ==========
  function openMobileSidebarOverlay() {
    document.body.classList.add('mobile-sidebar-overlay');
  }

  function closeMobileSidebarOverlay() {
    document.body.classList.remove('mobile-sidebar-overlay');
  }

  // ========== Handle URL hash ==========
  var initialLoad = true;
  function handleHash() {
    var hash = window.location.hash;
    if (hash && hash.startsWith('#sec-')) {
      var idx = parseInt(hash.replace('#sec-', ''), 10) - 1;
      if (idx >= 0 && idx < POLICY_DATA.length) {
        if (initialLoad && window.innerWidth <= 900) {
          // Mobile initial load: stay on category list, just scroll to section without sliding
          var target = document.getElementById('section-block-' + idx);
          if (target) {
            activeSection = idx;
            // Update nav active
            document.querySelectorAll('.nav-item').forEach(function(el) {
              var elIdx = parseInt(el.dataset.index, 10);
              el.classList.toggle('active', elIdx === idx);
            });
          }
        } else {
          showSection(idx);
        }
      }
    }
    initialLoad = false;
  }

  // ========== Build Navigation ==========
  function buildNav() {
    navList.innerHTML = '';

    POLICY_DATA.forEach(function(section, idx) {
      var sectionEl = document.createElement('div');
      sectionEl.className = 'nav-section';
      sectionEl.dataset.index = idx;

      var subSections = detectSubSections(section);
      var hasChildren = subSections.length > 0;

      var item = document.createElement('div');
      item.className = 'nav-item';
      item.dataset.index = idx;

      var numSpan = document.createElement('span');
      numSpan.className = 'nav-num';
      numSpan.textContent = idx + 1;

      var titleSpan = document.createElement('span');
      titleSpan.className = 'nav-item-title';
      titleSpan.textContent = section.title;

      item.appendChild(numSpan);
      item.appendChild(titleSpan);

      if (hasChildren) {
        var expandSpan = document.createElement('span');
        expandSpan.className = 'expand-icon';
        expandSpan.innerHTML = '&#9654;';
        item.appendChild(expandSpan);
      }

      item.addEventListener('click', function(e) {
        onNavClick(idx);
      });
      sectionEl.appendChild(item);

      if (hasChildren) {
        var subNav = document.createElement('div');
        subNav.className = 'sub-nav';
        subNav.dataset.index = idx;

        subSections.forEach(function(sub) {
          var subItem = document.createElement('div');
          subItem.className = 'sub-nav-item';
          subItem.textContent = sub.title;
          subItem.addEventListener('click', function(e) {
            e.stopPropagation();
            onSubNavClick(idx, sub.title);
          });
          subNav.appendChild(subItem);
        });

        sectionEl.appendChild(subNav);
      }

      navList.appendChild(sectionEl);
    });
  }

  // ========== Detect Sub-sections ==========
  function detectSubSections(section) {
    var subs = [];

    // From predefined subsections array
    if (section.subsections && section.subsections.length) {
      section.subsections.forEach(function(s) {
        subs.push({ title: s });
      });
    }

    // From content patterns
    if (section.content) {
      var lines = section.content.split('\n');
      var patterns = [
        /^[\u2160-\u216F][\uff0e\.]\s*(.+)/,       // Roman numerals
        /^[IVX]+[\.\uff0e]\s*(.+)/,                 // Latin roman numerals
        // Circled numbers excluded from sidebar navigation
      ];

      lines.forEach(function(line) {
        var trimmed = line.trim();
        for (var i = 0; i < patterns.length; i++) {
          if (patterns[i].test(trimmed)) {
            var title = trimmed.length > 50 ? trimmed.substring(0, 50) + '...' : trimmed;
            // Extract numeral prefix (e.g. "Ⅰ" or "XIII") for dedup
            var prefixMatch = trimmed.match(/^([\u2160-\u216F]|[IVX]+)[\uff0e\.]/);
            var prefix = prefixMatch ? prefixMatch[1] : trimmed.charAt(0);
            var dupIdx = -1;
            for (var j = 0; j < subs.length; j++) {
              var subPrefixMatch = subs[j].title.match(/^([\u2160-\u216F]|[IVX]+)[\uff0e\.]/);
              var subPrefix = subPrefixMatch ? subPrefixMatch[1] : subs[j].title.charAt(0);
              if (subPrefix === prefix) { dupIdx = j; break; }
            }
            if (dupIdx >= 0) {
              subs[dupIdx].title = title;
            } else {
              subs.push({ title: title });
            }
            break;
          }
        }
      });
    }

    return subs;
  }

  // ========== Navigation Click ==========
  function onNavClick(idx) {
    // Toggle accordion
    var navItems = document.querySelectorAll('.nav-item');
    var clickedItem = navItems[idx];
    var sectionEl = clickedItem.parentElement;
    var subNav = sectionEl.querySelector('.sub-nav');

    if (subNav) {
      var wasOpen = subNav.classList.contains('open');
      // Close all
      document.querySelectorAll('.sub-nav.open').forEach(function(el) {
        el.classList.remove('open');
        el.parentElement.querySelector('.nav-item').classList.remove('expanded');
      });
      if (!wasOpen) {
        subNav.classList.add('open');
        clickedItem.classList.add('expanded');
      }
    }

    // If searching, re-render content with highlights and scroll to first match
    var activeQuery = searchInput.value.trim();
    if (activeQuery) {
      var block = document.getElementById('section-block-' + idx);
      if (block) {
        var bodyEl = block.querySelector('.content-body');
        if (bodyEl) {
          bodyEl.innerHTML = formatContent(POLICY_DATA[idx].blocks, activeQuery, idx);
        }
      }
      showSection(idx, false, function() {
        scrollToFirstHighlight(idx);
      });
    } else {
      showSection(idx);
    }
    closeSidebar();
  }

  function onSubNavClick(idx, subTitle) {
    var isMobile = window.innerWidth <= 900;
    showSection(idx, true); // skip scroll — we handle it here
    closeSidebar();

    if (isMobile) {
      // Mobile: ensure slide-in transition happens
      document.body.classList.add('mobile-content-open');
      document.body.classList.remove('mobile-sidebar-overlay');
    }

    // Scroll to sub-section after mobile slide-in (350ms) or immediately on desktop
    var delay = isMobile ? 400 : 100;
    setTimeout(function() {
      var scroller = document.querySelector('main.main');
      var searchContainer = allSectionsContainer.style.display !== 'none' ? allSectionsContainer : contentBody;
      var sectionBlock = document.getElementById('section-block-' + idx);
      var searchScope = sectionBlock || searchContainer;
      var elements = searchScope.querySelectorAll('.policy-heading-1, .policy-heading-2, .policy-heading-3, .policy-line');
      for (var i = 0; i < elements.length; i++) {
        var el = elements[i];
        if (el.textContent.indexOf(subTitle) >= 0 || subTitle.indexOf(el.textContent.trim()) >= 0) {
          isScrollingToSection = true;
          var r = el.getBoundingClientRect();
          var cr = scroller.getBoundingClientRect();
          scroller.scrollTop = scroller.scrollTop + r.top - cr.top - 20;
          setTimeout(function() { isScrollingToSection = false; }, 800);
          el.style.transition = 'background 0.3s';
          el.style.background = '#ffeaa7';
          (function(target) {
            setTimeout(function() { target.style.background = 'transparent'; }, 2000);
          })(el);
          break;
        }
      }
    }, delay);
  }

  // ========== Render All Sections (continuous scroll) ==========
  function renderAllSections() {
    allSectionsContainer.innerHTML = '';
    welcome.style.display = 'none';
    allSectionsContainer.style.display = '';

    POLICY_DATA.forEach(function(section, idx) {
      var block = document.createElement('div');
      block.className = 'section-block';
      block.id = 'section-block-' + idx;

      // Header
      var header = document.createElement('div');
      header.className = 'content-header';

      var numEl = document.createElement('div');
      numEl.className = 'content-section-num';
      numEl.textContent = 'SECTION ' + (idx + 1);

      var titleEl = document.createElement('h1');
