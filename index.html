<!DOCTYPE html>
<!-- POLICY_DOCS_MODIFIED_TIME: 2026-05-20T01:27:37.944Z -->
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マネジメントマニュアル | エフィラグループ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
/* ========== Reset & Base ========== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --primary: #1a5276;
  --primary-light: #2471a3;
  --primary-dark: #0e2f44;
  --accent: #e67e22;
  --accent-light: #f39c12;
  --bg: #ffffff;
  --bg-sidebar: #ffffff;
  --bg-content: #ffffff;
  --text: #2c3e50;
  --text-light: #7f8c8d;
  --text-inverse: #ffffff;
  --border: #e0e4e8;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
  --radius: 8px;
  --sidebar-w: 340px;
  --header-h: 64px;
  --transition: 0.2s ease;
}

html { font-size: 15px; scroll-behavior: smooth; }

body {
  font-family: "Noto Sans JP", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.8;
  overflow: hidden;
  height: 100vh;
}

/* ========== Header ========== */
.header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--header-h);
  background: #ffffff;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  z-index: 1000;
  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
}

.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.menu-toggle {
  display: none;
  background: none;
  border: none;
  color: var(--text);
  font-size: 1.5rem;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 4px;
  transition: background var(--transition);
}
.menu-toggle:hover { background: #f0f0f0; }

/* Mobile-only sidebar FAB — hidden on PC by default */
.mobile-sidebar-fab { display: none; }

/* Title logo image */
.header-logo-img {
  height: 60px;
  width: auto;
  max-width: 240px;
  display: block;
  object-fit: contain;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}

.updated-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.75rem;
  color: var(--text-light);
  background: var(--bg);
  padding: 4px 12px;
  border-radius: 20px;
}

.updated-badge::before {
  content: "";
  display: inline-block;
  width: 6px; height: 6px;
  background: #2ecc71;
  border-radius: 50%;
}

.doc-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--text);
  text-decoration: none;
  font-size: 0.8rem;
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: 20px;
  transition: all var(--transition);
}
.doc-link:hover {
  background: var(--bg);
  border-color: var(--primary-light);
  color: var(--primary);
}
.doc-link svg { width: 14px; height: 14px; }

/* ========== Layout ========== */
.layout {
  display: flex;
  margin-top: var(--header-h);
  height: calc(100vh - var(--header-h));
}

/* ========== Sidebar ========== */
.sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  height: 100%;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: transform 0.3s ease;
}

.search-box {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  position: relative;
  flex-shrink: 0;
}

.search-input-wrap {
  position: relative;
  display: flex;
  align-items: center;
}

.search-icon {
  position: absolute;
  left: 12px;
  color: var(--text-light);
  pointer-events: none;
}
.search-icon svg { width: 16px; height: 16px; display: block; }

.search-input {
  width: 100%;
  padding: 10px 40px 10px 38px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 0.9rem;
  font-family: inherit;
  background: var(--bg);
  transition: all var(--transition);
  outline: none;
}
.search-input:focus {
  border-color: var(--primary-light);
  box-shadow: 0 0 0 3px rgba(36,113,163,0.15);
}
.search-input::placeholder { color: #bdc3c7; }

.search-shortcut {
  position: absolute;
  right: 10px;
  font-size: 0.65rem;
  color: var(--text-light);
  background: var(--bg);
  border: 1px solid var(--border);
  padding: 2px 6px;
  border-radius: 3px;
  pointer-events: none;
}

.search-results-count {
  font-size: 0.75rem;
  color: var(--text-light);
  margin-top: 8px;
  display: none;
}

.nav-list {
  flex: 1;
  min-height: 0;        /* ← flex子要素がコンテンツサイズ以下に縮められるよう */
  overflow-y: auto;
  padding: 8px 0;
}

.nav-list::-webkit-scrollbar { width: 5px; }
.nav-list::-webkit-scrollbar-track { background: transparent; }
.nav-list::-webkit-scrollbar-thumb { background: #d0d4d8; border-radius: 3px; }
.nav-list::-webkit-scrollbar-thumb:hover { background: #b0b4b8; }

.nav-section {
  border-bottom: 1px solid var(--border);
}

.nav-section:last-child { border-bottom: none; }

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 20px;
  cursor: pointer;
  transition: all var(--transition);
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--text);
  user-select: none;
  position: relative;
}

.nav-item:hover {
  background: #eef2f7;
}

.nav-item.active {
  background: linear-gradient(90deg, rgba(26,82,118,0.08) 0%, transparent 100%);
  color: var(--primary);
  font-weight: 600;
}

.nav-item.active::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  background: var(--accent);
  border-radius: 0 2px 2px 0;
}

.nav-num {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 24px;
  height: 24px;
  font-size: 0.7rem;
  font-weight: 700;
  background: var(--bg);
  color: var(--text-light);
  border-radius: 6px;
  flex-shrink: 0;
}

.nav-item.active .nav-num {
  background: var(--primary);
  color: var(--text-inverse);
}

.nav-item-title {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.nav-item .expand-icon {
  font-size: 0.7rem;
  color: var(--text-light);
  transition: transform var(--transition);
  flex-shrink: 0;
}

.nav-item.expanded .expand-icon { transform: rotate(90deg); }

.sub-nav {
  display: none;
  padding: 0 0 8px 0;
  background: #fafbfc;
}

.sub-nav.open { display: block; }

.sub-nav-item {
  padding: 8px 20px 8px 56px;
  font-size: 0.82rem;
  color: var(--text-light);
  cursor: pointer;
  transition: all var(--transition);
  position: relative;
}

.sub-nav-item::before {
  content: "";
  position: absolute;
  left: 44px;
  top: 50%;
  transform: translateY(-50%);
  width: 4px;
  height: 4px;
  background: #d0d4d8;
  border-radius: 50%;
}

.sub-nav-item:hover {
  color: var(--primary);
  background: #eef2f7;
}

.sub-nav-item:hover::before {
  background: var(--primary);
}

.sub-nav-item.active {
  color: var(--primary);
  font-weight: 600;
}
.sub-nav-item.active::before {
  background: var(--accent);
}

.nav-section.search-hidden { display: none; }

/* ========== Main Content ========== */
.main {
  flex: 1;
  overflow-y: auto;
  padding: 40px 48px;
  background: var(--bg);
}

.main::-webkit-scrollbar { width: 8px; }
.main::-webkit-scrollbar-track { background: transparent; }
.main::-webkit-scrollbar-thumb { background: #d0d4d8; border-radius: 4px; }
.main::-webkit-scrollbar-thumb:hover { background: #b0b4b8; }

/* Welcome state */
.welcome {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  text-align: center;
  color: var(--text-light);
}

.welcome-icon {
  width: 80px;
  height: 80px;
  margin-bottom: 24px;
  opacity: 0.25;
}

.welcome h2 {
  font-size: 1.5rem;
  color: var(--text);
  margin-bottom: 8px;
  font-weight: 600;
}

.welcome p {
  font-size: 0.95rem;
  margin-bottom: 4px;
}

.welcome .shortcut-hint {
  margin-top: 16px;
  font-size: 0.8rem;
  display: flex;
  align-items: center;
  gap: 6px;
}

.welcome .shortcut-hint kbd {
  background: #eee;
  border: 1px solid #ddd;
  padding: 2px 8px;
  border-radius: 4px;
  font-family: inherit;
  font-size: 0.75rem;
}

/* Content card */
.content-card {
  display: none;
  background: var(--bg-content);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  max-width: 900px;
  margin: 0 auto;
}

/* All-sections continuous view */
.all-sections-container {
  max-width: 900px;
  margin: 0 auto;
}
.section-block {
  background: var(--bg-content);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-bottom: 32px;
}
.section-block .content-header {
  padding: 32px 40px 24px;
  border-bottom: 1px solid var(--border);
}
.section-block .content-body {
  padding: 32px 40px 40px;
  font-size: 0.95rem;
  line-height: 2;
}

.content-header {
  padding: 32px 40px 24px;
  border-bottom: 1px solid var(--border);
}

.content-section-num {
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.content-title {
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--primary-dark);
  line-height: 1.4;
}

.content-sub-nav {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 16px;
}

.content-sub-nav:empty { margin-top: 0; }

.content-sub-nav-item {
  font-size: 0.8rem;
  color: var(--primary-light);
  background: rgba(36,113,163,0.06);
  padding: 4px 12px;
  border-radius: 20px;
  cursor: pointer;
  transition: all var(--transition);
  border: 1px solid transparent;
}
.content-sub-nav-item:hover {
  background: rgba(36,113,163,0.12);
  border-color: rgba(36,113,163,0.2);
}

.content-body {
  padding: 32px 40px 40px;
  font-size: 0.95rem;
  line-height: 2;
}

.content-body .policy-line {
  margin-bottom: 4px;
}

.content-body .policy-doc-bullet {
  padding-left: 1em;
  margin-bottom: 2px;
  position: relative;
}

.content-body .policy-doc-bullet::before {
  content: '●';
  font-size: 0.45em;
  vertical-align: middle;
  margin-right: 0.3em;
  margin-left: -1em;
  display: inline-block;
  width: 1em;
  color: var(--text);
}

.content-body .policy-key-title {
  font-size: 1.8rem;
  font-weight: 800;
  color: var(--primary-dark);
  margin: 16px 0 20px;
  letter-spacing: 0.05em;
}

.content-body .policy-heading-1 {
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--primary-dark);
  margin: 32px 0 12px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--accent);
  display: inline-block;
}

.content-body .policy-heading-1:first-child { margin-top: 0; }

.content-body .policy-heading-2 {
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--primary);
  margin: 24px 0 8px;
}

.content-body .policy-heading-3 {
  font-weight: 600;
  color: var(--text);
  margin: 16px 0 4px;
}

.content-body .policy-bullet {
  padding-left: 1em;
  margin-bottom: 2px;
  color: var(--text);
}

.content-body .policy-indent-1 { padding-left: 1.5em; }
.content-body .policy-indent-2 { padding-left: 3em; }

.content-body .policy-empty { height: 0.8em; }

.content-body .search-highlight {
  background: #ffeaa7;
  padding: 1px 3px;
  border-radius: 2px;
  font-weight: 600;
}

.content-body .search-highlight.search-highlight-focus {
  background: #f39c12;
  color: #fff;
  outline: 2px solid #e67e22;
  outline-offset: 1px;
  animation: highlight-pulse 1.5s ease-in-out;
}

@keyframes highlight-pulse {
  0% { transform: scale(1); }
  30% { transform: scale(1.08); }
  60% { transform: scale(1); }
  100% { transform: scale(1); }
}

.content-body .placeholder-msg {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  color: var(--text-light);
  text-align: center;
  gap: 12px;
}

.content-body .placeholder-msg .placeholder-icon {
  font-size: 2.5rem;
  opacity: 0.3;
}

/* Search results panel */
.search-results-panel {
  display: none;
  background: var(--bg-content);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  max-width: 900px;
  margin: 0 auto;
}

.search-results-header {
  padding: 24px 40px;
  border-bottom: 1px solid var(--border);
}

.search-results-header h2 {
  font-size: 1.2rem;
  color: var(--primary-dark);
}

.search-results-header p {
  font-size: 0.85rem;
  color: var(--text-light);
  margin-top: 4px;
}

.search-result-item {
  padding: 20px 40px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background var(--transition);
}
.search-result-item:hover { background: #fafbfc; }
.search-result-item:last-child { border-bottom: none; }

.search-result-section {
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 4px;
}

.search-result-snippet {
  font-size: 0.9rem;
  color: var(--text);
  line-height: 1.7;
}

.search-result-snippet .search-highlight {
  background: #ffeaa7;
  padding: 1px 3px;
  border-radius: 2px;
  font-weight: 600;
}

.search-no-results {
  padding: 60px 40px;
  text-align: center;
  color: var(--text-light);
}

.search-no-results p:first-child {
  font-size: 2rem;
  opacity: 0.3;
  margin-bottom: 12px;
}

/* ========== Overlay (mobile) ========== */
.sidebar-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 899;
}

/* (mobile-back-btn removed) */

/* ========== Responsive ========== */
@media (max-width: 900px) {
  /* デスクトップ専用要素を非表示 */
  .menu-toggle         { display: none !important; }
  .sidebar-overlay     { display: none !important; }
  .shortcut-hint       { display: none !important; }
  #searchShortcut      { display: none !important; }
  .updated-badge       { display: none; }
  .header-right .doc-link span.doc-link-text { display: none; }
  .header-logo-img     { height: 50px; max-width: 180px; }

  /* 検索結果パネルはモバイル非表示（ナビリストでフィルタリング） */
  .search-results-panel { display: none !important; }

  /* ２パネル横スライドレイアウト */
  .layout {
    overflow: hidden;
    position: relative;
  }

  /* パネル①：サイドバー = 全幅ホーム画面 */
  .sidebar {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    min-width: unset;
    transform: translateX(0);
    transition: transform 0.3s ease;
    box-shadow: none;
    z-index: 1;
  }

  /* パネル②：メインコンテンツ = 右に隠れている */
  .main {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    overflow-y: auto;
    padding: 0 !important;
    transform: translateX(100%);
    transition: transform 0.3s ease;
    z-index: 2;
    display: flex;
    flex-direction: column;
  }

  /* コンテンツ表示時：パネルをスライド */
  body.mobile-content-open .sidebar { transform: translateX(-100%); }
  body.mobile-content-open .main    { transform: translateX(0); }

  /* サイドバーオーバーレイ表示時（FABタップ後） */
  body.mobile-sidebar-overlay .sidebar {
    transform: translateX(0) !important;
    width: 85%;
    max-width: 320px;
    z-index: 300;
    box-shadow: 4px 0 32px rgba(0,0,0,0.35);
  }
  body.mobile-sidebar-overlay .sidebar-overlay {
    display: block !important;
    z-index: 299;
  }

  /* ヘッダー右上メニューボタン（コンテンツ表示中のみ） */
  .mobile-sidebar-fab {
    display: none;
    align-items: center;
    justify-content: center;
    width: 40px;
    height: 40px;
    padding: 0;
    background: var(--primary);
    color: var(--text-inverse);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .mobile-sidebar-fab svg { width: 20px; height: 20px; flex-shrink: 0; }
  .mobile-sidebar-fab:active { background: var(--primary-light); }
  body.mobile-content-open .mobile-sidebar-fab { display: flex; }
  body.mobile-sidebar-overlay .mobile-sidebar-fab { display: none; }

  /* ナビリスト下部に余白を追加（末尾の項目をタッチしやすくする） */
  .nav-list { padding-bottom: 80px; }

  /* ロゴをクリック可能に */
  .header-logo-link { cursor: pointer; display: flex; align-items: center; }

  /* (mobile-back-btn removed) */

  /* コンテンツカードを全画面に（.visibleクラス付与時のみ表示） */
  .content-card {
    border-radius: 0;
    box-shadow: none;
    flex: 1;
    display: none;
    flex-direction: column;
  }
  .content-card.visible {
    display: flex;
  }
  .content-body { flex: 1; }
  .content-header { padding: 20px 16px 12px; }
  .content-body   { padding: 16px; font-size: 0.9rem; }
  .search-result-item { padding: 14px 16px; }

  /* 全セクションコンテナもモバイル対応 */
  .section-block {
    border-radius: 0;
    box-shadow: none;
    margin-bottom: 8px;
    border-bottom: 4px solid var(--border);
  }
  .section-block .content-header { padding: 20px 16px 12px; }
  .section-block .content-body   { padding: 16px; font-size: 0.9rem; }
  .all-sections-container { padding: 0; }
}

@media (max-width: 600px) {
  :root { --header-h: 60px; }
  .content-title { font-size: 1.2rem; }
  .header-logo-img { height: 44px; max-width: 160px; }
  .header { padding: 0 10px; }
  .header-right .doc-link { padding: 4px 10px; font-size: 0.75rem; }
  .nav-item { padding: 10px 16px; font-size: 0.9rem; }
}

/* ========== Scroll to top button ========== */
.scroll-top {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--primary);
  color: var(--text-inverse);
  border: none;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  box-shadow: var(--shadow-lg);
  transition: all var(--transition);
  z-index: 100;
  font-size: 1.2rem;
}
.scroll-top:hover { background: var(--primary-light); transform: translateY(-2px); }
.scroll-top.visible { display: flex; }

/* ========== Print ========== */
@media print {
  .header, .sidebar, .scroll-top, .sidebar-overlay { display: none !important; }
  .layout { display: block; }
  .main { padding: 0; overflow: visible; height: auto; }
  body { overflow: visible; height: auto; }
  .content-card { box-shadow: none; border: 1px solid #ddd; }
}

/* ========== Animations ========== */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.content-card.visible,
.search-results-panel.visible {
  display: block;
  animation: fadeIn 0.3s ease;
}

/* ========== Glossary Tooltip ========== */
.glossary-term {
  border-bottom: 1.5px dotted var(--accent);
  color: inherit;
  cursor: help;
  position: relative;
  transition: background var(--transition);
}
.glossary-term:hover {
  background: rgba(230, 126, 34, 0.08);
}

.glossary-popup-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 1999;
}

.glossary-popup {
  position: fixed;
  background: #ffffff;
  border: 1px solid var(--border);
  border-radius: 12px;
  box-shadow: var(--shadow-lg);
  padding: 0;
  max-width: 380px;
  min-width: 260px;
  z-index: 2000;
  animation: glossaryFadeIn 0.15s ease;
  overflow: hidden;
}

@keyframes glossaryFadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

.glossary-popup-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  background: var(--primary);
  color: var(--text-inverse);
}

.glossary-popup-title {
  font-size: 0.85rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 6px;
}

.glossary-popup-title::before {
  content: '\1F4D6';
  font-size: 0.95rem;
}

.glossary-popup-close {
  background: none;
  border: none;
  color: var(--text-inverse);
  font-size: 1.1rem;
  cursor: pointer;
  padding: 2px 6px;
  border-radius: 4px;
  line-height: 1;
  opacity: 0.8;
  transition: opacity var(--transition);
}
.glossary-popup-close:hover { opacity: 1; }

.glossary-popup-body {
  padding: 12px 14px;
  font-size: 0.85rem;
  line-height: 1.7;
  color: var(--text);
  max-height: 240px;
  overflow-y: auto;
}

.glossary-popup-category {
  display: inline-block;
  font-size: 0.7rem;
  color: var(--text-light);
  background: var(--bg);
  padding: 2px 8px;
  border-radius: 10px;
  margin-bottom: 6px;
}

.glossary-popup-footer {
  padding: 6px 14px 10px;
  font-size: 0.72rem;
  color: var(--text-light);
  border-top: 1px solid var(--border);
  text-align: right;
}

.glossary-popup-footer a {
  color: var(--primary-light);
  text-decoration: none;
  cursor: pointer;
}
.glossary-popup-footer a:hover { text-decoration: underline; }

@media (max-width: 900px) {
  .glossary-popup {
    max-width: calc(100vw - 32px);
    left: 16px !important;
    right: 16px !important;
  }
}

/* ===== Structured renderer (blocks) v3 ===== */
.content-body .policy-h1 {
  font-size: 1.5rem;
  font-weight: 800;
  color: var(--primary-dark);
  margin: 0 0 24px;
  padding-bottom: 12px;
  border-bottom: 3px solid var(--accent);
  letter-spacing: 0.04em;
}
.content-body .policy-h2 {
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--primary);
  margin: 28px 0 10px;
  padding-left: 12px;
  border-left: 4px solid var(--accent);
  line-height: 1.5;
}
.content-body .policy-h3 {
  font-size: 1rem;
  font-weight: 600;
  color: var(--primary-dark);
  margin: 18px 0 6px;
  line-height: 1.5;
}
.content-body .policy-p {
  margin: 0 0 8px;
  line-height: 1.85;
  color: var(--text);
}
.content-body .policy-bullet {
  position: relative;
  padding-left: 1.4em;
  margin: 0 0 4px;
  line-height: 1.85;
  color: var(--text);
}
.content-body .policy-bullet::before {
  position: absolute;
  left: 0.2em;
  display: inline-block;
  width: 1em;
  text-align: center;
  color: var(--accent);
  font-weight: 700;
}
.content-body .policy-bullet-l0::before { content: '●'; font-size: 0.55em; top: 0.55em; }
.content-body .policy-bullet-l1 { padding-left: 2.6em; }
.content-body .policy-bullet-l1::before { content: '○'; font-size: 0.6em; left: 1.4em; top: 0.55em; }
.content-body .policy-bullet-l2 { padding-left: 3.8em; }
.content-body .policy-bullet-l2::before { content: '■'; font-size: 0.55em; left: 2.6em; top: 0.6em; }
.content-body .policy-bullet-l3 { padding-left: 5em; }
.content-body .policy-bullet-l3::before { content: '◦'; font-size: 0.7em; left: 3.8em; top: 0.45em; }
.content-body .policy-spacer { height: 0.8em; }

/* Images (from Google Docs original) */
.content-body .policy-img-wrap {
  margin: 16px 0;
  text-align: center;
}
.content-body .policy-img {
  max-width: 100%;
  height: auto;
  display: block;
  margin: 0 auto;

/* Tables (from Google Docs original) */

.content-body .policy-table {

  font-size: 0.9rem;
  background: #fff;
}
.content-body .policy-table td {
  border: 1px solid var(--border);
  padding: 10px 12px;
  vertical-align: top;
  line-height: 1.7;
  color: var(--text);
}
.content-body .policy-table td:first-child {
  font-weight: 700;
  color: var(--primary-dark);
  background: rgba(36,113,163,0.06);
  white-space: nowrap;
}
.content-body .policy-table tr:nth-child(odd) td:not(:first-child) {
  background: #fafbfc;
}

/* Hardcoded key titles in 前提 section */

const POLICY_DATA = [{"title": "はじめに", "blocks": [{"t": "p", "x": "ルールほど強制力や明確さはありませんが、エフィラグループのマネジメントの考え方を文章にしたものです。随時追加する予定です。（今だけでなく、未来に目を向けるリーダーとしての考え方を示しています）"}, {"t": "p", "x": "マニュアルの目的は主に以下２点です。"}, {"t": "p", "x": "①スピード感を持って最速で理念を実現させる"}, {"t": "p", "x": "（拠点においては、チームで成果を上げること、拠点を繁栄させること）"}, {"t": "p", "x": "②長く働ける環境を作る"}, {"t": "p", "x": "（部下の成長、自立）"}], "subsections": [], "text": "ルールほど強制力や明確さはありませんが、エフィラグループのマネジメントの考え方を文章にしたものです。随時追加する予定です。（今だけでなく、未来に目を向けるリーダーとしての考え方を示しています） マニュアルの目的は主に以下２点です。 ①スピード感を持って最速で理念を実現させる （拠点においては、チームで成果を上げること、拠点を繁栄させること） ②長く働ける環境を作る （部下の成長、自立）"}, {"title": "エフィラグループにおける管理職の存在意義・役割", "blocks": [{"t": "p", "x": "エフィラグループでは、管理職はなぜ存在しているのか、また、管理職の役割とは何か、について定義します。"}, {"t": "p", "x": "管理職の存在意義とは"}, {"t": "p", "x": "「組織の目標を達成すること。達成させ続けること。」"}, {"t": "p", "x": "（拠点においては、チームで成果を上げること、拠点を繁栄させること）"}, {"t": "p", "x": "管理職の役割とは"}, {"t": "tbl", "rows": [["1）目標達成責任\n「集客」「新規パートナー獲得」「総コマ」「収入」\n2）人材マネジメント\n「育成」「定着」「エンゲージメント」「ルール」「理念浸透」\n3）サービス品質の担保\n「環境整備」「書類整備」「接遇」「安心・安全」「品質」「パートナー満足」「改善提案」「運営指導」\n4）本部や上長と部下をつなぐ\n「報告」「情報収集」「提案」「情報共有」「会議」\n5）課題解決をする\n「トラブル対応」「クレーム対応」「ルール作り」「仕組み提案」"]]}, {"t": "p", "x": "マネジャーの語源である、manageは、「〔困難な中で（大変な努力をして）～を〕何とか成し遂げる、やりくりすること」という意味があり、「何とか成し遂げる者」がマネジャーということになります。"}, {"t": "p", "x": "したがって管理職の最大の役割は「組織の目標を達成すること」であり、それを継続させ達成させ続けることこそが管理職の最大のミッションです。他の諸々の役割はそれを成し遂げるための手段という位置づけです。"}, {"t": "p", "x": "※役職について"}, {"t": "p", "x": "・役職とは「役割と責任」の名称である。"}, {"t": "p", "x": "・役職がつくことで責任と役割が大きくなることを意味する。"}, {"t": "p", "x": "・一方で役職とは役割と責任が大きいことを示すだけで、人間としての価値（人間価値）が高いことを示すわけではない。"}, {"t": "p", "x": "・役職があるからといって、偉いわけではない。偉そうにすべきではない。"}], "subsections": [], "text": "エフィラグループでは、管理職はなぜ存在しているのか、また、管理職の役割とは何か、について定義します。 管理職の存在意義とは 「組織の目標を達成すること。達成させ続けること。」 （拠点においては、チームで成果を上げること、拠点を繁栄させること） 管理職の役割とは 1）目標達成責任 「集客」「新規パートナー獲得」「総コマ」「収入」 2）人材マネジメント 「育成」「定着」「エンゲージメント」「ルール」「理念浸透」 3）サービス品質の担保 「環境整備」「書類整備」「接遇」「安心・安全」「品質」「パートナー満足」「改善提案」「運営指導」 4）本部や上長と部下をつなぐ 「報告」「情報収集」「提案」「情報共有」「会議」 5）課題解決をする 「トラブル対応」「クレーム対応」「ルール作り」「仕組み提案」 マネジャーの語源である、manageは、「〔困難な中で（大変な努力をして）～を〕何とか成し遂げる、やりくりすること」という意味があり、「何とか成し遂げる者」がマネジャーということになります。 したがって管理職の最大の役割は「組織の目標を達成すること」であり、それを継続させ達成させ続けることこそが管理職の最大のミッションです。他の諸々の役割はそれを成し遂げるための手段という位置づけです。 ※役職について ・役職とは「役割と責任」の名称である。 ・役職がつくことで責任と役割が大きくなることを意味する。 ・一方で役職とは役割と責任が大きいことを示すだけで、人間としての価値（人間価値）が高いことを示すわけではない。 ・役職があるからといって、偉いわけではない。偉そうにすべきではない。"}, {"title": "理想の上長像", "blocks": [{"t": "p", "x": "エフィラグループが考える理想の上長像は以下のような人です。これを理想として次頁以降に詳細を記載しています。"}, {"t": "p", "x": "・優しい口調で話す"}, {"t": "p", "x": "・他人を尊重する姿勢で真摯に対応する"}, {"t": "p", "x": "・ルールを守る、守るチームを作る"}, {"t": "p", "x": "・ルールになっていないことで他者の評価をしない"}, {"t": "p", "x": "・感情的にならない（喜びは除く）"}, {"t": "p", "x": "・謙虚である"}, {"t": "p", "x": "・言い訳や手抜きをしない、部下にもさせない"}, {"t": "p", "x": "・全てのメンバーと平等に接する"}, {"t": "p", "x": "・組織が目指すより良い未来を描ける（リーダーシップ）"}, {"t": "p", "x": "・人を巻き込める"}, {"t": "p", "x": "・矢印を自分に向ける（自責）"}, {"t": "p", "x": "・人格を磨き続けることができる"}], "subsections": [], "text": "エフィラグループが考える理想の上長像は以下のような人です。これを理想として次頁以降に詳細を記載しています。 ・優しい口調で話す ・他人を尊重する姿勢で真摯に対応する ・ルールを守る、守るチームを作る ・ルールになっていないことで他者の評価をしない ・感情的にならない（喜びは除く） ・謙虚である ・言い訳や手抜きをしない、部下にもさせない ・全てのメンバーと平等に接する ・組織が目指すより良い未来を描ける（リーダーシップ） ・人を巻き込める ・矢印を自分に向ける（自責） ・人格を磨き続けることができる"}, {"title": "管理職の心得", "blocks": [{"t": "p", "x": "Ⅰ．自己成長"}, {"t": "p", "x": "Ⅱ ．部下の成長"}, {"t": "p", "x": "Ⅲ．結果を出す覚悟"}, {"t": "p", "x": "Ⅳ ．謙虚であること"}], "subsections": [], "text": "Ⅰ．自己成長 Ⅱ ．部下の成長 Ⅲ．結果を出す覚悟 Ⅳ ．謙虚であること"}, {"title": "【心得 Ⅰ】 自己成長", "blocks": [{"t": "p", "x": "１． 人格を磨く"}, {"t": "p", "x": "組織はリーダーの器の大きさで決まるとされる。\u000b現時点で完璧である必要もないし、完璧であることは不可能だが、常に高めていこうという向上心の高さと、自分はまだまだであるという謙虚さが重要。"}, {"t": "p", "x": "２． 言行一致"}, {"t": "p", "x": "発言と行動を一致させること。\u000b管理職がこれを欠くと信頼を失い、離職やパートナー離れにつながる。"}, {"t": "p", "x": "３．高い理想と基準を持つ"}, {"t": "p", "x": "「これでいいか」と妥協しない。\u000b高い基準を持ち追求する姿勢に、部下はついてくる。\u000b上長が基準を緩めれば、部下はそれ以上の基準を持てない。"}, {"t": "p", "x": "４．自分に甘く他人に甘いは最悪"}, {"t": "p", "x": "自分に甘く他人に厳しい：人望は失うが、仕事の質は一定程度保たれる。\u000b自分に甘く他人に甘い：最悪。ぬるま湯を作り、仕事の質が下がり、成長もなく、不満が溜まりやすい組織になる。\u000b他人に甘い管理職は人気がありそうに見えても、パートナーにとってはマイナス。\u000b管理職は必ず「自分に厳しく」を前提にする。"}, {"t": "p", "x": "５．インプットをしないとアウトプットの質は上がらない"}, {"t": "p", "x": "人間の思考はゼロから何かを生み出すことはできない。すべてはインプットを元に組み合わせ、応用している。\u000b知識・見識を高める勉強をすることで、アウトプットの質も上がる。\u000b経験だけに頼る人は、勉強している人に勝てない。"}, {"t": "p", "x": "６．管理職は孤独"}, {"t": "p", "x": "責任を担う立場として見える景色も違うため孤独を感じるが、それは普通のこと。\u000b孤独を受け入れ、部下のご機嫌取りで埋めようとしない。"}], "subsections": [], "text": "１． 人格を磨く 組織はリーダーの器の大きさで決まるとされる。 現時点で完璧である必要もないし、完璧であることは不可能だが、常に高めていこうという向上心の高さと、自分はまだまだであるという謙虚さが重要。 ２． 言行一致 発言と行動を一致させること。 管理職がこれを欠くと信頼を失い、離職やパートナー離れにつながる。 ３．高い理想と基準を持つ 「これでいいか」と妥協しない。 高い基準を持ち追求する姿勢に、部下はついてくる。 上長が基準を緩めれば、部下はそれ以上の基準を持てない。 ４．自分に甘く他人に甘いは最悪 自分に甘く他人に厳しい：人望は失うが、仕事の質は一定程度保たれる。 自分に甘く他人に甘い：最悪。ぬるま湯を作り、仕事の質が下がり、成長もなく、不満が溜まりやすい組織になる。 他人に甘い管理職は人気がありそうに見えても、パートナーにとってはマイナス。 管理職は必ず「自分に厳しく」を前提にする。 ５．インプットをしないとアウトプットの質は上がらない 人間の思考はゼロから何かを生み出すことはできない。すべてはインプットを元に組み合わせ、応用している。 知識・見識を高める勉強をすることで、アウトプットの質も上がる。 経験だけに頼る人は、勉強している人に勝てない。 ６．管理職は孤独 責任を担う立場として見える景色も違うため孤独を感じるが、それは普通のこと。 孤独を受け入れ、部下のご機嫌取りで埋めようとしない。"}, {"title": "【心得 Ⅱ】 部下の成長", "blocks": [{"t": "p", "x": "１．勝つ"}, {"t": "p", "x": "マネジャーは何よりチームを勝たせることにコミットする。\u000bチームを勝たせるとは、他人を負かすことではなく、チーム全員で結果を出すこと。\u000b結果がでないとチームの雰囲気も悪くなるし、負け癖もつく。一人ひとりの人生にも影響する。\u000b最低限でやった気になるのではなく、最終的には「勝つ」という気迫で、「勝つ」ことにこだわる。"}, {"t": "p", "x": "２．今のメンバーがベストメンバー"}, {"t": "p", "x": "今のメンバーがダメだからうまくいかないと考えない。人は無限にいるわけではないし、活かせていない自分の問題だと考える。\u000bこのメンバーで結果を出すことを考え、最初からメンバーを勝てない理由にはしない。\u000b※人柄として不正や虐待をするメンバーは除く"}, {"t": "p", "x": "３．部下から情報を集めて判断する（ボトムダウン）"}, {"t": "p", "x": "独断で決めるより、部下から情報や意見を集め、それを基に判断した方が精度が高い。\u000b情報を吸い上げ、ルール・仕組み・マニュアルの改善に活かす。"}, {"t": "p", "x": "４．部下の仕事は「できていない前提」で確認"}, {"t": "p", "x": "最終責任は上長にあるため、チェックを怠らない。\u000b「できているだろう」ではなく「抜け漏れがあるかもしれない」と考え、細部まで確認する。"}, {"t": "p", "x": "５．部下を私物化しない"}, {"t": "p", "x": "部下は自分のものではないため、自分都合で思い通りに動かそうとしない。\u000b会社の財産であることを理解する。"}, {"t": "p", "x": "６．コミュニケーションは質より量"}, {"t": "p", "x": "部下とのコミュニケーションは「質の高い1時間」より「数分でも毎日」の方が効果的。\u000bまとめて時間をとるよりも頻度を重視する。"}, {"t": "p", "x": "７．目的を理解し、理解されるようにする。"}, {"t": "p", "x": "目的を伝えずに、「これをしてほしい」だけで伝えると、疑念や不信感を招く。\u000b上長や本部の決定を伝える際も、背景や目的を正しく理解しないまま伝えると同様に不信感を生む。\u000b「なぜそうするのか」を必ず伝え、動機付けにつなげる。"}, {"t": "p", "x": "８．メンバーとの本当の信頼関係は仕事でしか作れない"}, {"t": "p", "x": "部下に好かれるか嫌われるかを考えない。小手先で何とかしようとしても無駄。\u000b誠実に真摯に仕事に向き合うことでしか本当の信頼は得られない。"}, {"t": "p", "x": "９．部下の成長にコミットする"}, {"t": "p", "x": "部下の成長は組織の成長であり、同時に部下個人の生きがいにもつながる。\u000b「ここで働けてよかった」と思ってもらえるようにコミットする。\u000b部下を育成し成長させるのは上長の責任。\u000b部下ができないことは「教えていない・教え方が悪い」と考える。"}, {"t": "p", "x": "10．自分は孤独でも、部下は孤独にしないようにする"}, {"t": "p", "x": "管理職自身は孤独を受け入れる覚悟を持つ。\u000bしかし、部下を孤独にさせてはいけない。\u000b「自分が孤独だから部下もそうであるべき」という考えは誤りであり、むしろ部下には安心感と一体感を与えるのが上長の役割である。"}, {"t": "p", "x": "11．任せて任さず"}, {"t": "p", "x": "部下を信頼し、仕事を任せながらも、最後まで見届ける。\u000b放置でも支配でもないバランスが重要。\u000b任せたからといって、途中経過を確認しない・報告を受けないのは誤り。\u000b「任せた＝放置」ではなく、「任せて、見守り、支援する」姿勢が真のマネジメント。"}], "subsections": [], "text": "１．勝つ マネジャーは何よりチームを勝たせることにコミットする。 チームを勝たせるとは、他人を負かすことではなく、チーム全員で結果を出すこと。 結果がでないとチームの雰囲気も悪くなるし、負け癖もつく。一人ひとりの人生にも影響する。 最低限でやった気になるのではなく、最終的には「勝つ」という気迫で、「勝つ」ことにこだわる。 ２．今のメンバーがベストメンバー 今のメンバーがダメだからうまくいかないと考えない。人は無限にいるわけではないし、活かせていない自分の問題だと考える。 このメンバーで結果を出すことを考え、最初からメンバーを勝てない理由にはしない。 ※人柄として不正や虐待をするメンバーは除く ３．部下から情報を集めて判断する（ボトムダウン） 独断で決めるより、部下から情報や意見を集め、それを基に判断した方が精度が高い。 情報を吸い上げ、ルール・仕組み・マニュアルの改善に活かす。 ４．部下の仕事は「できていない前提」で確認 最終責任は上長にあるため、チェックを怠らない。 「できているだろう」ではなく「抜け漏れがあるかもしれない」と考え、細部まで確認する。 ５．部下を私物化しない 部下は自分のものではないため、自分都合で思い通りに動かそうとしない。 会社の財産であることを理解する。 ６．コミュニケーションは質より量 部下とのコミュニケーションは「質の高い1時間」より「数分でも毎日」の方が効果的。 まとめて時間をとるよりも頻度を重視する。 ７．目的を理解し、理解されるようにする。 目的を伝えずに、「これをしてほしい」だけで伝えると、疑念や不信感を招く。 上長や本部の決定を伝える際も、背景や目的を正しく理解しないまま伝えると同様に不信感を生む。 「なぜそうするのか」を必ず伝え、動機付けにつなげる。 ８．メンバーとの本当の信頼関係は仕事でしか作れない 部下に好かれるか嫌われるかを考えない。小手先で何とかしようとしても無駄。 誠実に真摯に仕事に向き合うことでしか本当の信頼は得られない。 ９．部下の成長にコミットする 部下の成長は組織の成長であり、同時に部下個人の生きがいにもつながる。 「ここで働けてよかった」と思ってもらえるようにコミットする。 部下を育成し成長させるのは上長の責任。 部下ができないことは「教えていない・教え方が悪い」と考える。 10．自分は孤独でも、部下は孤独にしないようにする 管理職自身は孤独を受け入れる覚悟を持つ。 しかし、部下を孤独にさせてはいけない。 「自分が孤独だから部下もそうであるべき」という考えは誤りであり、むしろ部下には安心感と一体感を与えるのが上長の役割である。 11．任せて任さず 部下を信頼し、仕事を任せながらも、最後まで見届ける。 放置でも支配でもないバランスが重要。 任せたからといって、途中経過を確認しない・報告を受けないのは誤り。 「任せた＝放置」ではなく、「任せて、見守り、支援する」姿勢が真のマネジメント。"}, {"title": "【心得 Ⅲ】 結果を出す覚悟", "blocks": [{"t": "p", "x": "１．拠点は拠点長次第、事業は事業責任者次第"}, {"t": "p", "x": "本来は人に依存すべきではないが、結局はトップ次第。\u000b拠点がうまくいくかどうかは拠点長次第。事業がうまくいくかどうかは事業責任者次第。\u000bトップはその立ち位置にいる自覚を持つ。"}, {"t": "p", "x": "２．マネジャーは結果を出す人"}, {"t": "p", "x": "マネジャーは「何とかして結果を出す人」。\u000b結果が出せないマネジャーはチームの役に立っていないという認識を持つべきである。\u000b同時に、マネージャーは人格も求められるため「点をとっているからいい」ではない。結果を出すことはマネジャーとしての最低ラインと考える。\u000b※結果は自身で自己設定した独自の評価ではなく、上長が求める結果を指す。"}, {"t": "p", "x": "３．目標達成は全部自分次第"}, {"t": "p", "x": "雨が降ろうが、槍が降ろうが、どんな状況でも結果を出すのが管理職だし、仕方ない状況なんて何一つ存在しない。前提として管理職はそう思っているべき。"}, {"t": "p", "x": "４．拠点で起きた結果すべてに責任がある"}, {"t": "p", "x": "拠点でのあらゆる出来事はすべて拠点長の責任と考えるべき。\u000b責任から外れるものは一つもない。仕方ないことなど存在しない。"}, {"t": "p", "x": "５．計画より実行"}, {"t": "p", "x": "計画ばかり立てても実行しなければ意味がない。\u000b実行しながら変わることも多い。\u000b「やるかやらないか」に時間をかけず、とにかく実行に時間を使う。\u000b計画も重要だが、より実行に重きを置く。"}, {"t": "p", "x": "６．パートナーが少なくて暇は罪"}, {"t": "p", "x": "パートナーが少ないのは収益の面でよくないのは当然だが、メンバーにしてみてもパートナーと接するという成長や貢献の機会を奪っている。\u000b多くのパートナーに利用してもらえる行動を採るべき。"}, {"t": "p", "x": "７．部下は自分のコマではない。"}, {"t": "p", "x": "部下に指示ができるようになると、自分が成果を上げるための道具のように見えてくる人がいるが、それは錯覚。\u000b部下は自分のためにいるのではなく、チームの成功のために存在する。\u000b上長にはチーム成功の責任があり、そのために権限があるだけ。"}, {"t": "p", "x": "８．コントロール外のことなどない"}, {"t": "p", "x": "たとえば現場は人材採用の決定権は持たないが、だからといって「採用できないのは仕方ない」とはならない。採用部に情報を提供したり、リファラル採用を行ったり、情報提供・意見・提案など関わる手段はいくらでもある。\u000b「なんだってできる」という意識を持ち、結果のためにすべてをコントロールする姿勢を取る。"}, {"t": "p", "x": "９．第二象限を毎日考える"}, {"t": "p", "x": "第二象限は「重要だが緊急でない仕事」。\u000b何も考えずに過ごすと第一象限に忙殺されて終わってしまう。\u000b管理職は未来を作る立場。第二象限に取り組まなければ発展はない。\u000b毎日、第二象限について考えることが必要。"}, {"t": "img", "src": "images/image4.jpg", "w": 220, "h": 146}, {"t": "p", "x": "10．事前の一手は事後の百手に勝る"}, {"t": "p", "x": "第二象限（重要だが緊急ではない仕事）を怠ると、やがて緊急性の高い問題に追われることになる。\u000b例：健康診断を定期的に受けていれば早期発見ができたのに、受けなかった結果として重篤化するのと同じ。\u000b予防に勝る対応はない。「起きてからでは遅い」という意識を常に持つ。"}, {"t": "p", "x": "11．目先のメリットより長期的メリットを優先する"}, {"t": "p", "x": "例えば、「教育・研修に時間をかけずに現場運営を優先する」「人が足りなくなるから不正を見逃す」など。\u000b短期的に走ると、結局何も進まない。進んでいくためには長期的なメリットをとるべき。"}, {"t": "p", "x": "12．同じことをしていても同じ結果しか生まれない"}, {"t": "p", "x": "違う結果を得たいなら、違う行動をする必要がある。\u000b「りんごをミキサーに入れているのに、次こそはみかんジュースができるはず」と考えるのと同じ。りんごではなくみかんを入れないとみかんジュースはできない。\u000b行動を変えない限り、結果は変わらない。"}, {"t": "p", "x": "13．結果と評価は後"}, {"t": "p", "x": "行動 → 結果 → 評価、の順番。\u000b「評価をもらうためにやる」ではなく、「目的に沿った行動をすること」。\u000b「評価されなそうだから力を抜く」ことはしない。\u000b同様に、評価の上下をちらつかせて部下をコントロールしようとしない。"}], "subsections": [], "text": "１．拠点は拠点長次第、事業は事業責任者次第 本来は人に依存すべきではないが、結局はトップ次第。 拠点がうまくいくかどうかは拠点長次第。事業がうまくいくかどうかは事業責任者次第。 トップはその立ち位置にいる自覚を持つ。 ２．マネジャーは結果を出す人 マネジャーは「何とかして結果を出す人」。 結果が出せないマネジャーはチームの役に立っていないという認識を持つべきである。 同時に、マネージャーは人格も求められるため「点をとっているからいい」ではない。結果を出すことはマネジャーとしての最低ラインと考える。 ※結果は自身で自己設定した独自の評価ではなく、上長が求める結果を指す。 ３．目標達成は全部自分次第 雨が降ろうが、槍が降ろうが、どんな状況でも結果を出すのが管理職だし、仕方ない状況なんて何一つ存在しない。前提として管理職はそう思っているべき。 ４．拠点で起きた結果すべてに責任がある 拠点でのあらゆる出来事はすべて拠点長の責任と考えるべき。 責任から外れるものは一つもない。仕方ないことなど存在しない。 ５．計画より実行 計画ばかり立てても実行しなければ意味がない。 実行しながら変わることも多い。 「やるかやらないか」に時間をかけず、とにかく実行に時間を使う。 計画も重要だが、より実行に重きを置く。 ６．パートナーが少なくて暇は罪 パートナーが少ないのは収益の面でよくないのは当然だが、メンバーにしてみてもパートナーと接するという成長や貢献の機会を奪っている。 多くのパートナーに利用してもらえる行動を採るべき。 ７．部下は自分のコマではない。 部下に指示ができるようになると、自分が成果を上げるための道具のように見えてくる人がいるが、それは錯覚。 部下は自分のためにいるのではなく、チームの成功のために存在する。 上長にはチーム成功の責任があり、そのために権限があるだけ。 ８．コントロール外のことなどない たとえば現場は人材採用の決定権は持たないが、だからといって「採用できないのは仕方ない」とはならない。採用部に情報を提供したり、リファラル採用を行ったり、情報提供・意見・提案など関わる手段はいくらでもある。 「なんだってできる」という意識を持ち、結果のためにすべてをコントロールする姿勢を取る。 ９．第二象限を毎日考える 第二象限は「重要だが緊急でない仕事」。 何も考えずに過ごすと第一象限に忙殺されて終わってしまう。 管理職は未来を作る立場。第二象限に取り組まなければ発展はない。 毎日、第二象限について考えることが必要。 10．事前の一手は事後の百手に勝る 第二象限（重要だが緊急ではない仕事）を怠ると、やがて緊急性の高い問題に追われることになる。 例：健康診断を定期的に受けていれば早期発見ができたのに、受けなかった結果として重篤化するのと同じ。 予防に勝る対応はない。「起きてからでは遅い」という意識を常に持つ。 11．目先のメリットより長期的メリットを優先する 例えば、「教育・研修に時間をかけずに現場運営を優先する」「人が足りなくなるから不正を見逃す」など。 短期的に走ると、結局何も進まない。進んでいくためには長期的なメリットをとるべき。 12．同じことをしていても同じ結果しか生まれない 違う結果を得たいなら、違う行動をする必要がある。 「りんごをミキサーに入れているのに、次こそはみかんジュースができるはず」と考えるのと同じ。りんごではなくみかんを入れないとみかんジュースはできない。 行動を変えない限り、結果は変わらない。 13．結果と評価は後 行動 → 結果 → 評価、の順番。 「評価をもらうためにやる」ではなく、「目的に沿った行動をすること」。 「評価されなそうだから力を抜く」ことはしない。 同様に、評価の上下をちらつかせて部下をコントロールしようとしない。"}, {"title": "【心得 Ⅳ 】謙虚であること", "blocks": [{"t": "p", "x": "１．役職があっても偉そうにしない"}, {"t": "p", "x": "役職は「役割と責任」の名称であり、人としての価値を示すものではなく、役職があるからといって、偉いわけではない。偉そうにすべきではない。"}, {"t": "p", "x": "２．役職者の権力濫用禁止"}, {"t": "p", "x": "役職は単なる役割であり、偉さを意味しない。謙虚であるべき。\u000b例：指示をする際に評価を下げることを示唆する発言をする\u000b権限は組織のために行使するもの。個人のメリットのために使わない。\u000b本来の範囲を超えていないか常に自問する。"}, {"t": "p", "x": "3．メンバー間の敬意と謙虚さ"}, {"t": "p", "x": "役職・等級・職種・部門・部署・事業部・雇用形態の違いは、ミッション達成のための「機能と責任」の違いに過ぎず、人間としての優劣を示すものではありません。すでに述べたとおり、役職は「役割と責任」の名称であり、役職が高いからといって人間としての価値（人間価値）が高いわけではありません。これは役職だけでなく、あらゆる属性の違いにおいて同様です。"}, {"t": "p", "x": "管理職は、自分とは異なる属性のメンバーに対して、自身が優れていると錯覚しないよう常に自覚してください。"}, {"t": "p", "x": "本部と現場、社員とパートナー、直接支援と間接部門——これらはすべて「並列」の関係にあります。「本部の方が偉い」「稼いでいる事業部が偉い」「正社員の方が立場が上」という認識は誤りです。管理職自身がそのような意識を持たないことはもちろん、チーム内にそのような空気が生まれていないかにも目を配り、必要に応じて是正する責任があります。"}, {"t": "p", "x": "自分にはできない役割を担ってくれているメンバーに対し、常に敬意と感謝を持ち続けましょう。"}], "subsections": [], "text": "１．役職があっても偉そうにしない 役職は「役割と責任」の名称であり、人としての価値を示すものではなく、役職があるからといって、偉いわけではない。偉そうにすべきではない。 ２．役職者の権力濫用禁止 役職は単なる役割であり、偉さを意味しない。謙虚であるべき。 例：指示をする際に評価を下げることを示唆する発言をする 権限は組織のために行使するもの。個人のメリットのために使わない。 本来の範囲を超えていないか常に自問する。 3．メンバー間の敬意と謙虚さ 役職・等級・職種・部門・部署・事業部・雇用形態の違いは、ミッション達成のための「機能と責任」の違いに過ぎず、人間としての優劣を示すものではありません。すでに述べたとおり、役職は「役割と責任」の名称であり、役職が高いからといって人間としての価値（人間価値）が高いわけではありません。これは役職だけでなく、あらゆる属性の違いにおいて同様です。 管理職は、自分とは異なる属性のメンバーに対して、自身が優れていると錯覚しないよう常に自覚してください。 本部と現場、社員とパートナー、直接支援と間接部門——これらはすべて「並列」の関係にあります。「本部の方が偉い」「稼いでいる事業部が偉い」「正社員の方が立場が上」という認識は誤りです。管理職自身がそのような意識を持たないことはもちろん、チーム内にそのような空気が生まれていないかにも目を配り、必要に応じて是正する責任があります。 自分にはできない役割を担ってくれているメンバーに対し、常に敬意と感謝を持ち続けましょう。"}, {"title": "⓪用語の定義", "blocks": [{"t": "p", "x": "※１）納得 ：相手が同意をしている状態"}, {"t": "p", "x": "※２）理解 ：相手が同意をしているかどうかは問わないが、内容を認識している状態"}, {"t": "p", "x": "※３）完全結果：双方に認識のズレがない状態"}, {"t": "p", "x": "※４）シンプルマネジメント：拠点長以上に対して用いるマネジメント手法"}, {"t": "p", "x": "※５）マイルドマネジメント：レギュラーメンバー（対人援助のみを行うメンバー）に対して用いるマネジメント手法"}, {"t": "p", "x": "本マニュアルにおいては、"}, {"t": "img", "src": "images/image2.png", "w": 87, "h": 32}, {"t": "p", "x": "マークをつけたものが、マイルドマネジメントの考え方となります。"}], "subsections": [], "text": "※１）納得 ：相手が同意をしている状態 ※２）理解 ：相手が同意をしているかどうかは問わないが、内容を認識している状態 ※３）完全結果：双方に認識のズレがない状態 ※４）シンプルマネジメント：拠点長以上に対して用いるマネジメント手法 ※５）マイルドマネジメント：レギュラーメンバー（対人援助のみを行うメンバー）に対して用いるマネジメント手法 本マニュアルにおいては、 マークをつけたものが、マイルドマネジメントの考え方となります。"}, {"title": "①ルールの運用", "blocks": [{"t": "h2", "x": "①-0）ルールとは"}, {"t": "p", "x": "まず、なぜルールが大切なのかを管理職が正しく理解するようにしましょう。"}, {"t": "p", "x": "ルールが大切である理由として、「公平性の担保」があります。"}, {"t": "p", "x": "例えば、シフトを守る、というルールがなかったとしたら、早く来て仕事しているメンバーを評価する、などが起こってしまうことがあるでしょう。また、例えば、会議の３分前に着席する、というルールがありますが、ぎりぎりの人とそうでない人がいた場合、会議の開始に支障が出てしまうこともあるでしょう。（早く来ている人が時間通りに会議が開始出来ず時間をロスしてしまうなど）ルールを全員が守ることで、メンバー全員が公平に仕事をすることができます。"}, {"t": "p", "x": "また、ルールを守ることに理解や納得が必ずしも必要ないことについて、交通ルールを例として説明します。（※「⓪用語の定義」参照）"}, {"t": "p", "x": "交通ルール（車が左側通行であること、赤信号が止まれであること）も、納得しようがしまいが守らないといけない。アメリカは右側通行だから私はそうすべきだと思う、という理屈は通らないのと同じことです。組織においてのルールも同様、そう決まっているからそれに対する理由の理解や納得は必要なく、守ってもらう以外ありません。そして、交通ルールは自分を守るためのルールでもあります。組織のルールも同じです。"}, {"t": "p", "x": "ただし、上記や①-1）でも、ルールを守ってもらうことに部下の理解や納得は必要ない、とされていて、部下の納得は必須ではありませんが、納得して仕事に取り組むことができるならその方がベストです。納得できないという部下の声があるのであれば、納得できない点の解消につとめた方が良いでしょう。「納得できなくてもルールなので、従ってください」というのは最終手段、だと思っておきましょう。なぜこのルールができたのか、背景を説明できるのであれば説明し、部下の皆さんが納得してルールを守れるようにつとめましょう。"}, {"t": "p", "x": "部下の皆さんにとっては、納得できなくても最終的に従わなければいけない、となる場合もありますが、上長に意見を伝えてはいけない、ということではありません。疑念があれば上長に伝えましょう。"}, {"t": "p", "x": "※メンバーシップマニュアル「2-4.疑念があったら上長に確認すること」参照"}, {"t": "h2", "x": "①-1）納得してもらえなくても、ルールを守れている拠点を作りましょう"}, {"t": "p", "x": "ルールを守れている拠点を作ることは上長の役割です。"}, {"t": "p", "x": "なぜこのルールがあるかを理解(※２)させることや納得(※１)させることは必須ではありませんが、部下の皆さんには疑念があれば解消していただいた方がいい、という点で理解や納得はしていただいた方がよいものです。「ルールが守られている状態にすること」が上長の役割であることを念頭において、部下の皆さんへルールを守るように伝えましょう。"}, {"t": "p", "x": "納得という観点でいうと、部下側が腹落ちすることが必要なため、説得に時間を要したり、それぞれの考えとの違いをすり合わせないといけないなど、膨大な時間を要し、組織運営上弊害がある場合もあります。ですので、「ルールなので従ってください」という対応が必要となる場合もあります。部下の納得を得るために必要以上に説得やすり合わせをしてしまうと、以後部下側は全て納得を求めるようになってしまうこともあるので望ましくありません。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）部下が「このルールはなぜあるのか」という疑問を抱いたようだったので、簡単にルールが出来た背景を説明し、納得してもらった。", "l": 0}, {"t": "b", "x": "２）シフト上の出勤時間に遅れた部下がいた。幸い業務上支障は無かったが、シフトを守るよう注意をした。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）部下から「なぜこのようなルールがあるのでしょうか。」と聞かれたので、「いいからルールなので守ってください」と言った。", "l": 0}, {"t": "b", "x": "２）部下から、「このルールは納得できませんので、守れません」と言われた。拠点長は説得のために毎日面談を繰り返し、膨大な時間を費やした。", "l": 0}, {"t": "h2", "x": "①-2）ルール違反を黙認しないようにしましょう"}, {"t": "p", "x": "上長は部下にルールを守らせることが、仕事です。たとえ軽微なルール違反だとしても、それを黙認してはいけません。"}, {"t": "p", "x": "黙認することで、部下の皆さんは「守らなくてよいルールもある」と思ってしまうことに繋がります。ルールを守っている人が損をする風土になり、不満につながってしまうこともあります。ルールを守らない方が得をする、という考えになってしまうこともあり、結果、ルールを守れない組織ができあがってしまうでしょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）部下が時計を付けて支援に入ろうとしていたので、身だしなみのルールでは時計を付けてはいけない、と指摘して外してもらった。", "l": 0}, {"t": "b", "x": "２）部下Ａが仲の良い部下Ｂに対し、「〇〇ちゃん」と呼んでいるのを見た。うっかり言ってしまったのだろうと思ったが、コミュニケーション基本ルールを守るように注意をした。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）部下Aが業務中に「おまえさー」と、ふざけた感じで部下Bと話していた。\u000b拠点長Cは「おまえ」はコミュニケーション基本ルールで、使ってはいけない言葉として記載されていることは知っていたが、楽しそうに会話をしているので、黙認した。", "l": 0}, {"t": "b", "x": "２）部下Aが勤務時間外に喫煙している姿を目撃した。部下Aは部署のエース的存在で必要不可欠なメンバーなので、波風を立てたくないこともあり、ルール違反を黙認した。", "l": 0}, {"t": "b", "x": "３）先月に新ルールが制定された。拠点長Aはこのルールに納得していなかったこともあり、部下のルール違反があったが黙認した。", "l": 0}, {"t": "h2", "x": "①-3）マネジメントエラーは指示の不明瞭・ルール違反・ルール不足に原因を求めましょう"}, {"t": "p", "x": "マネジメントで問題が起こった場合はまずは指示が不明瞭であることか、ルールがないことか、ルール違反が問題と考えましょう。個人のやる気や価値観や常識に原因を求めてはいけません。「普通こうでしょ」「常識で考えたらわかるでしょ」という考えはそもそも個人の価値観にゆだねているので、適切ではありません。"}, {"t": "p", "x": "指示が明瞭であるとは、何をいつまでにどのような状態にしていないといけないかが指示を受ける方とする側の認識にズレがない状態を指しています。いわゆる「完全結果」の状態(※⓪用語の定義3参照)。です。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）部下Ａが毎日行うべきパートナーの受け入れ業務を忘れてしまった。なぜ忘れてしまったのかを考えると、受け入れ業務の明確なルールがなかったことが原因だと考えられたので、〇時までに行っておくべき受け入れ業務のチェックリストを作成し、毎日担当者がチェックを行うことというルールを作成して、周知した。", "l": 0}, {"t": "b", "x": "２）業務指示は、部下側の認識が誤っていないか確認するようにしている。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）【指示の不明瞭】\u000b拠点長Aは、本日期限で書類作成を指示したのに、16時になっても提出されず焦っていた。部下Bに催促すると「残業して本日中に必ず完成させます」とのこと。結局この日は、本社に書類を持参できず、思惑が外れてしまった。", "l": 0}, {"t": "b", "x": "２）【ルールが無いことが問題だが、部下の価値観や常識に原因を求めた】\u000b「食材は○日経ったら廃棄する」というルールがないのに、上長の価値観で「○日経っているのになぜ捨てないのか。それぐらい自分で考えたらわかるでしょ。」と部下を責めた。", "l": 0}, {"t": "h2", "x": "①-4）ルール上問題なくても会社の不利益になることはしない。迷ったら確認しましょう"}, {"t": "p", "x": "ルールや評価制度にも欠陥があることがあります。もしかしたらその欠陥を利用することで個人の得点を最大化させることにつながることもあるかもしれません。ですが、そういった制度の欠陥をつくのではなく、会社のためにならないことはしないようにしてください。"}, {"t": "p", "x": "もし、欠陥があると思った場合や、これはおかしくないか、会社のためにならないのではないかと思ったら上申して判断を仰いでください。"}, {"t": "p", "x": "ルールで禁止されてないから何をしてもいい、というわけではありません。"}, {"t": "p", "x": "会社のためにならない行動をして短期的に評価されても、長期的には評価されないものです。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）評価項目を達成するために行動していたが、このまま進めては施設運営上よくないのではないか、と思う点が見えてきた。上長に相談し、判断を仰いだ。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）評価項目を達成するために行動していたが、このまま進めては施設運営上よくないのではないか、と思う点が見えてきた。でも、決められたことをやれば評価が上がることがわかっているのでそのまま進めた。", "l": 0}], "subsections": ["①-0）ルールとは", "①-1）納得してもらえなくても、ルールを守れている拠点を作りましょう", "①-2）ルール違反を黙認しないようにしましょう", "①-3）マネジメントエラーは指示の不明瞭・ルール違反・ルール不足に原因を求めましょう", "①-4）ルール上問題なくても会社の不利益になることはしない。迷ったら確認しましょう"], "text": "①-0）ルールとは まず、なぜルールが大切なのかを管理職が正しく理解するようにしましょう。 ルールが大切である理由として、「公平性の担保」があります。 例えば、シフトを守る、というルールがなかったとしたら、早く来て仕事しているメンバーを評価する、などが起こってしまうことがあるでしょう。また、例えば、会議の３分前に着席する、というルールがありますが、ぎりぎりの人とそうでない人がいた場合、会議の開始に支障が出てしまうこともあるでしょう。（早く来ている人が時間通りに会議が開始出来ず時間をロスしてしまうなど）ルールを全員が守ることで、メンバー全員が公平に仕事をすることができます。 また、ルールを守ることに理解や納得が必ずしも必要ないことについて、交通ルールを例として説明します。（※「⓪用語の定義」参照） 交通ルール（車が左側通行であること、赤信号が止まれであること）も、納得しようがしまいが守らないといけない。アメリカは右側通行だから私はそうすべきだと思う、という理屈は通らないのと同じことです。組織においてのルールも同様、そう決まっているからそれに対する理由の理解や納得は必要なく、守ってもらう以外ありません。そして、交通ルールは自分を守るためのルールでもあります。組織のルールも同じです。 ただし、上記や①-1）でも、ルールを守ってもらうことに部下の理解や納得は必要ない、とされていて、部下の納得は必須ではありませんが、納得して仕事に取り組むことができるならその方がベストです。納得できないという部下の声があるのであれば、納得できない点の解消につとめた方が良いでしょう。「納得できなくてもルールなので、従ってください」というのは最終手段、だと思っておきましょう。なぜこのルールができたのか、背景を説明できるのであれば説明し、部下の皆さんが納得してルールを守れるようにつとめましょう。 部下の皆さんにとっては、納得できなくても最終的に従わなければいけない、となる場合もありますが、上長に意見を伝えてはいけない、ということではありません。疑念があれば上長に伝えましょう。 ※メンバーシップマニュアル「2-4.疑念があったら上長に確認すること」参照 ①-1）納得してもらえなくても、ルールを守れている拠点を作りましょう ルールを守れている拠点を作ることは上長の役割です。 なぜこのルールがあるかを理解(※２)させることや納得(※１)させることは必須ではありませんが、部下の皆さんには疑念があれば解消していただいた方がいい、という点で理解や納得はしていただいた方がよいものです。「ルールが守られている状態にすること」が上長の役割であることを念頭において、部下の皆さんへルールを守るように伝えましょう。 納得という観点でいうと、部下側が腹落ちすることが必要なため、説得に時間を要したり、それぞれの考えとの違いをすり合わせないといけないなど、膨大な時間を要し、組織運営上弊害がある場合もあります。ですので、「ルールなので従ってください」という対応が必要となる場合もあります。部下の納得を得るために必要以上に説得やすり合わせをしてしまうと、以後部下側は全て納得を求めるようになってしまうこともあるので望ましくありません。 よくあるOK事例 １）部下が「このルールはなぜあるのか」という疑問を抱いたようだったので、簡単にルールが出来た背景を説明し、納得してもらった。 ２）シフト上の出勤時間に遅れた部下がいた。幸い業務上支障は無かったが、シフトを守るよう注意をした。 よくあるNG事例 １）部下から「なぜこのようなルールがあるのでしょうか。」と聞かれたので、「いいからルールなので守ってください」と言った。 ２）部下から、「このルールは納得できませんので、守れません」と言われた。拠点長は説得のために毎日面談を繰り返し、膨大な時間を費やした。 ①-2）ルール違反を黙認しないようにしましょう 上長は部下にルールを守らせることが、仕事です。たとえ軽微なルール違反だとしても、それを黙認してはいけません。 黙認することで、部下の皆さんは「守らなくてよいルールもある」と思ってしまうことに繋がります。ルールを守っている人が損をする風土になり、不満につながってしまうこともあります。ルールを守らない方が得をする、という考えになってしまうこともあり、結果、ルールを守れない組織ができあがってしまうでしょう。 よくあるOK事例 １）部下が時計を付けて支援に入ろうとしていたので、身だしなみのルールでは時計を付けてはいけない、と指摘して外してもらった。 ２）部下Ａが仲の良い部下Ｂに対し、「〇〇ちゃん」と呼んでいるのを見た。うっかり言ってしまったのだろうと思ったが、コミュニケーション基本ルールを守るように注意をした。 よくあるNG事例 １）部下Aが業務中に「おまえさー」と、ふざけた感じで部下Bと話していた。 拠点長Cは「おまえ」はコミュニケーション基本ルールで、使ってはいけない言葉として記載されていることは知っていたが、楽しそうに会話をしているので、黙認した。 ２）部下Aが勤務時間外に喫煙している姿を目撃した。部下Aは部署のエース的存在で必要不可欠なメンバーなので、波風を立てたくないこともあり、ルール違反を黙認した。 ３）先月に新ルールが制定された。拠点長Aはこのルールに納得していなかったこともあり、部下のルール違反があったが黙認した。 ①-3）マネジメントエラーは指示の不明瞭・ルール違反・ルール不足に原因を求めましょう マネジメントで問題が起こった場合はまずは指示が不明瞭であることか、ルールがないことか、ルール違反が問題と考えましょう。個人のやる気や価値観や常識に原因を求めてはいけません。「普通こうでしょ」「常識で考えたらわかるでしょ」という考えはそもそも個人の価値観にゆだねているので、適切ではありません。 指示が明瞭であるとは、何をいつまでにどのような状態にしていないといけないかが指示を受ける方とする側の認識にズレがない状態を指しています。いわゆる「完全結果」の状態(※⓪用語の定義3参照)。です。 よくあるOK事例 １）部下Ａが毎日行うべきパートナーの受け入れ業務を忘れてしまった。なぜ忘れてしまったのかを考えると、受け入れ業務の明確なルールがなかったことが原因だと考えられたので、〇時までに行っておくべき受け入れ業務のチェックリストを作成し、毎日担当者がチェックを行うことというルールを作成して、周知した。 ２）業務指示は、部下側の認識が誤っていないか確認するようにしている。 よくあるNG事例 １）【指示の不明瞭】 拠点長Aは、本日期限で書類作成を指示したのに、16時になっても提出されず焦っていた。部下Bに催促すると「残業して本日中に必ず完成させます」とのこと。結局この日は、本社に書類を持参できず、思惑が外れてしまった。 ２）【ルールが無いことが問題だが、部下の価値観や常識に原因を求めた】 「食材は○日経ったら廃棄する」というルールがないのに、上長の価値観で「○日経っているのになぜ捨てないのか。それぐらい自分で考えたらわかるでしょ。」と部下を責めた。 ①-4）ルール上問題なくても会社の不利益になることはしない。迷ったら確認しましょう ルールや評価制度にも欠陥があることがあります。もしかしたらその欠陥を利用することで個人の得点を最大化させることにつながることもあるかもしれません。ですが、そういった制度の欠陥をつくのではなく、会社のためにならないことはしないようにしてください。 もし、欠陥があると思った場合や、これはおかしくないか、会社のためにならないのではないかと思ったら上申して判断を仰いでください。 ルールで禁止されてないから何をしてもいい、というわけではありません。 会社のためにならない行動をして短期的に評価されても、長期的には評価されないものです。 よくあるOK事例 １）評価項目を達成するために行動していたが、このまま進めては施設運営上よくないのではないか、と思う点が見えてきた。上長に相談し、判断を仰いだ。 よくあるNG事例 １）評価項目を達成するために行動していたが、このまま進めては施設運営上よくないのではないか、と思う点が見えてきた。でも、決められたことをやれば評価が上がることがわかっているのでそのまま進めた。"}, {"title": "②組織の運営", "blocks": [{"t": "h2", "x": "②-1）上長は部下よりもフォアザチームでなければいけません"}, {"t": "p", "x": "上長は、部下の誰よりもチームのことを第一に考える、高い献身性をもっていないといけません。ましてや、上長が保身に走ったり、自身の評価ばかり気にしている、チームより自分を優先しているなどということはあってはならないことです。"}, {"t": "p", "x": "部下の皆さんの方がチームのことを考えている、というような状態では、部下の皆さんからの信頼を得ることはできないことでしょう。"}, {"t": "h2", "x": "②-2）部下の「信頼」を失うことをしてはいけません"}, {"t": "p", "x": "指示やルール設定など、マネージャーとしてやることはいろいろありますが、それは「信頼関係」の上に成り立つものです。部下は、上長の決定には従わないといけないものではありますが、信頼関係が築けていない状態ではうまく機能しません。"}, {"t": "p", "x": "ルールを守る、約束を守る、部下の話を聞く、感情的に怒らない、仕事に手を抜かない、自己保身に走らない、などが、部下との信頼関係構築にとって重要なことです。ただし、マネジメントは「信頼関係」の上に成り立つものではありますが、信頼はがんばって獲得しにいくのではなく、上記のような「信頼を失うような行動」をしない、「エフィラウェイに沿った行動」をとりつづけることで自然についてくるものです。"}, {"t": "h2", "x": "②-3）部下は自分のコマや道具ではありません"}, {"t": "p", "x": "部下は、自分の目標を達成させるためのコマではありません。"}, {"t": "p", "x": "チームとしてうまくいくために、自分（上長）が存在しているのであって、上長個人のためにチームが存在しているわけではありません。"}, {"t": "p", "x": "部下を利用して自分の評価を高めたり、チームに関係のない個人的なことを部下にやらせたり、ということはしてはいけません。"}, {"t": "h2", "x": "②-4）指示をそのまま流す「伝書鳩」にならず、組織の結節点として機能しましょう"}, {"t": "p", "x": "マネジャーは、経営・本部と現場をつなぐ重要な「結節点」です。 会社の方針や決定事項を部下に伝える際、「上が決めたから」とそのまま流す「伝書鳩」になってはいけません。なぜその決定に至ったのか（大義・目的）を自分の言葉に「翻訳」して伝え、部下が疑念を持たずに実行できる状態に導く責任があります（※②-5も参照）。"}, {"t": "p", "x": "同時に、部下からの情報を上長や本部へ報告する際は、部下の不満をそのまま伝えるのではなく、「事実」と「解釈」を分けて建設的な情報として「連結」し、経営判断の精度を高める役割を果たしましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）提出物について本社からアナウンスがあったので、「〇〇を〇月〇日〇時までに提出してください」と拠点のメンバーに伝えた。", "l": 0}, {"t": "b", "x": "２）ブロック長から業務指示がきたので、担当を割り振り、期限を決めて、なぜこの業務が必要なのか、という背景と共にメンバーへ指示をした。", "l": 0}, {"t": "b", "x": "３）部下Aさんから上がった質問が自分で判断ができない内容だった。Aさんに対して、「持ち帰って検討します。決定したら伝えます」と伝えた。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）拠点長Aは送迎時の新ルールを部下に周知する際に「上が決めたルールなのでお願いします」と伝えた。部下の不平不満を避けるため、言外に「自分が決めた訳じゃない」という意思を示した。", "l": 0}, {"t": "b", "x": "２）本部からの連絡に対して、「自分もよくわからないけど、本部が決めたことだからとりあえずやっておいて」と、自分の責任を放棄してそのまま部下に伝えてしまった。", "l": 0}, {"t": "b", "x": "３）部下からの「このやり方はパートナーから不評です」という不満（解釈）を、事実確認をせずにそのまま「パートナーから不評が出ている」として本部に報告してしまった。", "l": 0}, {"t": "h2", "x": "②-5）部下との会話で上長を出さないようにしましょう"}, {"t": "p", "x": "「上長が言ってたからやってほしい」「会社で決まったから申し訳ないけどお願い」など、自分が決めたわけではない、自分は関係ない＝自分の責任ではないと感じさせる部下への伝え方（虎の威を借る狐）をしてはいけません。また、会話の中で上長を出すだけでどうしても意図せず、”虎の威を借る狐”になることがあります。そのため、話の中では上長やその上の上長を出さないようにしましょう。(”上長のことは一切出さない”くらいの気持ちでやる、がちょうどいい)\u000b\u000bなぜなら、自分事ではない伝え方をしてしまうと、部下は上長を上長として見なくなり、組織が機能しなくなってしまうからです。\u000bこうなる背景には「部下に嫌われたくない」「自分は関係ない」、という意識があるのだと思いますが、責任意識のない上長だと結局、組織としては機能しなくなってしまいます。\u000b上長が決めたことであっても、自分もその決定者の中の一人として発言しましょう。"}, {"t": "p", "x": "※自分ではわからないことが発生した場合は、『検討して連絡する』というニュアンスで説明すること。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）提出物について本社からアナウンスがあったので、「〇〇を〇月〇日〇時までに提出してください」と拠点のメンバーに伝えた。", "l": 0}, {"t": "b", "x": "２）ブロック長から業務指示がきたので、担当を割り振り、期限を決めて、なぜこの業務が必要なのか、という背景と共にメンバーへ指示をした。", "l": 0}, {"t": "b", "x": "３）部下Aさんから上がった質問が自分で判断ができない内容だった。Aさんに対して、「持ち帰って検討します。決定したら伝えます」と伝えた。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）拠点長Aは送迎時の新ルールを部下に周知する際に「上が決めたルールなのでお願いします」と伝えた。部下の不平不満を避けるため、言外に「自分が決めた訳じゃない」という意思を示した。", "l": 0}, {"t": "b", "x": "２）拠点長Aが部下に対して、２日前倒しでの支援計画書作成指示を出すことになった。部下に好かれる上長を目指しているAは「私は別に急いでないけど、ブロック長のCさんが早く確認したがっててね」と付け加えた。", "l": 0}, {"t": "b", "x": "３）拠点長が「ブロック長から指示がきたので転送します」という一文だけ加え、ブロック長から自分宛に来たメールをそのまま部下に転送した。", "l": 0}, {"t": "b", "x": "４）部下Aさんから上がった質問が自分で判断ができない内容だった。Aさんに対して、「ブロック長のBさんに確認します」と伝えた。", "l": 0}, {"t": "h2", "x": "②-6）他部署のメンバーの問題に介入しすぎない/指示をしないようにしましょう"}, {"t": "p", "x": "ここでいう介入とは意見をいう、アドバイスをする、指示する、同調してあげることも含みます。本来、部署内での問題は、その部署で解決すべきです。"}, {"t": "p", "x": "他部署の上の立場の人に相談するメンバーは、自分の正当性を誰かに認めてほしい、という気持ちがあるかもしれません。"}, {"t": "p", "x": "また、相談にのってしまう上の立場の人は、より多くのメンバーから気に入られたいという心理が働いていることもあるかもしれません。相談にのる上長はその部下へのアドバイスに関して責任のない立場にいるので、ただ頼られている、気に入られることができる気持ちがいい立ち位置となってしまっています。また、上位層に言われると、他部署の人であっても正しいこと、指示であると必要以上に思ってしまう可能性があります。"}, {"t": "p", "x": "他部署のメンバーから相談に乗ってしまうと、結果として該当メンバーはより部署内への不満を高めるだけであり、何も問題が解決されない、という状態になってしまいます。"}, {"t": "p", "x": "むしろ自部署内でマイナスな感情を増幅させてしまい、本質的な解決にはなりません。"}, {"t": "p", "x": "以上から、他部署のメンバーから相談された場合は、直属の上長に相談するように促しましょう。"}, {"t": "p", "x": "（ただし、セクハラ/パワハラ/不正/明らかなルール違反の場合は、例外です。その際は事実情報を聞き取って、職場相談窓口などの社内窓口に通報しましょう。）"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）他拠点のメンバーから自拠点の運営方法について相談を受けたが、アドバイスはせず、自拠点の拠点長に相談してみたらどうか、と促した。", "l": 0}, {"t": "b", "x": "２）他部署のメンバーが相談してきたので話を聞いたところ、上長からのパワハラを受けているようだった。事実を聞き取り、相談窓口に報告をした。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）拠点長Aは、以前部下だった他拠点メンバーBから、送迎スケジュール作成の仕方についてアドバイスを求められたので、快く応じて自拠点のやり方を伝授した。", "l": 0}, {"t": "b", "x": "２）拠点長Cは、ヘルプで来ていた他拠点メンバーDがパートナー見守り時に声掛けが少なく不安を感じたので、「所属拠点に帰ってからは、もう少しパートナーと会話を多くするようにしてみてください」とアドバイスした。", "l": 0}, {"t": "b", "x": "３）拠点長Eは、顔なじみの他拠点メンバーFから、かなり深刻な様子で「相談したいことがあるのですが」と言われたが、他拠点メンバーの相談には乗ってはいけないと思い、何も聞かずに「直属の上長に相談してください」といった。\u000b（セクハラ等の基本ルール違反の場合があるので、要件だけでも聞くべきであった）", "l": 0}, {"t": "h2", "x": "②-7）意見を聞きましょう(ボトムダウン)"}, {"t": "p", "x": "ボトムダウンとは、ボトムアップでもトップダウンでもない、エフィラグループのマネジメントを表現した造語です。"}, {"t": "p", "x": "ポリシーや②-6）にもあるとおり、組織運営はメンバーからの情報や意見を聞いたうえで、その組織の責任者が決定し責任をとる、という流れを基本としています。"}, {"t": "p", "x": "（メンバーから聴き取った情報を元に、責任者が決定をするという流れからボトムダウンと呼んでいます）"}, {"t": "p", "x": "【参考】"}, {"t": "p", "x": "ボトムアップ：部下の意見を中心に合議などで決定していく完全なボトムアップのマネジメントは、誰も責任を取らない無責任な決定になる、全員に配慮した中途半端な決定になる、などの弊害が起こりやすい。"}, {"t": "p", "x": "トップダウン：部下の意見を聞かず、組織の責任者が独断で指示をしていくトップダウンのマネジメントは、組織の実情にそぐわない独りよがりな決定になる可能性が高い。"}, {"t": "p", "x": "【注意する点】"}, {"t": "p", "x": "ボトムダウンの目的は、上長が最善の意思決定をすることにあり、部下の「役に立ちたい感」をあげることではありません。最善の意思決定をする責任が上長にあり、そのために部下からの情報収集を行うことがボトムダウンの本質です。やろうとしている施策を実行するとどう感じるか、どう思うのか、現場目線で起きていること、などの上長側がもっていない事実情報や思いもしなかったアイデアを集めること。それを組織の意思決定に活かし、精度の高い判断につなげましょう。"}, {"t": "p", "x": "仮に、「自分も決定に関わっている」と感じてもらう（参画意識を持たせる）ことを目的にしてボトムダウンをおこなってしまうと、「部下が納得する案」や「部下が喜ぶ案」を採用しようとする、部下の意見を順番に採用してあげようとする、などのバイアスがかかってしまいます。それだと本来の組織にとっての最善の判断と異なる判断をしてしまうことにつながります。あくまでも上長は、折衷案をとる必要はなく、部下からの意見や情報収集を行った上で、その集めた意見や情報と全く異なる意思決定をすることもあり得るものです。"}, {"t": "p", "x": "そして、ボトムダウンは『役に立ちたい感』を目的にはしていないのですが、結果的に役に立ちたい感があがる、というのが正しい流れです。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）新しいイベントの企画について、拠点の会議で部下から意見を聞いた。どれも良い案ではあったが、拠点の目標達成の観点で考えると、どの意見もまだ不足があると判断した。そのため、部下の案は採用せず、部下から得た情報やヒントをもとに、全く異なるイベントを行うことにした。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）会議で新しい拠点ルールについて意見を募った際、せっかく部下が意見を出してくれたのだから「自分も決定に関わっている」と感じてもらおう（役に立ちたい感を高めよう）と考え、部下が一番喜びそうな案をそのまま採用した。", "l": 0}, {"t": "b", "x": "２）業務効率化について拠点内で話し合っている際、部下AさんとBさんから異なる意見が出た。どちらかの意見だけを採用すると角が立つと思い、双方の意見を無難にまとめた「折衷案」を提案し採用した。結果として、拠点にとって最善の判断とは言えない結論になってしまった。", "l": 0}, {"t": "b", "x": "３）メンバーの参画意識を持たせることを目的に、毎月のレクリエーション企画を部下の意見から順番に採用してあげている", "l": 0}, {"t": "h2", "x": "②-8）上長が責任をとりましょう"}, {"t": "p", "x": "●責任者に責任がある"}, {"t": "p", "x": "組織で何かを決定する場合、その責任は責任をもつ者（上長）にあります。その代わりに決定する権限も上長が持っています。"}, {"t": "p", "x": "みんなで話し合って何か物事を決定したとしても、その上長から責任が無くなることはありません。ですので、「みんなで決めたことだからちゃんとやるべきだ！」「みんなで決めたからみんなの責任だ」という理屈は成り立ちません。上長がその決定について責任を持たなくてはなりません。みんなで決めたことであっても、決定事項は全て責任者の責任ということです。"}, {"t": "p", "x": "また、「責任をとるのが上長である」というだけであり、偉くなったわけではありません。責任者は「決めたんだから従え」と横柄になってはいけません。"}, {"t": "p", "x": "●意見を聞く"}, {"t": "p", "x": "ただし、この場合、部下からの意見を聞くべきではない、ということではなく、部下からの意見は聞いて構いません。むしろ情報を集めて、より正解に近い判断（決定）をするために、必要なことであり進んでやってください。"}, {"t": "p", "x": "正しい判断をする上で会議などを行い、必要な意見を聞いたり情報収集をすることや、事実情報を確認することは必要なことです。誰にも意見を聞かずに、独断で決めることも時には必要かもしれませんが、いずれの場合でも、責任をとるのは上長です。"}, {"t": "p", "x": "部下の皆さんにおいては、上長が物事を決定するに当たって必要な情報や意見を伝えるようにしましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）近日中に実施するイベントの内容について、会議の中で、部下から意見を募った。その意見の中から、１つを選んで、実施することを決めた。", "l": 0}, {"t": "b", "x": "２）自拠点のルールについて、決定するために事実情報が足りないと感じたので、部下から事実情報を聞き取り、ルール設定を行った。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）安全な服薬のフローをみんなで話し合って、最終的にみんなが納得した内容に決めた。後日、服薬ミスがあったが「みんなで決めたフローでミスが起きたのだから○○さんだけが悪いわけではない」と、責任の所在が曖昧になった。", "l": 0}, {"t": "b", "x": "２）拠点長Aが部下数名に対して「パートナーBさんにはどんなリハビリが必要でしょうか」と尋ねた。さまざま意見が出てきて迷ったAは多数決で方針を決めた。", "l": 0}, {"t": "b", "x": "３）職員数名で今日の連絡帳を誰が作成するかを話し合った。一人に負担させるのは気が引けるので「みんなで分担してやりましょう」と曖昧に決まった。その後、作成漏れが発覚したが、誰も気づかなかったのだし仕方ないと思った。", "l": 0}, {"t": "h2", "x": "②-9）仕事を任せる（権限を与える）ときは目標と範囲・成果（責任）とともに設定しましょう"}, {"t": "p", "x": "今任せている仕事以外（今の役割を超える仕事）（権限）のことを任せるときは、目標と範囲・成果（責任）を設定しましょう。"}, {"t": "p", "x": "任せたものの求める成果と、使える資源、行動を明確にし、権限の制約がある場合も伝えておきましょう。"}, {"t": "p", "x": "任せる（権限だけを与える）ことだけをしてしまうと、その業務について、責任が無くなってしまいます。免責を回避するために、目標と権限の範囲、成果（責任）を合わせて設定しましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）部下にパートナーの見学対応を任せることにした。お見せする資料やお伝えすることを明確に指示し、ご利用開始の同意をいただくことを目標として設定した。通常のサービス利用の範囲を超えるイレギュラーなご相談があった場合のみ、自己判断せず、上長に確認を仰ぐ対応をするように指示をした。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）職員Aは備品管理を担当していて、拠点長から自由に買ってきていいと権限を与えられている。ただし、いくら以内に収めるなどの責任は課されていない。結果、必要以上に大量の備品を購入してしまった。ただ、それでも責任がないので、責任追求はできない。", "l": 0}, {"t": "b", "x": "２）「あとの責任は俺が全部取るから好きにやっていいよ」という上長の発言（責任のない行動をさせてしまう）", "l": 0}, {"t": "b", "x": "３）拠点長Aは新規パートナーを増やしたいと思い、部下Bに対して、毎週10時間外回り営業をする権限を与えた。だが、需要見込みが立たないため、特に目標人数（責任）は定めなかった。部下Ｂは「とにかく10時間外回りすること」にこだわり、チラシ配布程度の営業活動しかしなかったため、新規パートナーは現れなかった。", "l": 0}, {"t": "h2", "x": "②-10）「部下に任せた」「他部署に依頼しているは禁句」"}, {"t": "p", "x": "今任せられている仕事について上長から尋ねられた時、「部下に任せています」「〇〇部署に依頼しています」とは答えないようにしましょう。"}, {"t": "p", "x": "なぜなら、誰に任せている(依頼している)かどうかは上長には関係のないことで、上長から見たら、自分に任せている仕事であって、自分が責任をもって完了させる必要があるものです。大事なのは誰に任せているかどうか、ではなく、それが結果として完了させられるのかどうか、です。自分が任された仕事であれば、その結果は自分に責任があります。"}, {"t": "p", "x": "「部下に任せています」「〇〇部署に依頼しています」という言葉は、自身の責任が外れている言葉です。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）上長から、自身が任された仕事について、「〇〇は予定どおり〇日までに完了させられますか。」と聞かれた。その仕事を任せているメンバーAに進捗を確認し、「〇日までに完了予定です。」と答えた。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）上長から、自身が任された仕事について、「〇〇は予定どおり〇日までに完了させられますか。」と聞かれた。「メンバーAに任せています」と答えた。", "l": 0}, {"t": "h2", "x": "②-11）上長と部下の関係において「好き・嫌い」を表に出さない（距離を取る）ようにしましょう"}, {"t": "p", "x": "マネジメントをする上で、嫌われることを恐れていてはできないものではあるが、嫌われるというのは距離が近いから起こることです。"}, {"t": "p", "x": "距離が近くなければ、嫌われるというよりも相手にとって好きでも嫌いでもない無の状態でいられるのがベストです。"}, {"t": "p", "x": "部下から好き嫌いという感情を持たれているのは、距離が近い証拠であり、マネジメントとしては望ましくない状態です。上長側からの好き嫌いの感情も同じです。"}, {"t": "p", "x": "公平性を担保したマネジメントを行うために、上長は部下と距離をとりましょう。また、好き嫌いの感情を抱いてしまったとしても、表に出さないようにしましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）考え方や価値観が合わないメンバーがいるが、業務には関係のないことなので、淡々と他のメンバーと変わらず接している。", "l": 0}, {"t": "b", "x": "２）業務を快くやってくれる感じの良いメンバーがいるが、他のメンバーと変わらず業務を割り振るように意識している。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）部下から親しまれる上長を目指そうと思い、送迎後のすきま時間を利用して、プライベートの情報交換を頻繁に行っている。", "l": 0}, {"t": "b", "x": "２）部下から嫌われないように、ただ一方的に指示をするのではなく、部下の仕事をできるだけ手伝うようにしている。", "l": 0}, {"t": "b", "x": "３）部下に面倒な業務を指示したところ、嫌そうな顔をされてしまった。部下に嫌われたら仕事がしづらくなると思い、一緒に飲みにいって奢ることにした。", "l": 0}, {"t": "img", "src": "images/image9.png", "w": 181, "h": 123}, {"t": "h2", "x": "②-12）１つ飛ばしの指示は、しないようにしましょう"}, {"t": "p", "x": "１つ飛ばしとは「メンバー：A」「上長：B」\u000b「上長の上長：C」とした場合、\u000bCからAに直接指示をすることである。"}, {"t": "p", "x": "Cが１つ飛ばしでの指示をすることにより、Aは上長が2人いると錯覚し、更には、BではなくCの指示を仰ぐようになってしまうことが予想されます。これにより、Bによる指示が通らなくなってしまうことがあります。"}, {"t": "p", "x": "よって、１つ飛ばしの指示は組織運営上の問題を起こしてしまうため、してはいけません。"}, {"t": "p", "x": "なお、１つ飛ばしのコミュニケーションについては、デメリットが大きいため、望ましくありません。ただし、離職回避や情報収集の必要性など、特殊な事情がある場合はデメリットはあるものの、メリットが上回る場合は実施することもあってよいです。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）拠点にブロック長が来ており、職員Aがイベント遂行についての指示を仰いだが、ブロック長は拠点長に確認するように伝えた。", "l": 0}, {"t": "b", "x": "２）A拠点の職員Bは、拠点長Cとの関係性に悩み、離職を考えていた。そのことを知ったブロック長Dは、職員Bとの面談を設定した。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）ブロック長Ｃは拠点長Ｂとの営業進捗確認をするため拠点を訪問したが、拠点長Bの到着が遅れているようなので、事務室で待つことにした。\u000bCは事務室の中が整理整頓されておらず気になったので、部下の部下であるメンバーAに「整理整頓するように」と、Ｂを介さずに直接指示をした。", "l": 0}, {"t": "b", "x": "２）ブロック長Cは、メンバーAが離職する意思があることを、拠点長Bから報告を受けていた。\u000bCは、「１つ飛ばしはあまり推奨されていないし、自分がAと話しても無駄だ」と決めつけて、面談等の検討を一切しなかった。\u000b（CはAとの面談機会を設ける等、離職回避するための行動を検討すべきであった）", "l": 0}, {"t": "h2", "x": "②-13）別拠点（別部署）のメンバーの相談にのることは弊害があるものと心しておきましょう"}, {"t": "p", "x": "②-10）にもあるとおり、１つ飛ばしのコミュニケーションにはデメリットがありますが、同様、別拠点（別部署）のメンバーの相談にのったりアドバイスすることはデメリットがあるため、望ましくありません。※相談には話を聞くだけのものも含みます。"}, {"t": "p", "x": "別拠点（別部署）に起こったことの責任は、別拠点（別部署）の拠点長（部長・課長）にあります。別拠点（別部署）のメンバーの相談にのる、ということは、その上長は、より多くのメンバーから気に入られたい、頼られたい、という心理が働いていることもあるかもしれません。また、相談にのっている上長は、良かれと思って、自身の責任範囲外の口障りのいい言葉を言ってしまうこともあるでしょう。"}, {"t": "p", "x": "別拠点（別部署）のメンバーの相談にのる上長は、別拠点（別部署）のメンバーへのアドバイスに関して責任のない立場にいるので、ただ頼られている、気に入られることができる気持ちがいい立ち位置となってしまっています。また、役職が上位の人に何か言われると、そのメンバーは、別拠点（別部署）の人であっても正しいこと、指示であると必要以上に思ってしまう可能性があります。結果として、別拠点（別部署）のメンバーからの相談に乗ってしまうと、相談したメンバーはより別拠点（別部署）への不満を高めるだけであり、何も問題が解決されない、という状態になってしまいます。"}, {"t": "p", "x": "ただし、 ②-10）と同様、離職回避や情報収集の必要性など、特殊な事情がある場合はデメリットがあると心した上で、それでもメリットが上回る場合は実施することもあってよいです。その場合は、相談をしているメンバーとその上長との関係性をくずさないように配慮しましょう。（その相談者の上長を否定したりしないように、基本スタンスは、その上長の味方をする姿勢でいましょう。）"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）A拠点の拠点長Ｂに対して、Ｃ拠点からヘルプに来たＤが、自拠点のイベント遂行についての相談をしたが、Ｃ拠点の拠点長に相談するように伝えた。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）拠点長Ｃは拠点長Ｂと備品の受け渡しをするためＢの所属する拠点を訪問したが、拠点長Bの到着が遅れているようなので、事務室で待つことにした。\u000bCは事務室の中が整理整頓されておらず気になったので、Ｂの部下であるメンバーAに「整理整頓したほうがいいですよ」と、Ｂを介さずにアドバイスした。", "l": 0}, {"t": "b", "x": "２）拠点長Cは、ヘルプに来た他拠点メンバーAが離職する意思があることを、たまたま本人から聞いた。自拠点の拠点長Bには言えていないということだった。\u000bCは、「他拠点メンバーの相談を受けるのは良くないし、自分がAと話しても無駄だ」と決めつけて、何もしなかった。\u000b（CはAから情報収集してBに伝える等、離職回避するための行動を検討すべきだった）", "l": 0}, {"t": "h2", "x": "②-14）すべての業務に担当を決めましょう"}, {"t": "p", "x": "●「気づいた人がやる」の問題点"}, {"t": "p", "x": "担当を決めずに「気づいた人がやる」をアリにしてしまうと、いくつもの弊害があります。"}, {"t": "p", "x": "１：責任が曖昧になり、業務の抜け漏れが発生してしまいます。いつもやってくれていた人が退職したときにやられない仕事が発生する可能性もあります。"}, {"t": "p", "x": "２：気づく人はいつも気づき、気づかない人はいつも気づかないため、業務量に偏りができてしまい、メンバーの不満につながります。気づいた人が損してしまうことになってしまうのです。"}, {"t": "p", "x": "３：組織内で「気づいてやることは良いことだ」という文化になってしまう可能性があり、そうなると、メンバーが気づいて勝手に業務を生み出す懸念があります。結果的に、上長が不要と考える余計な業務も生まれてしまう可能性があります。"}, {"t": "p", "x": "４ ：気づいてやってくれている人は「やってあげている感覚」になってしまうことがあります。しっかりできていなくても自分はやってあげているだけなので仕方ない、という発想になってしまうリスクがあります。よって、気づいた人がやる仕事は無責任になってしまう可能性があります。"}, {"t": "p", "x": "上記の弊害をなくすために、すべての業務に担当を決めることで公平な役割分担がなされ、人による業務の偏りが発生しなくなります。"}, {"t": "p", "x": "また、”拠点長が把握していない業務”が存在する可能性もあるため、まず拠点長は、「すべての業務を洗い出す」ことから始めましょう。"}, {"t": "p", "x": "●「気づくこと」はいいこと"}, {"t": "p", "x": "「気づいた人がやる」は良くありませんが、「気づく」ことは良いことです。なにか改善すべきことややるべき仕事に不随する、担当のあいまいな業務に気づいたら上長に報告し、担当を決めてもらいましょう。よりよい組織、成果のあがる組織になることができるでしょう。上長も、部下が「気づいた」ことに対して、必要な業務かどうかを判断し、実施する業務については公平な役割分担を決めましょう。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）送迎車の窓が汚れがちで危険だということに気づいたメンバーが、拠点長に報告をしてくれた。毎日の業務として設定していなかった業務だったので、当番を決めて清掃を実施することとした。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）日中業務として「トイレ掃除」があるが、パートナー対応のあいまを見て手が空いたメンバーが行うやり方で今まで問題なく運営出来ているため、今後も同じような運営を継続する。", "l": 0}, {"t": "b", "x": "２）役割分担をして業務の偏りなく運営出来ているつもりだったが、先日退職したメンバーの退職理由をきいたところ、「誰もやらない仕事をいつも自分が引き取っていて、業務負担が大きいためこれ以上続けられなくなった」という内容だった。\u000b（分担できていない業務を知らず知らずのうちにひとりに負わせていたようだ。）", "l": 0}, {"t": "b", "x": "３）なるべく気づいた人にやってもらう方針で運営していたところ、あるメンバーが毎日拠点の窓ふきの清掃をしていることが発覚した。\u000b上長としては週に１回くらいの清掃で問題ないと考えていたため、窓ふきをするのであれば、このメンバーには他の業務をやってほしかった。", "l": 0}, {"t": "h2", "x": "②-15）客観的に、根拠を確かめた上で判断をしましょう"}, {"t": "p", "x": "部下からの意見を聞いた場合、上長としては、主張が大きい人の意見を盲目的に聞き入れるのではなく、根拠（具体的な事実情報や、会社の方針、複数人からの情報収集）を吟味した上で冷静に判断しましょう。主張が大きい人の意見が最適な判断だとは限らないためです。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）とあるパートナーの支援の方法について、ベテラン職員から方針を変えた方がいいという意見があった。そのパートナーに関わる他の支援メンバーの意見や普段の過ごし方についての事実情報を聞き、拠点長が客観的に支援方法を決定した。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）仕事ができる部下から、以下の主張があった。\u000b\u000b「あるパートナーさんから、拠点内に掲示されているポスターの位置がわかりづらくてよくないので、位置を変えた方が良いと言われた。私もそう思うし、他のパートナーの多くがそう思っていると思う。この頃、利用終了して他の事業所に移っている方が出てきているのも、小さいことの積み重ねで起こっているはずなので、ポスターの位置を変えることがとても重要だと思う。」\u000b\u000bこの部下のことは信頼しているし、今回の主張に熱意を感じたので、他の仕事を後回しにして、最優先で対応するように動いた。", "l": 0}, {"t": "h2", "x": "②-16）曖昧（あいまい）な表現をつかわないようにしましょう"}, {"t": "p", "x": "以下に挙げた言葉、またはそれに関連する言葉について、社内でのコミュニケーション（文書・口頭いずれも）において使用をしないようにしましょう。曖昧（あいまい）な表現を使用することで、双方の認識のずれが生じてしまうことがあるためです。"}, {"t": "p", "x": "【あいまいな言葉の例】"}, {"t": "p", "x": "「気をつける・強化する」「尽力する・頑張る・努める」「なるべく・できるだけ・基本的に・極力」「控える・配慮する」「早急・至急・すぐに」「徹底する」「協力して・連携して」"}, {"t": "p", "x": "※「徹底」については「徹底の四則」やエフィラウェイの「徹底的に徹底」を意味するのであれば使用しても問題ありません。"}, {"t": "p", "x": "※「連携して」「協力して」「話し合って」「相談しながら」「気づいた人が」などの言葉を用いた、部下への曖昧な指示をしてはいけません。（担当者があいまいで、誰に実行責任があるかが明確ではない）複数のメンバーに指示をする場合であっても、実行責任者を明確にして任せましょう。【②-7参照】"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）部下に対して、パートナーとの面談前に作成してほしい資料があったため、面談に間に合うよう「〇月〇日の〇時までに作成をお願いします。」と指示をした。", "l": 0}, {"t": "b", "x": "２）事業所内事故が起きてしまったので、再発防止策を拠点内で話し合い「見守りの際に自身の担当の場所を離れる際には必ず周囲のメンバーに声をかける」という再発防止策を全員に周知した。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）部下に対して、パートナーとの面談前に作成してほしい資料があったため、「なるべく早めに作成お願いします」と伝えたところ、面談までに資料が間に合わなかった。", "l": 0}, {"t": "b", "x": "２）事業所内事故が起きてしまったので、「みんなで協力して気を付けていきましょう」と事業所内会議で伝えた。", "l": 0}], "subsections": ["②-1）上長は部下よりもフォアザチームでなければいけません", "②-2）部下の「信頼」を失うことをしてはいけません", "②-3）部下は自分のコマや道具ではありません", "②-4）指示をそのまま流す「伝書鳩」にならず、組織の結節点として機能しましょう", "②-5）部下との会話で上長を出さないようにしましょう", "②-6）他部署のメンバーの問題に介入しすぎない/指示をしないようにしましょう", "②-7）意見を聞きましょう(ボトムダウン)", "②-8）上長が責任をとりましょう", "②-9）仕事を任せる（権限を与える）ときは目標と範囲・成果（責任）とともに設定しましょう", "②-10）「部下に任せた」「他部署に依頼しているは禁句」", "②-11）上長と部下の関係において「好き・嫌い」を表に出さない（距離を取る）ようにしましょう", "②-12）１つ飛ばしの指示は、しないようにしましょう", "②-13）別拠点（別部署）のメンバーの相談にのることは弊害があるものと心しておきましょう", "②-14）すべての業務に担当を決めましょう", "②-15）客観的に、根拠を確かめた上で判断をしましょう", "②-16）曖昧（あいまい）な表現をつかわないようにしましょう"], "text": "②-1）上長は部下よりもフォアザチームでなければいけません 上長は、部下の誰よりもチームのことを第一に考える、高い献身性をもっていないといけません。ましてや、上長が保身に走ったり、自身の評価ばかり気にしている、チームより自分を優先しているなどということはあってはならないことです。 部下の皆さんの方がチームのことを考えている、というような状態では、部下の皆さんからの信頼を得ることはできないことでしょう。 ②-2）部下の「信頼」を失うことをしてはいけません 指示やルール設定など、マネージャーとしてやることはいろいろありますが、それは「信頼関係」の上に成り立つものです。部下は、上長の決定には従わないといけないものではありますが、信頼関係が築けていない状態ではうまく機能しません。 ルールを守る、約束を守る、部下の話を聞く、感情的に怒らない、仕事に手を抜かない、自己保身に走らない、などが、部下との信頼関係構築にとって重要なことです。ただし、マネジメントは「信頼関係」の上に成り立つものではありますが、信頼はがんばって獲得しにいくのではなく、上記のような「信頼を失うような行動」をしない、「エフィラウェイに沿った行動」をとりつづけることで自然についてくるものです。 ②-3）部下は自分のコマや道具ではありません 部下は、自分の目標を達成させるためのコマではありません。 チームとしてうまくいくために、自分（上長）が存在しているのであって、上長個人のためにチームが存在しているわけではありません。 部下を利用して自分の評価を高めたり、チームに関係のない個人的なことを部下にやらせたり、ということはしてはいけません。 ②-4）指示をそのまま流す「伝書鳩」にならず、組織の結節点として機能しましょう マネジャーは、経営・本部と現場をつなぐ重要な「結節点」です。 会社の方針や決定事項を部下に伝える際、「上が決めたから」とそのまま流す「伝書鳩」になってはいけません。なぜその決定に至ったのか（大義・目的）を自分の言葉に「翻訳」して伝え、部下が疑念を持たずに実行できる状態に導く責任があります（※②-5も参照）。 同時に、部下からの情報を上長や本部へ報告する際は、部下の不満をそのまま伝えるのではなく、「事実」と「解釈」を分けて建設的な情報として「連結」し、経営判断の精度を高める役割を果たしましょう。 よくあるOK事例 １）提出物について本社からアナウンスがあったので、「〇〇を〇月〇日〇時までに提出してください」と拠点のメンバーに伝えた。 ２）ブロック長から業務指示がきたので、担当を割り振り、期限を決めて、なぜこの業務が必要なのか、という背景と共にメンバーへ指示をした。 ３）部下Aさんから上がった質問が自分で判断ができない内容だった。Aさんに対して、「持ち帰って検討します。決定したら伝えます」と伝えた。 よくあるNG事例 １）拠点長Aは送迎時の新ルールを部下に周知する際に「上が決めたルールなのでお願いします」と伝えた。部下の不平不満を避けるため、言外に「自分が決めた訳じゃない」という意思を示した。 ２）本部からの連絡に対して、「自分もよくわからないけど、本部が決めたことだからとりあえずやっておいて」と、自分の責任を放棄してそのまま部下に伝えてしまった。 ３）部下からの「このやり方はパートナーから不評です」という不満（解釈）を、事実確認をせずにそのまま「パートナーから不評が出ている」として本部に報告してしまった。 ②-5）部下との会話で上長を出さないようにしましょう 「上長が言ってたからやってほしい」「会社で決まったから申し訳ないけどお願い」など、自分が決めたわけではない、自分は関係ない＝自分の責任ではないと感じさせる部下への伝え方（虎の威を借る狐）をしてはいけません。また、会話の中で上長を出すだけでどうしても意図せず、”虎の威を借る狐”になることがあります。そのため、話の中では上長やその上の上長を出さないようにしましょう。(”上長のことは一切出さない”くらいの気持ちでやる、がちょうどいい) なぜなら、自分事ではない伝え方をしてしまうと、部下は上長を上長として見なくなり、組織が機能しなくなってしまうからです。 こうなる背景には「部下に嫌われたくない」「自分は関係ない」、という意識があるのだと思いますが、責任意識のない上長だと結局、組織としては機能しなくなってしまいます。 上長が決めたことであっても、自分もその決定者の中の一人として発言しましょう。 ※自分ではわからないことが発生した場合は、『検討して連絡する』というニュアンスで説明すること。 よくあるOK事例 １）提出物について本社からアナウンスがあったので、「〇〇を〇月〇日〇時までに提出してください」と拠点のメンバーに伝えた。 ２）ブロック長から業務指示がきたので、担当を割り振り、期限を決めて、なぜこの業務が必要なのか、という背景と共にメンバーへ指示をした。 ３）部下Aさんから上がった質問が自分で判断ができない内容だった。Aさんに対して、「持ち帰って検討します。決定したら伝えます」と伝えた。 よくあるNG事例 １）拠点長Aは送迎時の新ルールを部下に周知する際に「上が決めたルールなのでお願いします」と伝えた。部下の不平不満を避けるため、言外に「自分が決めた訳じゃない」という意思を示した。 ２）拠点長Aが部下に対して、２日前倒しでの支援計画書作成指示を出すことになった。部下に好かれる上長を目指しているAは「私は別に急いでないけど、ブロック長のCさんが早く確認したがっててね」と付け加えた。 ３）拠点長が「ブロック長から指示がきたので転送します」という一文だけ加え、ブロック長から自分宛に来たメールをそのまま部下に転送した。 ４）部下Aさんから上がった質問が自分で判断ができない内容だった。Aさんに対して、「ブロック長のBさんに確認します」と伝えた。 ②-6）他部署のメンバーの問題に介入しすぎない/指示をしないようにしましょう ここでいう介入とは意見をいう、アドバイスをする、指示する、同調してあげることも含みます。本来、部署内での問題は、その部署で解決すべきです。 他部署の上の立場の人に相談するメンバーは、自分の正当性を誰かに認めてほしい、という気持ちがあるかもしれません。 また、相談にのってしまう上の立場の人は、より多くのメンバーから気に入られたいという心理が働いていることもあるかもしれません。相談にのる上長はその部下へのアドバイスに関して責任のない立場にいるので、ただ頼られている、気に入られることができる気持ちがいい立ち位置となってしまっています。また、上位層に言われると、他部署の人であっても正しいこと、指示であると必要以上に思ってしまう可能性があります。 他部署のメンバーから相談に乗ってしまうと、結果として該当メンバーはより部署内への不満を高めるだけであり、何も問題が解決されない、という状態になってしまいます。 むしろ自部署内でマイナスな感情を増幅させてしまい、本質的な解決にはなりません。 以上から、他部署のメンバーから相談された場合は、直属の上長に相談するように促しましょう。 （ただし、セクハラ/パワハラ/不正/明らかなルール違反の場合は、例外です。その際は事実情報を聞き取って、職場相談窓口などの社内窓口に通報しましょう。） よくあるOK事例 １）他拠点のメンバーから自拠点の運営方法について相談を受けたが、アドバイスはせず、自拠点の拠点長に相談してみたらどうか、と促した。 ２）他部署のメンバーが相談してきたので話を聞いたところ、上長からのパワハラを受けているようだった。事実を聞き取り、相談窓口に報告をした。 よくあるNG事例 １）拠点長Aは、以前部下だった他拠点メンバーBから、送迎スケジュール作成の仕方についてアドバイスを求められたので、快く応じて自拠点のやり方を伝授した。 ２）拠点長Cは、ヘルプで来ていた他拠点メンバーDがパートナー見守り時に声掛けが少なく不安を感じたので、「所属拠点に帰ってからは、もう少しパートナーと会話を多くするようにしてみてください」とアドバイスした。 ３）拠点長Eは、顔なじみの他拠点メンバーFから、かなり深刻な様子で「相談したいことがあるのですが」と言われたが、他拠点メンバーの相談には乗ってはいけないと思い、何も聞かずに「直属の上長に相談してください」といった。 （セクハラ等の基本ルール違反の場合があるので、要件だけでも聞くべきであった） ②-7）意見を聞きましょう(ボトムダウン) ボトムダウンとは、ボトムアップでもトップダウンでもない、エフィラグループのマネジメントを表現した造語です。 ポリシーや②-6）にもあるとおり、組織運営はメンバーからの情報や意見を聞いたうえで、その組織の責任者が決定し責任をとる、という流れを基本としています。 （メンバーから聴き取った情報を元に、責任者が決定をするという流れからボトムダウンと呼んでいます） 【参考】 ボトムアップ：部下の意見を中心に合議などで決定していく完全なボトムアップのマネジメントは、誰も責任を取らない無責任な決定になる、全員に配慮した中途半端な決定になる、などの弊害が起こりやすい。 トップダウン：部下の意見を聞かず、組織の責任者が独断で指示をしていくトップダウンのマネジメントは、組織の実情にそぐわない独りよがりな決定になる可能性が高い。 【注意する点】 ボトムダウンの目的は、上長が最善の意思決定をすることにあり、部下の「役に立ちたい感」をあげることではありません。最善の意思決定をする責任が上長にあり、そのために部下からの情報収集を行うことがボトムダウンの本質です。やろうとしている施策を実行するとどう感じるか、どう思うのか、現場目線で起きていること、などの上長側がもっていない事実情報や思いもしなかったアイデアを集めること。それを組織の意思決定に活かし、精度の高い判断につなげましょう。 仮に、「自分も決定に関わっている」と感じてもらう（参画意識を持たせる）ことを目的にしてボトムダウンをおこなってしまうと、「部下が納得する案」や「部下が喜ぶ案」を採用しようとする、部下の意見を順番に採用してあげようとする、などのバイアスがかかってしまいます。それだと本来の組織にとっての最善の判断と異なる判断をしてしまうことにつながります。あくまでも上長は、折衷案をとる必要はなく、部下からの意見や情報収集を行った上で、その集めた意見や情報と全く異なる意思決定をすることもあり得るものです。 そして、ボトムダウンは『役に立ちたい感』を目的にはしていないのですが、結果的に役に立ちたい感があがる、というのが正しい流れです。 よくあるOK事例 １）新しいイベントの企画について、拠点の会議で部下から意見を聞いた。どれも良い案ではあったが、拠点の目標達成の観点で考えると、どの意見もまだ不足があると判断した。そのため、部下の案は採用せず、部下から得た情報やヒントをもとに、全く異なるイベントを行うことにした。 よくあるNG事例 １）会議で新しい拠点ルールについて意見を募った際、せっかく部下が意見を出してくれたのだから「自分も決定に関わっている」と感じてもらおう（役に立ちたい感を高めよう）と考え、部下が一番喜びそうな案をそのまま採用した。 ２）業務効率化について拠点内で話し合っている際、部下AさんとBさんから異なる意見が出た。どちらかの意見だけを採用すると角が立つと思い、双方の意見を無難にまとめた「折衷案」を提案し採用した。結果として、拠点にとって最善の判断とは言えない結論になってしまった。 ３）メンバーの参画意識を持たせることを目的に、毎月のレクリエーション企画を部下の意見から順番に採用してあげている ②-8）上長が責任をとりましょう ●責任者に責任がある 組織で何かを決定する場合、その責任は責任をもつ者（上長）にあります。その代わりに決定する権限も上長が持っています。 みんなで話し合って何か物事を決定したとしても、その上長から責任が無くなることはありません。ですので、「みんなで決めたことだからちゃんとやるべきだ！」「みんなで決めたからみんなの責任だ」という理屈は成り立ちません。上長がその決定について責任を持たなくてはなりません。みんなで決めたことであっても、決定事項は全て責任者の責任ということです。 また、「責任をとるのが上長である」というだけであり、偉くなったわけではありません。責任者は「決めたんだから従え」と横柄になってはいけません。 ●意見を聞く ただし、この場合、部下からの意見を聞くべきではない、ということではなく、部下からの意見は聞いて構いません。むしろ情報を集めて、より正解に近い判断（決定）をするために、必要なことであり進んでやってください。 正しい判断をする上で会議などを行い、必要な意見を聞いたり情報収集をすることや、事実情報を確認することは必要なことです。誰にも意見を聞かずに、独断で決めることも時には必要かもしれませんが、いずれの場合でも、責任をとるのは上長です。 部下の皆さんにおいては、上長が物事を決定するに当たって必要な情報や意見を伝えるようにしましょう。 よくあるOK事例 １）近日中に実施するイベントの内容について、会議の中で、部下から意見を募った。その意見の中から、１つを選んで、実施することを決めた。 ２）自拠点のルールについて、決定するために事実情報が足りないと感じたので、部下から事実情報を聞き取り、ルール設定を行った。 よくあるNG事例 １）安全な服薬のフローをみんなで話し合って、最終的にみんなが納得した内容に決めた。後日、服薬ミスがあったが「みんなで決めたフローでミスが起きたのだから○○さんだけが悪いわけではない」と、責任の所在が曖昧になった。 ２）拠点長Aが部下数名に対して「パートナーBさんにはどんなリハビリが必要でしょうか」と尋ねた。さまざま意見が出てきて迷ったAは多数決で方針を決めた。 ３）職員数名で今日の連絡帳を誰が作成するかを話し合った。一人に負担させるのは気が引けるので「みんなで分担してやりましょう」と曖昧に決まった。その後、作成漏れが発覚したが、誰も気づかなかったのだし仕方ないと思った。 ②-9）仕事を任せる（権限を与える）ときは目標と範囲・成果（責任）とともに設定しましょう 今任せている仕事以外（今の役割を超える仕事）（権限）のことを任せるときは、目標と範囲・成果（責任）を設定しましょう。 任せたものの求める成果と、使える資源、行動を明確にし、権限の制約がある場合も伝えておきましょう。 任せる（権限だけを与える）ことだけをしてしまうと、その業務について、責任が無くなってしまいます。免責を回避するために、目標と権限の範囲、成果（責任）を合わせて設定しましょう。 よくあるOK事例 １）部下にパートナーの見学対応を任せることにした。お見せする資料やお伝えすることを明確に指示し、ご利用開始の同意をいただくことを目標として設定した。通常のサービス利用の範囲を超えるイレギュラーなご相談があった場合のみ、自己判断せず、上長に確認を仰ぐ対応をするように指示をした。 よくあるNG事例 １）職員Aは備品管理を担当していて、拠点長から自由に買ってきていいと権限を与えられている。ただし、いくら以内に収めるなどの責任は課されていない。結果、必要以上に大量の備品を購入してしまった。ただ、それでも責任がないので、責任追求はできない。 ２）「あとの責任は俺が全部取るから好きにやっていいよ」という上長の発言（責任のない行動をさせてしまう） ３）拠点長Aは新規パートナーを増やしたいと思い、部下Bに対して、毎週10時間外回り営業をする権限を与えた。だが、需要見込みが立たないため、特に目標人数（責任）は定めなかった。部下Ｂは「とにかく10時間外回りすること」にこだわり、チラシ配布程度の営業活動しかしなかったため、新規パートナーは現れなかった。 ②-10）「部下に任せた」「他部署に依頼しているは禁句」 今任せられている仕事について上長から尋ねられた時、「部下に任せています」「〇〇部署に依頼しています」とは答えないようにしましょう。 なぜなら、誰に任せている(依頼している)かどうかは上長には関係のないことで、上長から見たら、自分に任せている仕事であって、自分が責任をもって完了させる必要があるものです。大事なのは誰に任せているかどうか、ではなく、それが結果として完了させられるのかどうか、です。自分が任された仕事であれば、その結果は自分に責任があります。 「部下に任せています」「〇〇部署に依頼しています」という言葉は、自身の責任が外れている言葉です。 よくあるOK事例 １）上長から、自身が任された仕事について、「〇〇は予定どおり〇日までに完了させられますか。」と聞かれた。その仕事を任せているメンバーAに進捗を確認し、「〇日までに完了予定です。」と答えた。 よくあるNG事例 １）上長から、自身が任された仕事について、「〇〇は予定どおり〇日までに完了させられますか。」と聞かれた。「メンバーAに任せています」と答えた。 ②-11）上長と部下の関係において「好き・嫌い」を表に出さない（距離を取る）ようにしましょう マネジメントをする上で、嫌われることを恐れていてはできないものではあるが、嫌われるというのは距離が近いから起こることです。 距離が近くなければ、嫌われるというよりも相手にとって好きでも嫌いでもない無の状態でいられるのがベストです。 部下から好き嫌いという感情を持たれているのは、距離が近い証拠であり、マネジメントとしては望ましくない状態です。上長側からの好き嫌いの感情も同じです。 公平性を担保したマネジメントを行うために、上長は部下と距離をとりましょう。また、好き嫌いの感情を抱いてしまったとしても、表に出さないようにしましょう。 よくあるOK事例 １）考え方や価値観が合わないメンバーがいるが、業務には関係のないことなので、淡々と他のメンバーと変わらず接している。 ２）業務を快くやってくれる感じの良いメンバーがいるが、他のメンバーと変わらず業務を割り振るように意識している。 よくあるNG事例 １）部下から親しまれる上長を目指そうと思い、送迎後のすきま時間を利用して、プライベートの情報交換を頻繁に行っている。 ２）部下から嫌われないように、ただ一方的に指示をするのではなく、部下の仕事をできるだけ手伝うようにしている。 ３）部下に面倒な業務を指示したところ、嫌そうな顔をされてしまった。部下に嫌われたら仕事がしづらくなると思い、一緒に飲みにいって奢ることにした。 ②-12）１つ飛ばしの指示は、しないようにしましょう １つ飛ばしとは「メンバー：A」「上長：B」 「上長の上長：C」とした場合、 CからAに直接指示をすることである。 Cが１つ飛ばしでの指示をすることにより、Aは上長が2人いると錯覚し、更には、BではなくCの指示を仰ぐようになってしまうことが予想されます。これにより、Bによる指示が通らなくなってしまうことがあります。 よって、１つ飛ばしの指示は組織運営上の問題を起こしてしまうため、してはいけません。 なお、１つ飛ばしのコミュニケーションについては、デメリットが大きいため、望ましくありません。ただし、離職回避や情報収集の必要性など、特殊な事情がある場合はデメリットはあるものの、メリットが上回る場合は実施することもあってよいです。 よくあるOK事例 １）拠点にブロック長が来ており、職員Aがイベント遂行についての指示を仰いだが、ブロック長は拠点長に確認するように伝えた。 ２）A拠点の職員Bは、拠点長Cとの関係性に悩み、離職を考えていた。そのことを知ったブロック長Dは、職員Bとの面談を設定した。 よくあるNG事例 １）ブロック長Ｃは拠点長Ｂとの営業進捗確認をするため拠点を訪問したが、拠点長Bの到着が遅れているようなので、事務室で待つことにした。 Cは事務室の中が整理整頓されておらず気になったので、部下の部下であるメンバーAに「整理整頓するように」と、Ｂを介さずに直接指示をした。 ２）ブロック長Cは、メンバーAが離職する意思があることを、拠点長Bから報告を受けていた。 Cは、「１つ飛ばしはあまり推奨されていないし、自分がAと話しても無駄だ」と決めつけて、面談等の検討を一切しなかった。 （CはAとの面談機会を設ける等、離職回避するための行動を検討すべきであった） ②-13）別拠点（別部署）のメンバーの相談にのることは弊害があるものと心しておきましょう ②-10）にもあるとおり、１つ飛ばしのコミュニケーションにはデメリットがありますが、同様、別拠点（別部署）のメンバーの相談にのったりアドバイスすることはデメリットがあるため、望ましくありません。※相談には話を聞くだけのものも含みます。 別拠点（別部署）に起こったことの責任は、別拠点（別部署）の拠点長（部長・課長）にあります。別拠点（別部署）のメンバーの相談にのる、ということは、その上長は、より多くのメンバーから気に入られたい、頼られたい、という心理が働いていることもあるかもしれません。また、相談にのっている上長は、良かれと思って、自身の責任範囲外の口障りのいい言葉を言ってしまうこともあるでしょう。 別拠点（別部署）のメンバーの相談にのる上長は、別拠点（別部署）のメンバーへのアドバイスに関して責任のない立場にいるので、ただ頼られている、気に入られることができる気持ちがいい立ち位置となってしまっています。また、役職が上位の人に何か言われると、そのメンバーは、別拠点（別部署）の人であっても正しいこと、指示であると必要以上に思ってしまう可能性があります。結果として、別拠点（別部署）のメンバーからの相談に乗ってしまうと、相談したメンバーはより別拠点（別部署）への不満を高めるだけであり、何も問題が解決されない、という状態になってしまいます。 ただし、 ②-10）と同様、離職回避や情報収集の必要性など、特殊な事情がある場合はデメリットがあると心した上で、それでもメリットが上回る場合は実施することもあってよいです。その場合は、相談をしているメンバーとその上長との関係性をくずさないように配慮しましょう。（その相談者の上長を否定したりしないように、基本スタンスは、その上長の味方をする姿勢でいましょう。） よくあるOK事例 １）A拠点の拠点長Ｂに対して、Ｃ拠点からヘルプに来たＤが、自拠点のイベント遂行についての相談をしたが、Ｃ拠点の拠点長に相談するように伝えた。 よくあるNG事例 １）拠点長Ｃは拠点長Ｂと備品の受け渡しをするためＢの所属する拠点を訪問したが、拠点長Bの到着が遅れているようなので、事務室で待つことにした。 Cは事務室の中が整理整頓されておらず気になったので、Ｂの部下であるメンバーAに「整理整頓したほうがいいですよ」と、Ｂを介さずにアドバイスした。 ２）拠点長Cは、ヘルプに来た他拠点メンバーAが離職する意思があることを、たまたま本人から聞いた。自拠点の拠点長Bには言えていないということだった。 Cは、「他拠点メンバーの相談を受けるのは良くないし、自分がAと話しても無駄だ」と決めつけて、何もしなかった。 （CはAから情報収集してBに伝える等、離職回避するための行動を検討すべきだった） ②-14）すべての業務に担当を決めましょう ●「気づいた人がやる」の問題点 担当を決めずに「気づいた人がやる」をアリにしてしまうと、いくつもの弊害があります。 １：責任が曖昧になり、業務の抜け漏れが発生してしまいます。いつもやってくれていた人が退職したときにやられない仕事が発生する可能性もあります。 ２：気づく人はいつも気づき、気づかない人はいつも気づかないため、業務量に偏りができてしまい、メンバーの不満につながります。気づいた人が損してしまうことになってしまうのです。 ３：組織内で「気づいてやることは良いことだ」という文化になってしまう可能性があり、そうなると、メンバーが気づいて勝手に業務を生み出す懸念があります。結果的に、上長が不要と考える余計な業務も生まれてしまう可能性があります。 ４ ：気づいてやってくれている人は「やってあげている感覚」になってしまうことがあります。しっかりできていなくても自分はやってあげているだけなので仕方ない、という発想になってしまうリスクがあります。よって、気づいた人がやる仕事は無責任になってしまう可能性があります。 上記の弊害をなくすために、すべての業務に担当を決めることで公平な役割分担がなされ、人による業務の偏りが発生しなくなります。 また、”拠点長が把握していない業務”が存在する可能性もあるため、まず拠点長は、「すべての業務を洗い出す」ことから始めましょう。 ●「気づくこと」はいいこと 「気づいた人がやる」は良くありませんが、「気づく」ことは良いことです。なにか改善すべきことややるべき仕事に不随する、担当のあいまいな業務に気づいたら上長に報告し、担当を決めてもらいましょう。よりよい組織、成果のあがる組織になることができるでしょう。上長も、部下が「気づいた」ことに対して、必要な業務かどうかを判断し、実施する業務については公平な役割分担を決めましょう。 よくあるOK事例 １）送迎車の窓が汚れがちで危険だということに気づいたメンバーが、拠点長に報告をしてくれた。毎日の業務として設定していなかった業務だったので、当番を決めて清掃を実施することとした。 よくあるNG事例 １）日中業務として「トイレ掃除」があるが、パートナー対応のあいまを見て手が空いたメンバーが行うやり方で今まで問題なく運営出来ているため、今後も同じような運営を継続する。 ２）役割分担をして業務の偏りなく運営出来ているつもりだったが、先日退職したメンバーの退職理由をきいたところ、「誰もやらない仕事をいつも自分が引き取っていて、業務負担が大きいためこれ以上続けられなくなった」という内容だった。 （分担できていない業務を知らず知らずのうちにひとりに負わせていたようだ。） ３）なるべく気づいた人にやってもらう方針で運営していたところ、あるメンバーが毎日拠点の窓ふきの清掃をしていることが発覚した。 上長としては週に１回くらいの清掃で問題ないと考えていたため、窓ふきをするのであれば、このメンバーには他の業務をやってほしかった。 ②-15）客観的に、根拠を確かめた上で判断をしましょう 部下からの意見を聞いた場合、上長としては、主張が大きい人の意見を盲目的に聞き入れるのではなく、根拠（具体的な事実情報や、会社の方針、複数人からの情報収集）を吟味した上で冷静に判断しましょう。主張が大きい人の意見が最適な判断だとは限らないためです。 よくあるOK事例 １）とあるパートナーの支援の方法について、ベテラン職員から方針を変えた方がいいという意見があった。そのパートナーに関わる他の支援メンバーの意見や普段の過ごし方についての事実情報を聞き、拠点長が客観的に支援方法を決定した。 よくあるNG事例 １）仕事ができる部下から、以下の主張があった。 「あるパートナーさんから、拠点内に掲示されているポスターの位置がわかりづらくてよくないので、位置を変えた方が良いと言われた。私もそう思うし、他のパートナーの多くがそう思っていると思う。この頃、利用終了して他の事業所に移っている方が出てきているのも、小さいことの積み重ねで起こっているはずなので、ポスターの位置を変えることがとても重要だと思う。」 この部下のことは信頼しているし、今回の主張に熱意を感じたので、他の仕事を後回しにして、最優先で対応するように動いた。 ②-16）曖昧（あいまい）な表現をつかわないようにしましょう 以下に挙げた言葉、またはそれに関連する言葉について、社内でのコミュニケーション（文書・口頭いずれも）において使用をしないようにしましょう。曖昧（あいまい）な表現を使用することで、双方の認識のずれが生じてしまうことがあるためです。 【あいまいな言葉の例】 「気をつける・強化する」「尽力する・頑張る・努める」「なるべく・できるだけ・基本的に・極力」「控える・配慮する」「早急・至急・すぐに」「徹底する」「協力して・連携して」 ※「徹底」については「徹底の四則」やエフィラウェイの「徹底的に徹底」を意味するのであれば使用しても問題ありません。 ※「連携して」「協力して」「話し合って」「相談しながら」「気づいた人が」などの言葉を用いた、部下への曖昧な指示をしてはいけません。（担当者があいまいで、誰に実行責任があるかが明確ではない）複数のメンバーに指示をする場合であっても、実行責任者を明確にして任せましょう。【②-7参照】 よくあるOK事例 １）部下に対して、パートナーとの面談前に作成してほしい資料があったため、面談に間に合うよう「〇月〇日の〇時までに作成をお願いします。」と指示をした。 ２）事業所内事故が起きてしまったので、再発防止策を拠点内で話し合い「見守りの際に自身の担当の場所を離れる際には必ず周囲のメンバーに声をかける」という再発防止策を全員に周知した。 よくあるNG事例 １）部下に対して、パートナーとの面談前に作成してほしい資料があったため、「なるべく早めに作成お願いします」と伝えたところ、面談までに資料が間に合わなかった。 ２）事業所内事故が起きてしまったので、「みんなで協力して気を付けていきましょう」と事業所内会議で伝えた。"}, {"title": "③部下の管理", "blocks": [{"t": "h2", "x": "③-1）部下には目的を理解した上で伝えましょう"}, {"t": "p", "x": "業務指示や制度について、エフィラグループの価値観について、管理職自身がまずメンバー以上に理解し、「なぜこの業務をするのか」「なぜこの目標があるのか」などという目的を説明できるようにした上で、目的も合わせて部下に伝えましょう。"}, {"t": "p", "x": "目的を知っている方が部下側も受け入れやすく、疑念も生まれづらいためです。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）上長から、会議の場で新しい制度の情報共有があった。理解が不十分な点があったので、質問し、部下の懸念が生まれないように説明する準備をした。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）上長から、会議の場で新しい制度の情報共有があった。背景はよくわからなかった。部下には、「決まったからやってください」と伝えた。", "l": 0}, {"t": "h2", "x": "③-2）部下に対して言うべきことは言いましょう"}, {"t": "p", "x": "ルール違反があった際だけでなく、上長が求める結果に対して部下ができていないことなど、本人のために伝えないといけないことはしっかり本人に伝えましょう。"}, {"t": "p", "x": "これを言ってしまったら部下との関係が悪化するかもしれない、などと思ったとしても、それが組織（チーム）のため、または部下のために必要であるなら伝えないといけません。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）言葉遣いが気になるメンバーがいる。ルール違反ではないし、本人に悪気がないのはわかっているが、パートナーにとって良くない印象を与えてしまったり、そのメンバーが悪気なく不利益を被ってしまうのはよくないので、本人に改善するよう伝えた。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）言葉遣いが気になるメンバーがいる。ルール違反ではないし、本人に悪気がないのはわかっているので、パートナーからご指摘があったが、本人がショックを受けないように、本人へは言わなかった。", "l": 0}, {"t": "h2", "x": "③-3）毎日朝礼や終礼を行う、毎月カンファを行いましょう"}, {"t": "p", "x": "日毎の朝礼や終礼、毎月のカンファレンスなど、組織のメンバーが複数出席するミーティングの機会を開催しましょう。"}, {"t": "p", "x": "定例会により、各メンバーへの情報共有と、各メンバーからの情報収集を行うことで、拠点として対応するべき課題を抽出することができます。"}, {"t": "p", "x": "また会に参加することで、自身が組織の一員であるという認識を持つことができるようになります。"}, {"t": "p", "x": "※基本的には３つ以上の階層で同時に行わないこと（上長、部下、部下の部下。などのこと）。位置ずれが発生する懸念があるため。ただし１層目がオブザーバーとしての参加なら可。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）当日利用するパートナーの申し送り事項や、直近で起きたヒヤリハット事例などを、朝礼で必ず読み合わせている。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）パートナーから「入浴時に背中を洗うのを手伝ってほしい」と要望されたが、その場にいた職員だけで情報をとめてしまった。後日、事情を知らない職員が従来どおりの介護をしたため、パートナーからクレームを受けてしまった。", "l": 0}, {"t": "b", "x": "２）定例会で利用児童の支援内容についてレギュラーメンバーへ周知した。だが、不参加のパート職員に対しては、シフトが同じ日になったレギュラーメンバーが伝えてくれるだろうと思い、拠点長としては何もフォローしなかった。", "l": 0}, {"t": "h2", "x": "③-4）部下には目標を設定し、達成度に対するフィードバックを行いましょう"}, {"t": "p", "x": "部下には上長が目標を設定してください。"}, {"t": "p", "x": "そのうえで目標に対する達成度を定期的に明確にし、部下にフィードバックをすること。（週に１回１５分程度部下との１対１のフィードバックミーティングを行う）"}, {"t": "p", "x": "●フィードバックが必要な理由"}, {"t": "p", "x": "・目標を設定することによって、部下が成長することにことにつながるため。"}, {"t": "p", "x": "・達成のためのモニタリング、必要に応じて、目標・行動の修正を行うため"}, {"t": "p", "x": "・定期的な１対１（上司と部下）のコミュニケーションをとることによって、メンバーの長期的な定着に繋がる"}, {"t": "p", "x": "●留意事項"}, {"t": "p", "x": "・目標を設定する際は「いつまでに」「どの状態か」の具体的な結果を示すようにして、後々ずれがないもので行いましょう。部下を迷わせてしまわないために大切です。"}, {"t": "p", "x": "（○月○日までに○件獲得、○月○日までに○が完了している状態など）"}, {"t": "p", "x": "※「～を～状態でできるようにする」などでもいいが、状態の目標設定だと完全結果にならないことが多いので、その状態がお互いの認識ずれないように設定する必要がある。"}, {"t": "p", "x": "例：○月末日までに請求業務をできるようになる →× 何をもってできるといえるのかが曖昧。"}, {"t": "p", "x": "例：○月○日までに入浴介助が一人でできるようになり上長OKをもらっている状態にする（できているかどうかの判断は上長が行う） →○ 理想ではないが、最低限判断が本人ではなく上長になるので設定の仕方としてはOK。"}, {"t": "p", "x": "・入社して間もない部下については、目標を「簡単/小さく/少なく」（結果点を下げる）して、短期間に区切って設定することが望ましい。"}, {"t": "p", "x": "目標設定と達成のサイクルを数多く回すことで、部下が迷うことや放置されていると感じることがなくなり、日々の成長を感じやすくなる。"}, {"t": "p", "x": "例：今日一日で、パートナーの名前と顔を１０名一致させる。"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）部下とは毎週１対１の面談を設定し、目標の達成度合いの確認や、次の目標設定などをしているので、部下が行動に迷うことはない。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t": "b", "x": "１）「できるだけ早いうちに、送迎をできるようにして下さい」「この資料はすべて読んでおいて」「リストに載っているパートナーに電話しておいて」\u000b（納期あいまい、達成度があいまい）", "l": 0}, {"t": "b", "x": "２）拠点長Aは部下Bにフィードバックした際に「文章がヘタなのでやり直し」とだけ伝えた。部下Bは何をどのように改善したらよいか理解できなかった。", "l": 0}, {"t": "b", "x": "３）拠点長Aは新入メンバーBに「３か月後の〇月〇日までに施設長業務を全部おぼえる」という目標設定をした。Bは「３ヵ月も時間があるが、今日はまず何をしよう？」「施設長が何をしているかも分からないの」と途方にくれた。（目標が難しい/大きい/長納期）", "l": 0}, {"t": "h2", "x": "③-5）部下に目標を課す際は、目標達成にどういう意味があるのかを併せて伝えましょう"}, {"t": "p", "x": "部下への目標設定は必要ですが、ただただ目標を追うだけになると、達成の仕方が目的とずれてしまうことがあります。日々の業務の目的は、例えば目の前の数値目標を追うことではないはずですので、その目標をまず達成することでどんな未来を作ろうとしているのか、を理解してもらうようにしましょう。設定された目標がミッション・ビジョンなどの私たちエフィラグループが目指す方向にどうつながっているのか、を理解できると、より力を発揮しやすくなります。"}, {"t": "p", "x": "「道徳」と「経済」の「道徳」(理念や人間性)面から理解してもらうようにしましょう。"}, {"t": "p", "x": "※参照 エフィラグループポリシー"}, {"t": "p", "x": "≪３つの経営方針≫「① 道経一体経営 ＝ 理念と利益の思想」"}, {"t": "h3", "x": "よくあるOK事例"}, {"t": "b", "x": "１）部下に、今月の目標「○月○日までに入浴介助が一人でできるようになり上長OKをもらっている状態にする」を伝えた。その際に、入浴介助という業務の社会的意義や、エフィラグループのビジョン「誰ひとり取り残さない街をつくる。」につながっている、ということも併せて伝えた。", "l": 0}, {"t": "h3", "x": "よくあるNG事例"}, {"t
